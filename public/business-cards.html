<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WCA Business Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-page: #0e0e18;
  --bg-card: #1a1a2e;
  --bg-input: #12121e;
  --bg-header: rgba(26,26,46,0.92);
  --text-primary: #e2e8f0;
  --text-secondary: #a0aec0;
  --text-muted: #64748b;
  --border-color: rgba(99,102,241,0.15);
  --border-subtle: rgba(99,102,241,0.08);
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-soft: rgba(99,102,241,0.15);
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --sky: #0ea5e9;
  --card-radius: 12px;
  --gradient: linear-gradient(135deg, #6366f1, #818cf8, #a5b4fc);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"SF Pro Display","Geist",'Inter',system-ui,sans-serif;background:var(--bg-page);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column}

.topbar{background:var(--bg-header);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.07);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;flex-wrap:wrap}
.topbar h1{font-size:1.1rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.topbar input,.topbar select{padding:7px 12px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-input);color:var(--text-primary);font-size:.8rem;outline:none;transition:border-color .2s}
.topbar input:focus{border-color:var(--accent)}
.topbar .stats{margin-left:auto;font-size:.72rem;color:var(--text-muted);display:flex;gap:12px}
.topbar .stats strong{color:var(--text-primary)}
.btn{padding:6px 14px;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--text-primary);text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-back{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)}
.btn-back:hover{background:rgba(255,255,255,0.08)}
.btn-accent{background:var(--accent-soft);color:#a5b4fc;border:1px solid rgba(99,102,241,0.25)}
.btn-accent:hover{background:rgba(99,102,241,0.25)}
.btn-danger{background:rgba(239,68,68,0.1);color:#fca5a5;border:1px solid rgba(239,68,68,0.2)}
.btn-danger:hover{background:rgba(239,68,68,0.2)}

.main-wrap{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.filter-sidebar{width:240px;background:var(--bg-card);overflow-y:auto;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.07)}
.filter-sidebar h3{padding:12px 14px 8px;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:#6366f1;border-bottom:1px solid var(--border-subtle);font-weight:700}
.filter-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:.8rem;border-bottom:1px solid rgba(255,255,255,0.03);transition:all .15s;color:var(--text-secondary)}
.filter-item:hover{background:rgba(99,102,241,0.08);color:var(--text-primary)}
.filter-item.active{background:rgba(99,102,241,0.15);color:#fff;font-weight:600;border-left:3px solid var(--accent)}
.filter-icon{font-size:1rem;flex-shrink:0}
.filter-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.76rem}
.filter-count{font-size:.65rem;padding:2px 8px;border-radius:10px;min-width:24px;text-align:center;background:rgba(255,255,255,0.05);color:var(--text-muted)}
.filter-count.has{background:rgba(99,102,241,0.2);color:#a5b4fc;font-weight:600}
.filter-date{font-size:.6rem;color:var(--text-muted);margin-top:1px}

/* PAGE */
.page-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-page);position:relative}
.page-header{background:rgba(26,26,46,0.6);backdrop-filter:blur(12px);padding:14px 24px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.page-header .page-icon{font-size:2rem}
.page-header .page-title{font-size:1.15rem;font-weight:700;color:var(--text-primary)}
.page-header .page-subtitle{font-size:.75rem;color:var(--text-muted)}

/* EVENT TABS */
.event-tabs{display:flex;gap:0;padding:0 24px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(26,26,46,0.3);overflow-x:auto;flex-shrink:0}
.event-tab{padding:10px 18px;font-size:.78rem;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.event-tab:hover{color:var(--text-primary);background:rgba(99,102,241,0.05)}
.event-tab.active{color:#a5b4fc;border-bottom-color:#6366f1;background:rgba(99,102,241,0.08)}
.event-tab .tab-count{font-size:.62rem;background:rgba(99,102,241,0.2);color:#a5b4fc;padding:1px 6px;border-radius:8px;margin-left:6px}

/* DROPZONE */
.dropzone{border:2px dashed rgba(99,102,241,0.3);border-radius:14px;padding:32px 20px;text-align:center;color:var(--text-muted);font-size:.85rem;cursor:pointer;transition:all .3s;background:rgba(99,102,241,0.03);margin:20px 24px}
.dropzone:hover,.dropzone.dragover{border-color:#6366f1;background:rgba(99,102,241,0.08);color:var(--text-primary)}
.dropzone-toggle.active{background:rgba(99,102,241,0.25);box-shadow:0 0 8px rgba(99,102,241,0.3)}

/* IMPORT FORM */
.import-form{padding:16px 24px;background:rgba(99,102,241,0.04);border-bottom:1px solid rgba(99,102,241,0.12);display:none;gap:12px;flex-wrap:wrap;align-items:end}
.import-form label{font-size:.72rem;color:var(--text-secondary);font-weight:600;display:flex;flex-direction:column;gap:4px}
.import-form input,.import-form select{padding:7px 12px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-input);color:var(--text-primary);font-size:.8rem;outline:none}
.import-form input:focus,.import-form select:focus{border-color:var(--accent)}

/* CARDS GRID — glassmorphism */
.card-lines{flex:1;overflow-y:auto;padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;align-content:start}
.card-lines.list-view{grid-template-columns:1fr;gap:6px}
/* === CARD SHELL === */
.bc-card{background:rgba(255,255,255,0.04);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:14px 16px;transition:all .25s;cursor:default;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:0}
.bc-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(165,180,252,0.4),transparent);opacity:0;transition:opacity .3s}
.bc-card:hover{background:rgba(99,102,241,0.06);border-color:rgba(165,180,252,0.25);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3),0 0 20px rgba(99,102,241,0.06)}
.bc-card:hover::before{opacity:1}
.bc-card.selected{border-color:rgba(129,140,248,0.6);background:rgba(99,102,241,0.1);box-shadow:0 0 16px rgba(99,102,241,0.15)}
.list-view .bc-card{border-radius:10px;padding:10px 14px}
.list-view .bc-card:hover{transform:none}
.list-view .bc-card .card-fields.visible{flex-direction:row;flex-wrap:wrap;gap:4px 14px}
/* === CARD LAYOUT: flag left | content center | match right === */
.bc-card .card-top{display:flex;align-items:stretch;gap:0;margin-bottom:0}
/* FLAG — big, clickable, acts as select */
.bc-card .card-flag-wrap{flex-shrink:0;width:60px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:12px;transition:all .2s;margin-right:12px;position:relative}
.bc-card .card-flag-wrap:hover{background:rgba(165,180,252,0.08)}
.bc-card.selected .card-flag-wrap{background:rgba(99,102,241,0.15)}
.bc-card.selected .card-flag-wrap::after{content:"✓";position:absolute;bottom:2px;right:2px;font-size:.5rem;color:#fff;background:#6366f1;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
.bc-card .card-flag{font-size:2.8rem;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.4));line-height:1}
/* CONTENT — left aligned column */
.bc-card .card-body{flex:1;min-width:0;display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.bc-card .card-company-name{font-size:.88rem;font-weight:700;color:#f1f5f9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;letter-spacing:.2px;line-height:1.3}
.bc-card .card-contact-name{font-size:.74rem;font-weight:500;color:#cbd5e1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.bc-card .card-contact-role{font-size:.64rem;color:#64748b;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.bc-card .card-geo{display:flex;align-items:center;gap:6px;margin-top:3px;font-size:.64rem;color:#94a3b8}
.bc-card .card-country-name{font-weight:600;color:#a5b4fc;text-transform:uppercase;letter-spacing:.6px;font-size:.6rem}
.bc-card .card-city{color:#94a3b8;font-size:.6rem}
.bc-card .card-city::before{content:"·";margin-right:0;color:#475569}
/* MATCH — top right */
.bc-card .card-match{flex-shrink:0;margin-left:auto;padding-left:8px;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.bc-card .card-del-btn{position:absolute;top:6px;right:6px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);cursor:pointer;font-size:.75rem;color:#fca5a5;opacity:0;transition:all .15s;padding:3px 7px;border-radius:6px;z-index:5;line-height:1}
.bc-card:hover .card-del-btn{opacity:.7}
.bc-card .card-del-btn:hover{opacity:1;color:#fff;background:rgba(239,68,68,0.6)}
.bc-card .card-person{display:none}
.bc-card .inferred{opacity:.7;font-style:italic}
.bc-card .inferred::after{content:" ~";color:#a5b4fc;font-size:.5rem}
/* === INFO TOGGLE + COLLAPSIBLE FIELDS === */
.bc-card .card-details-row{display:flex;align-items:center;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.04)}
.bc-card .info-toggle{background:none;border:none;cursor:pointer;font-size:.6rem;padding:2px 0;color:#64748b;transition:all .2s;display:flex;align-items:center;gap:4px;letter-spacing:.3px;font-weight:600}
.bc-card .info-toggle:hover{color:#a5b4fc}
.bc-card .info-toggle.open{color:#a5b4fc}
.bc-card .info-toggle .arrow{display:inline-block;transition:transform .2s;font-size:.5rem}
.bc-card .info-toggle.open .arrow{transform:rotate(90deg)}
.bc-card .card-fields{display:none;flex-direction:column;gap:1px;margin-top:4px;padding:6px 0 2px;animation:fieldSlide .2s ease}
.bc-card .card-fields.visible{display:flex}
@keyframes fieldSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.bc-card .card-field{font-size:.68rem;color:#94a3b8;display:flex;align-items:center;gap:6px;overflow:hidden;padding:2px 0}
.bc-card .card-field .f-icon{flex-shrink:0;width:14px;text-align:center;font-size:.64rem;color:rgba(165,180,252,0.7)}
.bc-card .card-field .f-val{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#e2e8f0;font-size:.68rem}
.bc-card .card-field a{color:#a5b4fc;text-decoration:none}
.bc-card .card-field a:hover{text-decoration:underline}
/* === BOTTOM BAR === */
.bc-card .card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:6px}
.bc-card .card-date{font-size:.56rem;color:#475569}
/* NOTES ICON + PREVIEW */
.bc-card .notes-btn{background:none;border:none;cursor:pointer;font-size:.72rem;padding:3px 5px;opacity:.35;transition:all .2s;color:#a5b4fc;border-radius:6px}
.bc-card .notes-btn:hover{opacity:1;background:rgba(165,180,252,0.1)}
.bc-card .notes-btn.has-notes{opacity:.85}
.bc-card.has-notes-card{border-left:3px solid rgba(165,180,252,0.35)}
.bc-card .notes-preview{font-size:.62rem;color:#94a3b8;line-height:1.4;padding:5px 0 0;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;cursor:pointer;transition:color .2s}
.bc-card .notes-preview:hover{color:#cbd5e1}
.notes-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;align-items:center;justify-content:center}
.notes-overlay.open{display:flex}
.notes-modal{background:#1a1a2e;border:1px solid rgba(165,180,252,0.2);border-radius:16px;padding:20px;width:90%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.notes-modal h3{font-size:.9rem;color:#a5b4fc;margin-bottom:12px;font-weight:700}
.notes-modal textarea{width:100%;min-height:120px;background:#12121e;border:1px solid rgba(165,180,252,0.15);border-radius:10px;color:#e2e8f0;font-size:.82rem;padding:12px;resize:vertical;outline:none;font-family:inherit}
.notes-modal textarea:focus{border-color:#a5b4fc}
.notes-modal .modal-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
/* SELECTION BAR */
.selection-bar{display:none;padding:8px 24px;background:rgba(99,102,241,0.1);border-bottom:1px solid rgba(165,180,252,0.2);align-items:center;gap:12px;flex-wrap:wrap}
.selection-bar.visible{display:flex}
/* FLAG CAROUSEL */
.flag-carousel-wrap{border-bottom:1px solid rgba(255,255,255,0.04);position:relative}
.flag-search-wrap{padding:8px 24px 4px;position:relative}
.flag-search-wrap input{width:220px;padding:6px 12px 6px 30px;border-radius:8px;border:1px solid rgba(165,180,252,0.15);background:var(--bg-input);color:var(--text-primary);font-size:.78rem;outline:none;transition:border-color .2s}
.flag-search-wrap input:focus{border-color:#a5b4fc}
.flag-search-wrap .search-icon{position:absolute;left:34px;top:50%;transform:translateY(-50%);color:#a5b4fc;font-size:.78rem;pointer-events:none}
.flag-dropdown{position:absolute;top:100%;left:24px;width:260px;max-height:220px;overflow-y:auto;background:#1a1a2e;border:1px solid rgba(165,180,252,0.2);border-radius:10px;z-index:100;display:none;box-shadow:0 12px 40px rgba(0,0,0,0.5)}
.flag-dropdown.open{display:block}
.flag-dd-item{padding:8px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:.8rem;color:#e2e8f0;transition:background .15s}
.flag-dd-item:hover{background:rgba(99,102,241,0.12)}
.flag-dd-item .dd-flag{font-size:1.3rem}
.flag-dd-item .dd-name{flex:1}
.flag-dd-item .dd-count{font-size:.65rem;color:#a5b4fc;font-weight:700}
.flag-track-outer{overflow-x:auto;overflow-y:hidden;position:relative;padding:6px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.flag-track-outer::-webkit-scrollbar{display:none}
.flag-track{display:flex;gap:6px;padding:0 24px;width:max-content}
.flag-chip{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 8px;border-radius:10px;transition:all .3s;position:relative;flex-shrink:0;min-width:52px}
.flag-chip:hover{background:rgba(99,102,241,0.12)}
.flag-chip.selected{background:rgba(99,102,241,0.18);outline:2px solid rgba(165,180,252,0.5);transform:scale(1.15)}
.flag-chip .flag-emoji{font-size:1.7rem;line-height:1;transition:transform .3s}
.flag-chip.selected .flag-emoji{transform:scale(1.1)}
.flag-chip .flag-label{font-size:.5rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.flag-chip.selected .flag-label{color:#a5b4fc}
.flag-chip .flag-count{font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:6px;min-width:18px;text-align:center;background:rgba(99,102,241,0.2);color:#a5b4fc}
.match-badge{font-size:.62rem;font-weight:700;padding:3px 10px;border-radius:8px;white-space:nowrap;letter-spacing:.3px;cursor:pointer;transition:all .2s}
.match-badge:hover{transform:scale(1.08);filter:brightness(1.2)}
.match-badge.found{background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(16,185,129,0.08));color:#6ee7b7;border:1px solid rgba(16,185,129,0.3);box-shadow:0 2px 8px rgba(16,185,129,0.1)}
.match-badge.partial{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(245,158,11,0.08));color:#fbbf24;border:1px solid rgba(245,158,11,0.3);box-shadow:0 2px 8px rgba(245,158,11,0.1)}
.match-badge.not-found{background:rgba(239,68,68,0.06);color:#fca5a5;border:1px solid rgba(239,68,68,0.12)}
.match-sub{font-size:.55rem;color:var(--text-muted);margin-top:2px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* SORT BAR */
.sort-bar{display:flex;gap:6px;padding:8px 24px;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center;flex-wrap:wrap}
.sort-bar label{font-size:.68rem;color:var(--text-muted);font-weight:600}
.sort-btn{padding:3px 10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);border-radius:6px;color:var(--text-secondary);font-size:.68rem;cursor:pointer;transition:all .15s}
.sort-btn:hover{background:rgba(99,102,241,0.1);color:#a5b4fc}
.sort-btn.active{background:rgba(99,102,241,0.15);color:#a5b4fc;border-color:rgba(99,102,241,0.3)}

/* STATS BAR */
.stats-bar{display:flex;gap:10px;padding:10px 24px;border-bottom:1px solid rgba(255,255,255,0.04);flex-wrap:wrap}
.stat-chip{font-size:.72rem;padding:4px 14px;border-radius:8px;font-weight:600}
.stat-chip.total{background:rgba(255,255,255,0.04);color:var(--text-secondary)}
.stat-chip.matched{background:rgba(16,185,129,0.12);color:#6ee7b7}
.stat-chip.partial-stat{background:rgba(245,158,11,0.12);color:#fbbf24}
.stat-chip.unmatched{background:rgba(239,68,68,0.08);color:#fca5a5}

.letter-index{width:28px;background:var(--bg-card);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4px 0;overflow-y:auto;flex-shrink:0;border-left:1px solid rgba(255,255,255,0.06)}
.letter-index a{color:var(--text-muted);font-size:.62rem;font-weight:600;padding:2px 0;text-decoration:none;display:block;width:100%;text-align:center;line-height:1.4;transition:all .15s}
.letter-index a:hover{color:#a5b4fc;background:rgba(99,102,241,0.1)}
.letter-index a.has-entries{color:#a5b4fc;font-size:.68rem}

.empty-page{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text-muted);font-size:.9rem;gap:8px}

/* ==================== MOBILE RESPONSIVE ==================== */
@media(max-width:768px){
  /* TOPBAR: stack vertically */
  .topbar{padding:8px 12px;gap:8px}
  .topbar h1{font-size:.95rem;order:-1;width:100%}
  .topbar input[type="text"],.topbar select{min-width:0!important;flex:1;font-size:.75rem;padding:6px 10px}
  .topbar .stats{margin-left:0;width:100%;justify-content:space-between;font-size:.65rem}
  /* AI KEY: full width */
  .topbar>div:has(#aiKeyInput){width:100%;order:5}
  #aiKeyInput{width:100%!important;font-size:.72rem}

  /* SIDEBAR: collapse to bottom sheet or hide */
  .main-wrap{flex-direction:column}
  .filter-sidebar{width:100%;max-height:0;overflow:hidden;border-right:none;border-bottom:1px solid rgba(255,255,255,0.07);transition:max-height .3s;order:2}
  .filter-sidebar.mobile-open{max-height:50vh;overflow-y:auto}
  .filter-sidebar h3{padding:10px 14px 6px}
  .filter-item{padding:6px 12px}

  /* PAGE AREA: full width */
  .page-area{width:100%;order:1}
  .page-header{padding:10px 14px;gap:8px;flex-wrap:wrap}
  .page-header .page-icon{font-size:1.5rem}
  .page-header .page-title{font-size:1rem}
  .page-header .page-subtitle{font-size:.68rem}
  .page-header>div:last-child{width:100%;justify-content:stretch}
  .page-header .btn{flex:1;justify-content:center;font-size:.72rem;padding:8px 10px}

  /* IMPORT FORM: stack */
  .import-form{padding:12px 14px;flex-direction:column;gap:10px}
  .import-form label{width:100%}
  .import-form select,.import-form input{width:100%!important;min-width:0!important}

  /* FLAG CAROUSEL */
  .flag-carousel-wrap{padding:0}
  .flag-search-wrap{padding:6px 14px 2px}
  .flag-search-wrap input{width:100%;font-size:.75rem}
  .flag-track{padding:0 14px;gap:4px}
  .flag-chip{padding:4px 5px;min-width:44px}

const COUNTRY_CODES={"afghanistan":"AF","albania":"AL","algeria":"DZ","argentina":"AR","armenia":"AM","australia":"AU","austria":"AT","azerbaijan":"AZ","bahrain":"BH","bangladesh":"BD","belarus":"BY","belgium":"BE","bolivia":"BO","bosnia":"BA","brazil":"BR","brasile":"BR","brunei":"BN","bulgaria":"BG","cambodia":"KH","cameroon":"CM","canada":"CA","chile":"CL","china":"CN","cina":"CN","colombia":"CO","costa rica":"CR","croatia":"HR","cuba":"CU","cyprus":"CY","czech republic":"CZ","czechia":"CZ","denmark":"DK","danimarca":"DK","dominican republic":"DO","ecuador":"EC","egypt":"EG","egitto":"EG","el salvador":"SV","estonia":"EE","ethiopia":"ET","finland":"FI","finlandia":"FI","france":"FR","francia":"FR","georgia":"GE","germany":"DE","germania":"DE","ghana":"GH","greece":"GR","grecia":"GR","guatemala":"GT","honduras":"HN","hong kong":"HK","hungary":"HU","ungheria":"HU","iceland":"IS","india":"IN","indonesia":"ID","iran":"IR","iraq":"IQ","ireland":"IE","irlanda":"IE","israel":"IL","israele":"IL","italy":"IT","italia":"IT","ivory coast":"CI","jamaica":"JM","japan":"JP","giappone":"JP","jordan":"JO","giordania":"JO","kazakhstan":"KZ","kenya":"KE","korea":"KR","south korea":"KR","corea":"KR","corea del sud":"KR","kuwait":"KW","laos":"LA","latvia":"LV","lebanon":"LB","libano":"LB","libya":"LY","libia":"LY","lithuania":"LT","luxembourg":"LU","lussemburgo":"LU","malaysia":"MY","malesia":"MY","maldives":"MV","malta":"MT","mauritius":"MU","mexico":"MX","messico":"MX","mongolia":"MN","montenegro":"ME","morocco":"MA","marocco":"MA","mozambique":"MZ","myanmar":"MM","nepal":"NP","netherlands":"NL","paesi bassi":"NL","olanda":"NL","new zealand":"NZ","nuova zelanda":"NZ","nicaragua":"NI","nigeria":"NG","norway":"NO","norvegia":"NO","oman":"OM","pakistan":"PK","panama":"PA","panamá":"PA","paraguay":"PY","peru":"PE","perù":"PE","philippines":"PH","filippine":"PH","poland":"PL","polonia":"PL","portugal":"PT","portogallo":"PT","qatar":"QA","romania":"RO","russia":"RU","saudi arabia":"SA","arabia saudita":"SA","senegal":"SN","serbia":"RS","singapore":"SG","slovakia":"SK","slovenia":"SI","south africa":"ZA","sudafrica":"ZA","spain":"ES","spagna":"ES","sri lanka":"LK","sudan":"SD","sweden":"SE","svezia":"SE","switzerland":"CH","svizzera":"CH","syria":"SY","siria":"SY","taiwan":"TW","tanzania":"TZ","thailand":"TH","tailandia":"TH","tunisia":"TN","turkey":"TR","turchia":"TR","turkiye":"TR","uae":"AE","uganda":"UG","ukraine":"UA","ucraina":"UA","united arab emirates":"AE","emirati arabi":"AE","emirati arabi uniti":"AE","united kingdom":"GB","uk":"GB","gran bretagna":"GB","regno unito":"GB","united states":"US","usa":"US","stati uniti":"US","uruguay":"UY","uzbekistan":"UZ","venezuela":"VE","vietnam":"VN","yemen":"YE","zambia":"ZM","zimbabwe":"ZW"};

// ==================== SMART MATCHING ====================
function normalize(s){
  return (s||"").toLowerCase().trim()
    .replace(/[.,\-_/\\()'"!@#$%^&*+=\[\]{}|<>:;`~]/g," ")
    .replace(/\b(ltd|llc|inc|corp|gmbh|srl|s\.r\.l|s\.p\.a|spa|sa|ag|bv|nv|co|pvt|private|limited|international|intl|logistics|log|freight|forwarding|fwd|shipping|transport|trading|group|holding)\b/gi,"")
    .replace(/\s+/g," ").trim();
}
function extractDomain(email){
  if(!email) return "";
  const parts = email.split("@");
  return parts.length===2 ? parts[1].toLowerCase().replace(/^www\./,"") : "";
}
function normalizeWebsite(url){
  return (url||"").toLowerCase().replace(/^https?:\/\//,"").replace(/^www\./,"").replace(/\/$/,"").trim();
}
function tokenize(s){ return normalize(s).split(/\s+/).filter(t=>t.length>=2); }
function tokenOverlap(a,b){
  const tokA=tokenize(a), tokB=tokenize(b);
  if(!tokA.length||!tokB.length) return 0;
  let m=0;
  for(const t of tokA){ if(tokB.some(tb=>tb.includes(t)||t.includes(tb))) m++; }
  return m/Math.max(tokA.length,tokB.length);
}

function matchCard(card, partners){
  let bestMatch=null, bestScore=0, bestReason="";
  const cc=normalize(card.company_name), ce=(card.email||"").toLowerCase().trim(),
    cd=extractDomain(ce), cp=(card.phone||"").replace(/\D/g,""),
    cCity=normalize(card.city), cContact=normalize(card.contact_name),
    cWeb=normalizeWebsite(card.website),
    cCountry=(card.country_code||"").toUpperCase();
  // Dominio dal website del biglietto
  const cWebDomain=cWeb.replace(/\/.*$/,"");
  const isGenericEmail=cd&&/^(gmail|yahoo|hotmail|outlook|aol|qq|163|naver|hanmail|live|icloud|mail|ymail)\./i.test(cd);

  for(const p of partners){
    let score=0, reasons=[];
    const pc=normalize(p.company_name), pe=(p.email||"").toLowerCase().trim(),
      pd=extractDomain(pe), pp=(p.phone||"").replace(/\D/g,""),
      pw=normalizeWebsite(p.website),
      pWebDomain=pw.replace(/\/.*$/,""),
      pCountry=(p.country_code||"").toUpperCase(),
      pCity=normalize(p.city||(p.address||"").split(",").slice(-2,-1).join(""));

    // --- NOME AZIENDA ---
    if(cc&&pc&&cc===pc){ score+=50; reasons.push("azienda esatta"); }
    else if(cc&&pc){
      const ov=tokenOverlap(card.company_name,p.company_name);
      if(ov>=0.6){ score+=35; reasons.push("azienda ~"+Math.round(ov*100)+"%"); }
      else if(ov>=0.3){ score+=15; reasons.push("azienda parziale"); }
      if(pc.includes(cc)||cc.includes(pc)){
        // Verifica che il "core" sia significativo (almeno 2 token o 4+ chars)
        const shorter=cc.length<pc.length?cc:pc;
        if(shorter.length>=4||tokenize(shorter).length>=2){
          score+=20; if(!reasons.some(r=>r.includes("azienda"))) reasons.push("nome contenuto");
        }
      }
    }

    // --- EMAIL ---
    if(ce&&pe&&ce===pe){ score+=40; reasons.push("email esatta"); }
    else if(cd&&pd&&cd===pd&&!isGenericEmail){ score+=30; reasons.push("dominio email"); }
    // Cross: email biglietto ↔ contatti partner
    if(ce&&p.contacts){
      for(const c of p.contacts){
        if(c.email&&c.email.toLowerCase().trim()===ce){ score+=40; reasons.push("email contatto WCA"); break; }
      }
      if(cd&&!isGenericEmail&&!reasons.includes("dominio email")){
        for(const c of p.contacts){ if(c.email&&extractDomain(c.email)===cd){ score+=25; reasons.push("dominio contatto"); break; }}
      }
    }

    // --- WEBSITE / DOMINIO CROSS-CHECK ---
    if(cWeb&&pw&&(cWeb===pw||cWeb.includes(pw)||pw.includes(cWeb))){ score+=30; reasons.push("website"); }
    // Cross: dominio email biglietto ↔ website partner
    if(cd&&!isGenericEmail&&pWebDomain&&(pWebDomain.includes(cd.replace(/\.[^.]+$/,""))||cd.includes(pWebDomain.replace(/\.[^.]+$/,"")))){
      if(!reasons.some(r=>r.includes("dominio")&&r.includes("web"))){ score+=20; reasons.push("email↔web"); }
    }
    // Cross: website biglietto ↔ email partner
    if(cWebDomain&&pd&&(cWebDomain.includes(pd.replace(/\.[^.]+$/,""))||pd.includes(cWebDomain.replace(/\.[^.]+$/,"")))){
      if(!reasons.some(r=>r.includes("web"))){ score+=20; reasons.push("web↔email"); }
    }

    // --- TELEFONO ---
    if(cp.length>=6&&pp.length>=6){
      if(cp===pp){ score+=30; reasons.push("telefono"); }
      else if(cp.slice(-8)===pp.slice(-8)){ score+=20; reasons.push("tel parziale"); }
    }
    // Controlla anche telefoni dei contatti
    if(cp.length>=6&&p.contacts){
      for(const c of p.contacts){
        const cPhone=(c.direct_line||c.mobile||"").replace(/\D/g,"");
        if(cPhone.length>=6&&(cp===cPhone||cp.slice(-8)===cPhone.slice(-8))){
          if(!reasons.includes("telefono")){ score+=20; reasons.push("tel contatto"); }
          break;
        }
      }
    }

    // --- CONTATTO/PERSONA ---
    if(cContact&&p.contacts){
      for(const c of p.contacts){
        const pn=normalize(c.name);
        if(pn&&cContact===pn){ score+=25; reasons.push("contatto trovato"); break; }
        else if(pn&&tokenOverlap(cContact,pn)>=0.5){ score+=12; reasons.push("contatto simile"); break; }
      }
    }

    // --- VALIDAZIONE GEOGRAFICA (bonus/malus) ---
    if(cCountry&&pCountry){
      if(cCountry===pCountry){
        score+=8; reasons.push("stesso paese");
        // Bonus città
        if(cCity&&pCity&&(cCity.includes(pCity)||pCity.includes(cCity))){ score+=5; reasons.push("stessa città"); }
      } else if(score>=30){
        // Paese diverso con altri segnali forti: potrebbe essere filiale, leggera penalità
        score-=5;
        reasons.push("paese diverso ("+pCountry+")");
      }
    }

    if(score>bestScore){ bestScore=score; bestMatch=p; bestReason=reasons.join(" + "); }
  }

  let matchType="not-found";
  if(bestScore>=45) matchType="found";
  else if(bestScore>=18) matchType="partial";
  else { bestMatch=null; bestReason=""; }
  return { partner:bestMatch, score:bestScore, reason:bestReason, type:matchType };
}

// ==================== AI-POWERED WCA MATCHING ====================
const AI_MATCH_KB = `
KNOWLEDGE BASE — WCA PARTNER MATCHING (v2)
=============================================
Sei un esperto senior di logistica internazionale, spedizioni, freight forwarding e supply chain.
Il tuo compito: determinare se un biglietto da visita raccolto a una fiera corrisponde a un partner
iscritto alla rete WCA (World Cargo Alliance) o a una delle sue sotto-reti.

═══ STRATEGIA DI MATCHING — PRIORITÀ DECRESCENTE ═══

LIVELLO 1 — IDENTITÀ CERTA (confidenza 90-100):
• Dominio email aziendale identico (email biglietto @acme.com ↔ partner email/website acme.com)
  → Ignora provider generici: gmail, yahoo, hotmail, outlook, aol, qq, 163, naver, hanmail
  → Controlla varianti: acme-logistics.com ≈ acmelogistics.com ≈ acmelog.com
• Email contatto esatto: l'email del biglietto appare nella lista contacts[] del partner
• Website identico dopo normalizzazione (rimuovi www, http, trailing slash)

LIVELLO 2 — NOME AZIENDA + GEOGRAFIA (confidenza 70-90):
• Nome azienda match esatto dopo pulizia suffissi legali (Ltd, GmbH, Srl, Inc, LLC, Pte, Co, SA, BV, AS, AG, NV, Pvt, Corp, SpA)
  + Stesso paese → 90%
  + Paese diverso → 75% (potrebbe essere filiale, verifica indirizzo)
• Nome azienda contenuto: "DHL Global Forwarding Italy" contiene "DHL Global Forwarding" → match
  ATTENZIONE: il nome contenuto deve essere il "core" (≥2 token significativi), non solo "Global" o "Express"
• Acronimi noti del freight forwarding:
  KWE = Kintetsu World Express, DSV = DSV (ex Panalpina/UTi), DB = DB Schenker,
  KN = Kuehne+Nagel, CMA = CMA CGM, MSC = Mediterranean Shipping,
  CEVA = CEVA Logistics, XPO = XPO Logistics, CH Robinson,
  Expeditors = Expeditors Int'l, Bolloré = Bolloré Logistics
• Filiali e branch: "NOME AZIENDA + NOME PAESE/CITTÀ" è spesso una filiale
  Es: "Agility Italy" = "Agility Logistics" (filiale italiana)

LIVELLO 3 — SEGNALI DI SUPPORTO (confidenza 50-70):
• Telefono: ultime 8+ cifre identiche (ignora prefisso internazionale)
  → Il prefisso telefonico DEVE essere coerente col paese dichiarato
    +39=IT, +49=DE, +65=SG, +44=UK, +1=US/CA, +86=CN, +91=IN, +81=JP, +82=KR, +971=AE
  → Se il prefisso contraddice il paese → segnala anomalia
• Nome contatto trovato nella lista contacts[] del partner WCA
  → Nomi occidentali: match su nome+cognome → forte
  → Nomi asiatici comuni (Lee, Wang, Kim, Chen, Singh, Nguyen): match solo se abbinato ad altro segnale
• Indirizzo/Città: stessa città del partner rafforza il match
  → Confronta la città del biglietto con l'indirizzo del partner (estrai la città dall'address)

LIVELLO 4 — MATCH DEBOLE / NEGATIVO (confidenza 20-49):
• Solo nome parziale simile senza conferma geografica o contatto
• Settore simile ma nessun segnale forte
• Paese diverso senza spiegazione (non è una filiale nota)

═══ VARIANTI NOMI NEL FREIGHT FORWARDING ═══
Sinonimi da considerare equivalenti durante il confronto nomi:
Freight / Frt / Fwd / Forwarding | Logistics / Log / Logistic | International / Int'l / Intl
Shipping / Ship | Transport / Trans / Transportation | Global / Worldwide / World
Express / Exp | Cargo | Supply Chain / SCM | Solutions / Svcs / Services
ATTENZIONE: queste parole sono MOLTO comuni nel settore. "Atlas Logistics" e "Zenith Logistics"
NON sono la stessa azienda solo perché condividono "Logistics". Il core name deve matchare.

═══ ANTI-PATTERN: FALSI POSITIVI DA EVITARE ═══
• Due aziende diverse che operano nello stesso settore nello stesso paese
• Nomi generici come "Global Logistics", "Express Cargo", "International Freight" — cercare elementi
  distintivi (nome proprio, acronimo, fondatore) prima di dichiarare match
• Email su provider generico (gmail etc.) — NON usare come segnale positivo
• Nome contatto comune senza altri segnali — NON è un match

═══ VERIFICA GEOGRAFICA ═══
Il paese è un VALIDATORE CRUCIALE:
• Stesso nome + stesso paese → rafforza molto il match
• Stesso nome + paese diverso → potrebbe essere filiale, ma richiede verifica
  (controlla se il partner WCA ha enrolled_offices in quel paese)
• Se il biglietto ha città e il partner WCA ha indirizzo, confrontali
• Il prefisso telefonico deve essere coerente col paese dichiarato

═══ OUTPUT PER OGNI CONTATTO ═══
- match_type: "found" (confidenza ≥75%), "partial" (40-74%), "not-found" (<40%)
- confidence: numero 0-100 basato sui livelli sopra
- reason: spiegazione CONCISA in italiano (max 2 frasi) di quali segnali hai trovato
- wca_id: ID numerico del partner WCA matchato (null se not-found)
- company_name_wca: nome azienda WCA (null se not-found)
- suggestion: consiglio operativo per l'utente (es. "Verificare filiale", "Dominio email identico", "Nome simile ma paese diverso — controllare")
`;

async function aiMatchAll(){
  if(!OPENAI_KEY||!OPENAI_KEY.startsWith("sk-")){
    alert("Inserisci prima una chiave OpenAI valida"); return;
  }
  const cards=getFilteredCards().filter(c=>c.id);

  const btn=document.getElementById("btnAiMatch");
  const origText=btn.innerHTML;
  btn.disabled=true;
  btn.innerHTML="⏳ Analisi AI...";

  // Prepare compact partner list for AI context — include ALL partners
  const partnersSummary=allPartners.map(p=>{
    const emails=[p.email||""];
    if(Array.isArray(p.contacts)) p.contacts.forEach(c=>{ if(c.email) emails.push(c.email); });
    const contactNames=Array.isArray(p.contacts)?p.contacts.map(c=>c.name).filter(Boolean):[];
    const phones=[p.phone||""];
    if(Array.isArray(p.contacts)) p.contacts.forEach(c=>{ if(c.direct_line) phones.push(c.direct_line); if(c.mobile) phones.push(c.mobile); });
    return {
      wca_id:p.wca_id, name:p.company_name, cc:p.country_code,
      city:p.city||"", addr:(p.address||"").substring(0,80),
      emails:emails.filter(Boolean).join(","),
      phones:phones.filter(Boolean).join(","),
      web:p.website||"",
      contacts:contactNames.join(",")
    };
  });

  const BATCH=10;
  let improved=0, errors=0;

  for(let i=0;i<cards.length;i+=BATCH){
    const batch=cards.slice(i,i+BATCH);
    btn.innerHTML=`⏳ AI ${i}/${cards.length}...`;

    const cardsBatch=batch.map(c=>({
      id:c.id, company:c.company_name, contact:c.contact_name,
      email:c.email, phone:c.phone, city:c.city, address:c.address||"",
      country:c.country, country_code:c.country_code||"", web:c.website, role:c.position,
      algo_match:c._match?.type||"not-found",
      algo_score:c._match?.score||0,
      algo_partner:c._match?.partner?.company_name||"",
      algo_reason:c._match?.reason||""
    }));

    // Per ridurre token: se ci sono troppi partner, manda solo quelli dello stesso paese + top 200
    let relevantPartners=partnersSummary;
    if(partnersSummary.length>300){
      const batchCountries=new Set(batch.map(c=>(c.country_code||"").toUpperCase()).filter(Boolean));
      const sameCountry=partnersSummary.filter(p=>batchCountries.has((p.cc||"").toUpperCase()));
      const others=partnersSummary.filter(p=>!batchCountries.has((p.cc||"").toUpperCase())).slice(0,300);
      relevantPartners=[...sameCountry,...others];
    }

    const prompt=`${AI_MATCH_KB}

═══ PARTNER WCA DATABASE (${allPartners.length} totali, ${relevantPartners.length} rilevanti): ═══
${JSON.stringify(relevantPartners)}

═══ BIGLIETTI DA VISITA DA ANALIZZARE: ═══
${JSON.stringify(cardsBatch)}

ISTRUZIONI OPERATIVE:
1. Per OGNI biglietto, confronta sistematicamente: dominio email ↔ email/website partner, nome azienda ↔ nomi partner (con normalizzazione), telefono, nome contatto, paese+città.
2. L'algoritmo ha già prodotto un match (algo_match/algo_partner). CONFERMA se corretto, CORREGGI se errato, MIGLIORA se hai trovato un match migliore.
3. CERCA match che l'algoritmo non ha trovato: acronimi, filiali, varianti nome, domini simili.
4. Per i "partial" algoritmici: valuta se puoi promuoverli a "found" o retrocederli a "not-found" con ragionamento.
5. SEGNALA anomalie: prefisso tel ≠ paese, email generica su provider pubblico, nome azienda troppo generico.

FORMATO RISPOSTA — JSON array, un oggetto per biglietto:
[{"id":"uuid","match_type":"found|partial|not-found","confidence":0-100,"wca_id":123,"company_name_wca":"...","reason":"...","suggestion":"..."}]
Se not-found: wca_id=null, company_name_wca=null.
Rispondi SOLO con il JSON array.`;

    try{
      const r=await fetch("https://api.openai.com/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+OPENAI_KEY},
        body:JSON.stringify({
          model:"gpt-4o-mini", temperature:0,
          messages:[{role:"user",content:prompt}],
          response_format:{type:"json_object"}
        })
      });
      if(!r.ok){ console.error("AI Match error:",await r.text()); errors++; continue; }
      const data=await r.json();
      const content=data.choices?.[0]?.message?.content||"";
      let results=JSON.parse(content);
      if(results&&!Array.isArray(results)){
        const key=Object.keys(results).find(k=>Array.isArray(results[k]));
        if(key) results=results[key]; else results=[];
      }

      for(const res of results){
        const card=allCards.find(c=>String(c.id)===String(res.id));
        if(!card) continue;

        // Find the WCA partner by wca_id or company name
        let matchedPartner=null;
        if(res.wca_id) matchedPartner=allPartners.find(p=>String(p.wca_id)===String(res.wca_id));
        if(!matchedPartner&&res.company_name_wca){
          matchedPartner=allPartners.find(p=>normalize(p.company_name)===normalize(res.company_name_wca));
        }

        const aiType=res.match_type||"not-found";
        const aiConf=res.confidence||0;
        const oldType=card._match?.type||"not-found";
        const oldScore=card._match?.score||0;

        // AI improves or changes the match
        const shouldUpdate=
          (aiType==="found"&&oldType!=="found") ||
          (aiType==="found"&&aiConf>oldScore) ||
          (aiType==="partial"&&oldType==="not-found") ||
          (aiType==="not-found"&&oldType!=="not-found"&&aiConf<20);

        if(shouldUpdate||aiConf>oldScore){
          card._match={
            type:aiType,
            score:aiConf,
            reason:"🤖 "+res.reason+(res.suggestion?" | "+res.suggestion:""),
            partner:matchedPartner||card._match?.partner||null
          };
          improved++;

          // Update notes with AI match info
          const aiNote="[AI Match] "+res.reason+(res.suggestion?" — "+res.suggestion:"");
          const existingNotes=(card.notes||"").replace(/\[AI Match\][^|]*(|\||$)/g,"").trim();
          const newNotes=existingNotes?(existingNotes+" | "+aiNote):aiNote;

          // PATCH notes + match result to Supabase
          const patchData={notes:newNotes, ai_match_type:aiType, ai_match_confidence:aiConf};
          if(res.wca_id) patchData.ai_match_wca_id=String(res.wca_id);
          if(res.company_name_wca) patchData.ai_match_wca_name=res.company_name_wca;
          try{
            await fetch(`${SUPABASE_URL}/rest/v1/wca_business_cards?id=eq.${card.id}`,{
              method:"PATCH",
              headers:{...SB_HEADERS,"Content-Type":"application/json","Prefer":"return=minimal"},
              body:JSON.stringify(patchData)
            });
            card.notes=newNotes;
            card.ai_match_type=aiType;
            card.ai_match_confidence=aiConf;
          }catch(e){ console.error("PATCH match error:",e); }
        }
      }
    }catch(e){ console.error("AI match batch error:",e); errors++; }
  }

  btn.disabled=false;
  btn.innerHTML=origText;
  renderAll();

  const msg=`AI Match completato!\n${improved} contatti aggiornati su ${cards.length} analizzati.`;
  if(errors) alert(msg+`\n${errors} errori durante l'analisi.`);
  else alert(msg);
}

function setSort(key){
  currentSort=key;
  document.querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));
  const btn=document.getElementById("sort"+key.charAt(0).toUpperCase()+key.slice(1));

function sortCards(cards){
  switch(currentSort){
    case "company": return cards.sort((a,b)=>(a.company_name||"").localeCompare(b.company_name||""));
    case "name": return cards.sort((a,b)=>(a.contact_name||"").localeCompare(b.contact_name||""));
    case "country": return cards.sort((a,b)=>(a.country||a.country_code||"").localeCompare(b.country||b.country_code||""));
    case "city": return cards.sort((a,b)=>(a.city||"").localeCompare(b.city||""));
    case "match": return cards.sort((a,b)=>{
      const order={"found":0,"partial":1,"not-found":2};
      return (order[a._match?.type]??2)-(order[b._match?.type]??2);
    });
    default: return cards;
  }
}
// Estrae solo le note scritte dall'utente, esclude metadati di sistema e spazzatura OCR
function getUserNotes(raw){
  if(!raw) return "";
  let s=raw;
  // Rimuovi tag di sistema
  s=s.replace(/\[AI Match\][^|]*/g,"");
  s=s.replace(/Evento:\s*[^|]*/g,"");
  s=s.replace(/\|/g," ");
  // Rimuovi dati OCR/importazione: contengono pattern tipici di scansione biglietti
  // Se la "nota" inizia con "Data:" seguita da dati grezzi → è spazzatura importata
  s=s.replace(/Data:\s*\d{4}-\d{2}-\d{2}\s+.*/g,"");
  // Rimuovi blocchi con UEN, Wechat, codici, sequenze di simboli/numeri
  s=s.replace(/UEN:\s*\S+/gi,"");
  s=s.replace(/Wechat:\s*\S+/gi,"");
  s=s.replace(/WeChat:\s*\S+/gi,"");
  s=s.trim();
  // Se il testo residuo è troppo corto o è solo simboli/numeri → non è una nota utile
  const clean=s.replace(/[^a-zA-ZÀ-ÿ]/g,"");
  if(clean.length<3) return "";
  // Se il rapporto simboli/lettere è troppo alto → probabile spazzatura OCR
  const letters=s.replace(/[^a-zA-ZÀ-ÿ\s]/g,"").length;
  const total=s.length;
  if(total>20 && letters/total<0.4) return "";
  return s;
}
function getFilteredCards(){
  let cards=[...allCards];
  const q=(document.getElementById("searchInput").value||"").toLowerCase();
  if(q) cards=cards.filter(c=>
    (c.company_name||"").toLowerCase().includes(q)||
    (c.contact_name||"").toLowerCase().includes(q)||
    (c.email||"").toLowerCase().includes(q)||
    (c.city||"").toLowerCase().includes(q)||
    (c.country||"").toLowerCase().includes(q)||
    (c._match?.partner?.company_name||"").toLowerCase().includes(q)
  );
  if(currentFilter!=="all") cards=cards.filter(c=>c._match?.type===currentFilter);
  if(currentCountryFilter) cards=cards.filter(c=>(c.country_code||"").toUpperCase()===currentCountryFilter);
  if(notesFilterActive) cards=cards.filter(c=>getUserNotes(c.notes));
  cards=sortCards(cards);
  return cards;
}

async function deleteSingleCard(id){
  console.log("deleteSingleCard called, id=", id, typeof id);
  if(!id && id!==0) { console.error("No id"); return; }
  const card=allCards.find(c=>String(c.id)===String(id));
  const label=card?(card.company_name||card.contact_name||String(id)):String(id);
  if(!confirm("Eliminare '"+label+"'?")) return;
  try{
    const url=SUPABASE_URL+"/rest/v1/wca_business_cards?id=eq."+id;
    console.log("DELETE", url);
    const r=await fetch(url,{
      method:"DELETE",headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Prefer":"return=minimal"}
    });
    console.log("DELETE response:", r.status, r.statusText);
    if(r.ok){
      allCards=allCards.filter(c=>String(c.id)!==String(id));
      selectedIds.delete(id);
      renderAll();
    } else { const t=await r.text(); console.error("DELETE fail:", t); alert("Errore: "+t); }
  }catch(e){ console.error("DELETE error:", e); alert("Errore: "+e.message); }
}

async function deleteSelected(){
  if(!selectedIds.size) return;
  if(!confirm("Cancellare "+selectedIds.size+" contatti selezionati?")) return;
  const ids=[...selectedIds];
  let deleted=0, errors=0;
  for(const id of ids){
    try{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/wca_business_cards?id=eq.${id}`,{
        method:"DELETE",headers:{...SB_HEADERS,"Prefer":"return=minimal"}
      });
      if(r.ok) deleted++; else { console.error("Delete fail",id,await r.text()); errors++; }
    }catch(e){ console.error("Delete error:",e); errors++; }
  }
  // Remove from local array (compare as strings for safety)
  const idSet=new Set(ids.map(String));
  allCards=allCards.filter(c=>!idSet.has(String(c.id)));
  selectedIds.clear();
  renderAll();
  if(errors) alert("Cancellati "+deleted+", errori: "+errors);
}

let flagCountries=[]; // [{cc,name,count}] sorted by count desc
function buildFlagCountries(){
  const map={};
  for(const c of allCards){
    const cc=(c.country_code||"").toUpperCase();
    if(!cc||cc.length!==2) continue;
    if(!map[cc]) map[cc]={cc,name:c.country||cc,count:0};
    map[cc].count++;
  }
  flagCountries=Object.values(map).sort((a,b)=>b.count-a.count);
}
function renderFlagRow(){
  const wrap=document.getElementById("flagCarousel");

function renderFlagTrack(){
  const track=document.getElementById("flagTrack");

    const sel=currentCountryFilter===f.cc?"selected":"";
    html+=`<div class="flag-chip ${sel}" onclick="filterByCountry('${f.cc}')" title="${esc(f.name)}">

      <span class="flag-label">${esc(f.name)}</span>

function scrollFlagToCenter(){
  if(!currentCountryFilter) return;

  // Scroll so the selected chip is centered

async function confirmImport(){
  if(!pendingRows.length) return;
  const eventName=(document.getElementById("selEvent").value||document.getElementById("txtEventName").value).trim();
  const contactDate=document.getElementById("txtContactDate").value||null;
  const uploadDate=new Date().toISOString();

  let cards=mapRows(pendingRows, pendingFile?.name||"import");
  // Deduplicate by company+name+email key
  const seen=new Set();
  cards=cards.filter(c=>{
    const key=(c.company_name||"").toLowerCase().trim()+"||"+(c.contact_name||"").toLowerCase().trim()+"||"+(c.email||"").toLowerCase().trim();
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  // Also skip if already in DB (but never skip cards with all-empty key fields)
  const dbKeys=new Set(allCards.map(c=>(c.company_name||"").toLowerCase().trim()+"||"+(c.contact_name||"").toLowerCase().trim()+"||"+(c.email||"").toLowerCase().trim()));
  const beforeDedup=cards.length;
  cards=cards.filter(c=>{
    const cn=(c.company_name||"").toLowerCase().trim();
    const nm=(c.contact_name||"").toLowerCase().trim();
    const em=(c.email||"").toLowerCase().trim();
    if(!cn&&!nm&&!em) return true;
    return !dbKeys.has(cn+"||"+nm+"||"+em);
  });
  const skipped=beforeDedup-cards.length;
  if(skipped>0&&cards.length>0) console.log(`Import: ${cards.length} nuovi, ${skipped} duplicati saltati`);
  if(!cards.length){
    const totalParsed=mapRows(pendingRows, pendingFile?.name||"import").length;
    if(confirm(`Tutti i ${totalParsed} contatti corrispondono a record già presenti nel database (stessi nome+azienda+email).\n\nVuoi importarli comunque come duplicati?`)){
      // Force re-import: bypass dedup
      cards=mapRows(pendingRows, pendingFile?.name||"import");
      const seen2=new Set();
      cards=cards.filter(c=>{
        const key=(c.company_name||"").toLowerCase().trim()+"||"+(c.contact_name||"").toLowerCase().trim()+"||"+(c.email||"").toLowerCase().trim();
        if(seen2.has(key)) return false; seen2.add(key); return true;
      });
    } else { cancelImport(); return; }
  }
  // Store event info in notes (event_name/contact_date/upload_date don't exist in DB schema)
  for(const c of cards){
    const meta=[];
    if(eventName) meta.push("Evento: "+eventName);
    if(contactDate) meta.push("Data: "+contactDate);
    if(c.notes) meta.push(c.notes);
    c.notes=meta.join(" | ");
  }

  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/wca_business_cards`,{
      method:"POST", headers:{...SB_HEADERS,"Prefer":"return=representation"},
      body:JSON.stringify(cards)
    });
    if(r.ok){
      const saved=await r.json();
      for(const card of saved){ card._match=matchCard(card,allPartners); allCards.unshift(card); }
      cancelImport();
      renderAll();
    } else {
      const err=await r.text(); alert("Errore: "+err);
    }
  }catch(e){ alert("Errore: "+e.message); }
}

// ==================== FALLBACK CSV PARSER (no AI) ====================
function parseCSVFallback(text){
  text=text.replace(/\uFEFF/g,"");
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return [];
  // Auto-detect separator: ; or , or \t
  const firstLine=lines[0];
  const sep=firstLine.includes("\t")?"\t":(firstLine.split(";").length>=firstLine.split(",").length?";":","  );
  console.log("CSV separator detected:", JSON.stringify(sep), "columns:", firstLine.split(sep).length);
  const headers=lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,""));
  const results=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i];
    // Smart split: respect quoted fields containing separator
    const fields=[];
    let current="", inQuote=false;
    for(let j=0;j<line.length;j++){
      const ch=line[j];
      if(ch==='"'){ inQuote=!inQuote; continue; }
      if(ch===sep&&!inQuote){ fields.push(current.trim()); current=""; continue; }
      current+=ch;
    }
    fields.push(current.trim());
    // Build row object from headers
    const row={};
    for(let h=0;h<headers.length;h++) row[headers[h]]=fields[h]||"";
    // Skip garbage OCR rows
    const allVals=Object.values(row).join("");
    const special=(allVals.match(/[=|{}\\<>_~^#\[\]]/g)||[]).length;
    if(special/Math.max(allVals.length,1)>0.12) continue;
    // Skip empty rows — check all values, not just specific header names
    const anyValue=Object.values(row).some(v=>v&&v.trim().length>1);
    if(!anyValue) continue;
    results.push(row);
  }
  return results;
}

// ==================== AI-POWERED CSV PARSER ====================
async function parseWithAI(text, fileName){
  text=text.replace(/\uFEFF/g,"");
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return [];
  const header=lines[0];
  const dataLines=lines.slice(1);

  // Process in batches of 5 rows to stay within token limits
  const BATCH=5;
  const allResults=[];

async function parseExcel(file){

}

function inferCountry(email, phone, company, website, notes, address){
  // 1. Phone prefix
  if(phone){
    const clean=phone.replace(/[\s\-().]/g,"").replace(/^00/,"+").replace(/^\+/,"");
    for(const [prefix,country] of Object.entries(PHONE_PREFIX_COUNTRY).sort((a,b)=>b[0].length-a[0].length)){
      if(clean.startsWith(prefix)) return country;
    }
  }
  // 2. Email domain TLD
  if(email){
    const parts=email.split("@");
    if(parts[1]){
      const tld=parts[1].split(".").pop().toLowerCase();
      if(EMAIL_DOMAIN_COUNTRY[tld]) return EMAIL_DOMAIN_COUNTRY[tld];
      // Check second-level (.co.uk etc)
      const tlds=parts[1].split(".");
      if(tlds.length>=3){
        const tld2=tlds.slice(-2).join(".");
        if(tld2==="co.uk"||tld2==="org.uk") return "UK";
        if(tld2==="co.jp") return "Japan";
        if(tld2==="co.kr") return "South Korea";
        if(tld2==="co.in") return "India";
        if(tld2==="co.za") return "South Africa";
        if(tld2==="com.au") return "Australia";
        if(tld2==="com.br") return "Brazil";
        if(tld2==="com.mx") return "Mexico";
        if(tld2==="com.sg") return "Singapore";
        if(tld2==="com.my") return "Malaysia";
        if(tld2==="com.hk") return "Hong Kong";
        if(tld2==="co.th") return "Thailand";
      }
    }
  }
  // 3. Company suffix
  if(company){
    const lc=company.toLowerCase();
    for(const [suffix,country] of Object.entries(COMPANY_SUFFIX_COUNTRY)){
      if(lc.includes(suffix)) return country;
    }
  }
  // 4. Website TLD
  if(website){
    const tld=website.split(".").pop().toLowerCase().replace(/\//g,"");
    if(EMAIL_DOMAIN_COUNTRY[tld]) return EMAIL_DOMAIN_COUNTRY[tld];
  }
  return "";
}
function inferCity(address, notes, country){
  // Try to extract city from address (usually after first comma or last part)
  if(address){
    const parts=address.split(",").map(s=>s.trim()).filter(Boolean);
    if(parts.length>=2){
      // City is usually the second-to-last or last meaningful part
      const candidate=parts[parts.length>=3?parts.length-2:parts.length-1];
      if(candidate&&candidate.length>2&&!/^\d+$/.test(candidate)) return candidate;
    }
  }
  return "";
}

function mapRows(rows, fileName){
  const keys=Object.keys(rows[0]||{});
  const find=(patterns)=>keys.find(k=>patterns.some(p=>k.toLowerCase().includes(p)))||"";
  const colCompany=find(["azienda","company","società","societa","organization","organisation","firm","ditta","agency"]);
  const colName=find(["nome","name","contact","contatto","person","persona","full name","fullname"]);
  const colFirstName=find(["first name","given"]);
  const colLastName=find(["last name","cognome","family","surname"]);
  const colEmail=find(["email","e-mail","mail"]);
  const colPhone=find(["cellulare","phone","telefono","tel","mobile","cell"]);
  const colPhone2=find(["tel. fisso","fisso","landline","office phone"]);
  const colFax=find(["fax"]);
  const colCountry=find(["paese","country","nazione"]);
  const colCity=find(["città","city","citta","town"]);
  const colPosition=find(["ruolo","position","posizione","title","titolo","role","job"]);
  const colWebsite=find(["web","website","sito","url","site"]);
  const colNotes=find(["note","notes","appunti","comment"]);
  const colAddress=find(["indirizzo","address","via"]);
  const colProvince=find(["provincia","province","state","stato"]);
  const colZip=find(["cap","zip","postal","postcode"]);
  const colLinkedIn=find(["linkedin"]);
  const colLogo=find(["logo"]);
  const colDate=find(["data","date"]);

  // Helper: detect garbage OCR text (too many special chars, no real words)
  function isGarbage(s){
    if(!s||s.length<3) return false;
    const special=(s.match(/[=|{}\\<>_~^#\[\]]/g)||[]).length;
    return special/s.length>0.15;
  }
  return rows.map(r=>{
    let cn=colName?r[colName]:"";
    if(!cn&&colFirstName) cn=((r[colFirstName]||"")+" "+(r[colLastName]||"")).trim();
    const company=colCompany?r[colCompany]:"";
    const email=colEmail?r[colEmail]:"";
    // Skip rows where name or company is OCR garbage
    if(isGarbage(cn)&&isGarbage(company)) return null;
    // Clean phone: take first number only if field has OCR junk
    let phone=colPhone?r[colPhone]:"";
    if(phone&&isGarbage(phone)){ const m=phone.match(/[\d\s()+-]+/); phone=m?m[0].trim():""; }
    let phone2=colPhone2?r[colPhone2]:"";
    if(phone2&&isGarbage(phone2)){ const m=phone2.match(/[\d\s()+-]+/); phone2=m?m[0].trim():""; }
    // Use first email if multiple separated by comma
    const cleanEmail=(email.split(",")[0]||"").trim();
    // Clean website
    let web=colWebsite?r[colWebsite]:"";
    if(web&&isGarbage(web)) web="";
    // Build notes without OCR garbage; include address/province/zip in notes
    let notes=colNotes?r[colNotes]:"";
    if(isGarbage(notes)) notes="";
    const addr=colAddress?r[colAddress]:"";
    const prov=colProvince?r[colProvince]:"";
    const zipVal=colZip?r[colZip]:"";
    const addrParts=[addr,prov,zipVal].filter(Boolean).join(", ");
    if(addrParts&&!isGarbage(addrParts)) notes=(notes?notes+"\n":"")+addrParts;
    let country=colCountry?r[colCountry]:"";
    let city=colCity?r[colCity]:"";
    let countryInferred=false, cityInferred=false;

    // Infer country if missing
    if(!country){
      const inf=inferCountry(cleanEmail, phone||phone2, company, web, notes, addr);
      if(inf){ country=inf; countryInferred=true; }
    }
    // Infer city if missing
    if(!city){
      const inf=inferCity(addr, notes, country);
      if(inf){ city=inf; cityInferred=true; }
    }
    // Mark inferred values
    if(countryInferred) country=country+" [presunto]";
    if(cityInferred) city=city+" [presunto]";

    return {
      company_name:company, contact_name:cn,
      email:cleanEmail, phone:phone||(phone2||""),
      country:country, country_code:resolveCountryCode(country.replace(" [presunto]","")),
      city:city, position:colPosition?r[colPosition]:"",
      website:web, notes:notes,
      source_file:fileName,
    };
  }).filter(c=>c&&(c.company_name||c.contact_name||c.email));
}

          method:"DELETE",headers:{...SB_HEADERS,"Prefer":"return=minimal"}
        }).catch(()=>{});

// ==================== AUTO-CLEANUP CORRUPTED DATA ====================
function cleanCorruptedCards(){
  // Detect and fix cards where entire CSV row was stored in company_name
  let fixed=0;
  for(const card of allCards){
    const cn=card.company_name||"";
    // If company_name contains semicolons, it's a corrupted raw CSV row
    if(cn.includes(";") && cn.split(";").length>=3){
      const parts=cn.split(";");
      // Try to re-parse: Nome;Azienda;Ruolo;Email;Tel;...
      // Detect which part looks like an email
      let emailIdx=parts.findIndex(p=>/\S+@\S+\.\S+/.test(p.trim()));
      if(emailIdx>=2){
        // Pattern: name;company;role;email;phone;...
        card.contact_name=parts[0]?.trim()||card.contact_name;
        card.company_name=parts[1]?.trim()||"";
        card.position=parts[2]?.trim()||card.position;
        card.email=(parts[emailIdx]?.trim().split(",")[0])||card.email;
        if(parts[emailIdx+1]) card.phone=parts[emailIdx+1]?.trim()||card.phone;
      } else if(parts.length>=2){
        // At minimum: name;company
        card.contact_name=parts[0]?.trim()||card.contact_name;
        card.company_name=parts[1]?.trim()||"";
        if(parts[2]) card.position=parts[2]?.trim()||"";
      }
      // Clean garbage from all fields
      cleanCardField(card,"contact_name");
      cleanCardField(card,"company_name");
      cleanCardField(card,"position");
      cleanCardField(card,"phone");
      cleanCardField(card,"email");
      cleanCardField(card,"city");
      cleanCardField(card,"notes");
      // Resolve country code if country present
      if(card.country && !card.country_code) card.country_code=resolveCountryCode(card.country);
      fixed++;
    }
    // Also clean phone numbers that start with -
    if(card.phone && card.phone.startsWith("-")){
      card.phone=card.phone.replace(/^-+/,"");
    }
  }
  if(fixed) console.log("Auto-cleaned "+fixed+" corrupted cards");
  // Remove completely garbage cards (name AND company are unreadable)
  allCards=allCards.filter(c=>{
    const cn=c.company_name||"";
    const nm=c.contact_name||"";
    return !isGarbageText(cn)||!isGarbageText(nm);
  });
}
function isGarbageText(s){
  if(!s||s.length<3) return false;
  const special=(s.match(/[=|{}\\<>_~^#\[\]]/g)||[]).length;
  return special/s.length>0.12;
}
function cleanCardField(card,field){
  let v=card[field]||"";
  if(isGarbageText(v)){ card[field]=""; return; }
  // Remove leading/trailing quotes and junk
  v=v.replace(/^["']+|["']+$/g,"").trim();
  card[field]=v;
}

let editingNoteId=null;
function openNotes(cardId){
  const card=allCards.find(c=>c.id===cardId);
  if(!card) return;
  editingNoteId=cardId;
  document.getElementById("notesTitle").textContent="Note — "+(card.company_name||card.contact_name||"Contatto");
  document.getElementById("notesTextarea").value=card.notes||"";
  document.getElementById("notesOverlay").classList.add("open");
  setTimeout(()=>document.getElementById("notesTextarea").focus(),100);
}
function closeNotes(){
  document.getElementById("notesOverlay").classList.remove("open");
  editingNoteId=null;
}
async function saveNotes(){
  if(!editingNoteId) return;
  const newNotes=document.getElementById("notesTextarea").value.trim();
  const card=allCards.find(c=>c.id===editingNoteId);
  if(!card) return;
  // Update in Supabase
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/wca_business_cards?id=eq.${editingNoteId}`,{
      method:"PATCH",
      headers:{...SB_HEADERS,"Prefer":"return=minimal"},
      body:JSON.stringify({notes:newNotes})
    });
    if(r.ok){
      card.notes=newNotes;
      closeNotes();
      renderPage();
    } else {
      const err=await r.text();
      alert("Errore salvataggio: "+err);
    }
  }catch(e){ alert("Errore: "+e.message); }
}

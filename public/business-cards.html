<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WCA Business Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-page: #0e0e18;
  --bg-card: #1a1a2e;
  --bg-input: #12121e;
  --bg-header: rgba(26,26,46,0.92);
  --text-primary: #e2e8f0;
  --text-secondary: #a0aec0;
  --text-muted: #64748b;
  --border-color: rgba(99,102,241,0.15);
  --border-subtle: rgba(99,102,241,0.08);
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-soft: rgba(99,102,241,0.15);
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --sky: #0ea5e9;
  --card-radius: 12px;
  --gradient: linear-gradient(135deg, #6366f1, #818cf8, #a5b4fc);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"SF Pro Display","Geist",'Inter',system-ui,sans-serif;background:var(--bg-page);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column}

.topbar{background:var(--bg-header);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.07);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;flex-wrap:wrap}
.topbar h1{font-size:1.1rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.topbar input,.topbar select{padding:7px 12px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-input);color:var(--text-primary);font-size:.8rem;outline:none;transition:border-color .2s}
.topbar input:focus{border-color:var(--accent)}
.topbar .stats{margin-left:auto;font-size:.72rem;color:var(--text-muted);display:flex;gap:12px}
.topbar .stats strong{color:var(--text-primary)}
.btn{padding:6px 14px;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--text-primary);text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-back{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)}
.btn-back:hover{background:rgba(255,255,255,0.08)}
.btn-accent{background:var(--accent-soft);color:#a5b4fc;border:1px solid rgba(99,102,241,0.25)}
.btn-accent:hover{background:rgba(99,102,241,0.25)}
.btn-danger{background:rgba(239,68,68,0.1);color:#fca5a5;border:1px solid rgba(239,68,68,0.2)}
.btn-danger:hover{background:rgba(239,68,68,0.2)}

.main-wrap{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.filter-sidebar{width:240px;background:var(--bg-card);overflow-y:auto;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.07)}
.filter-sidebar h3{padding:12px 14px 8px;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:#6366f1;border-bottom:1px solid var(--border-subtle);font-weight:700}
.filter-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:.8rem;border-bottom:1px solid rgba(255,255,255,0.03);transition:all .15s;color:var(--text-secondary)}
.filter-item:hover{background:rgba(99,102,241,0.08);color:var(--text-primary)}
.filter-item.active{background:rgba(99,102,241,0.15);color:#fff;font-weight:600;border-left:3px solid var(--accent)}
.filter-icon{font-size:1rem;flex-shrink:0}
.filter-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.76rem}
.filter-count{font-size:.65rem;padding:2px 8px;border-radius:10px;min-width:24px;text-align:center;background:rgba(255,255,255,0.05);color:var(--text-muted)}
.filter-count.has{background:rgba(99,102,241,0.2);color:#a5b4fc;font-weight:600}
.filter-date{font-size:.6rem;color:var(--text-muted);margin-top:1px}

/* PAGE */
.page-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-page);position:relative}
.page-header{background:rgba(26,26,46,0.6);backdrop-filter:blur(12px);padding:14px 24px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.page-header .page-icon{font-size:2rem}
.page-header .page-title{font-size:1.15rem;font-weight:700;color:var(--text-primary)}
.page-header .page-subtitle{font-size:.75rem;color:var(--text-muted)}

/* EVENT TABS */
.event-tabs{display:flex;gap:0;padding:0 24px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(26,26,46,0.3);overflow-x:auto;flex-shrink:0}
.event-tab{padding:10px 18px;font-size:.78rem;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.event-tab:hover{color:var(--text-primary);background:rgba(99,102,241,0.05)}
.event-tab.active{color:#a5b4fc;border-bottom-color:#6366f1;background:rgba(99,102,241,0.08)}
.event-tab .tab-count{font-size:.62rem;background:rgba(99,102,241,0.2);color:#a5b4fc;padding:1px 6px;border-radius:8px;margin-left:6px}

/* DROPZONE */
.dropzone{border:2px dashed rgba(99,102,241,0.3);border-radius:14px;padding:32px 20px;text-align:center;color:var(--text-muted);font-size:.85rem;cursor:pointer;transition:all .3s;background:rgba(99,102,241,0.03);margin:20px 24px}
.dropzone:hover,.dropzone.dragover{border-color:#6366f1;background:rgba(99,102,241,0.08);color:var(--text-primary)}

/* IMPORT FORM */
.import-form{padding:16px 24px;background:rgba(99,102,241,0.04);border-bottom:1px solid rgba(99,102,241,0.12);display:none;gap:12px;flex-wrap:wrap;align-items:end}
.import-form label{font-size:.72rem;color:var(--text-secondary);font-weight:600;display:flex;flex-direction:column;gap:4px}
.import-form input,.import-form select{padding:7px 12px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-input);color:var(--text-primary);font-size:.8rem;outline:none}
.import-form input:focus,.import-form select:focus{border-color:var(--accent)}

/* CARDS GRID — glassmorphism */
.card-lines{flex:1;overflow-y:auto;padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;align-content:start}
.bc-card{background:rgba(255,255,255,0.04);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px 18px;transition:all .25s;cursor:default;position:relative;overflow:hidden}
.bc-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(99,102,241,0.3),transparent);opacity:0;transition:opacity .3s}
.bc-card:hover{background:rgba(99,102,241,0.06);border-color:rgba(99,102,241,0.2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3),0 0 20px rgba(99,102,241,0.06)}
.bc-card:hover::before{opacity:1}
.bc-card .card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bc-card .card-flag{font-size:1.8rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.bc-card .card-company{font-size:.95rem;font-weight:800;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.2px}
.bc-card .card-match{flex-shrink:0}
.bc-card .card-person{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bc-card .person-name{font-size:.82rem;font-weight:600;color:var(--text-secondary)}
.bc-card .person-role{font-size:.68rem;color:var(--text-muted);font-style:italic}
.bc-card .card-fields{display:flex;flex-direction:column;gap:3px}
.bc-card .card-field{font-size:.72rem;color:var(--text-muted);display:flex;align-items:center;gap:6px;overflow:hidden}
.bc-card .card-field .f-icon{flex-shrink:0;width:16px;text-align:center;font-size:.72rem}
.bc-card .card-field .f-label{font-size:.62rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;min-width:42px;flex-shrink:0}
.bc-card .card-field .f-val{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc-card .card-field a{color:#818cf8;text-decoration:none}
.bc-card .card-field a:hover{text-decoration:underline}
.bc-card .card-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05)}
.bc-card .card-event{font-size:.62rem;padding:2px 8px;border-radius:6px;background:rgba(99,102,241,0.1);color:#a5b4fc;border:1px solid rgba(99,102,241,0.15);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc-card .card-date{font-size:.6rem;color:var(--text-muted)}
.match-badge{font-size:.62rem;font-weight:700;padding:3px 10px;border-radius:8px;white-space:nowrap;letter-spacing:.3px}
.match-badge.found{background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(16,185,129,0.08));color:#6ee7b7;border:1px solid rgba(16,185,129,0.3);box-shadow:0 2px 8px rgba(16,185,129,0.1)}
.match-badge.partial{background:linear-gradient(135deg,rgba(245,158,11,0.15),rgba(245,158,11,0.08));color:#fbbf24;border:1px solid rgba(245,158,11,0.3);box-shadow:0 2px 8px rgba(245,158,11,0.1)}
.match-badge.not-found{background:rgba(239,68,68,0.06);color:#fca5a5;border:1px solid rgba(239,68,68,0.12)}
.match-sub{font-size:.55rem;color:var(--text-muted);margin-top:2px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* SORT BAR */
.sort-bar{display:flex;gap:6px;padding:8px 24px;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center;flex-wrap:wrap}
.sort-bar label{font-size:.68rem;color:var(--text-muted);font-weight:600}
.sort-btn{padding:3px 10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);border-radius:6px;color:var(--text-secondary);font-size:.68rem;cursor:pointer;transition:all .15s}
.sort-btn:hover{background:rgba(99,102,241,0.1);color:#a5b4fc}
.sort-btn.active{background:rgba(99,102,241,0.15);color:#a5b4fc;border-color:rgba(99,102,241,0.3)}

/* STATS BAR */
.stats-bar{display:flex;gap:10px;padding:10px 24px;border-bottom:1px solid rgba(255,255,255,0.04);flex-wrap:wrap}
.stat-chip{font-size:.72rem;padding:4px 14px;border-radius:8px;font-weight:600}
.stat-chip.total{background:rgba(255,255,255,0.04);color:var(--text-secondary)}
.stat-chip.matched{background:rgba(16,185,129,0.12);color:#6ee7b7}
.stat-chip.partial-stat{background:rgba(245,158,11,0.12);color:#fbbf24}
.stat-chip.unmatched{background:rgba(239,68,68,0.08);color:#fca5a5}

.letter-index{width:28px;background:var(--bg-card);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4px 0;overflow-y:auto;flex-shrink:0;border-left:1px solid rgba(255,255,255,0.06)}
.letter-index a{color:var(--text-muted);font-size:.62rem;font-weight:600;padding:2px 0;text-decoration:none;display:block;width:100%;text-align:center;line-height:1.4;transition:all .15s}
.letter-index a:hover{color:#a5b4fc;background:rgba(99,102,241,0.1)}
.letter-index a.has-entries{color:#a5b4fc;font-size:.68rem}

.empty-page{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text-muted);font-size:.9rem;gap:8px}

@media(max-width:768px){
  .filter-sidebar{width:60px}
  .filter-name,.filter-count,.filter-date{display:none}
  .bc-card .card-fields{display:none}
  .card-lines{grid-template-columns:1fr}
  .event-tabs{padding:0 10px}
  .event-tab{padding:8px 12px;font-size:.7rem}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="btn btn-back">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
    Scraper
  </a>
  <a href="/agenda.html" class="btn btn-back">Agenda</a>
  <h1>💼 Business Cards</h1>
  <div style="position:relative;display:flex;align-items:center;gap:6px">
    <span id="aiKeyIcon" onclick="document.getElementById('aiKeyInput').focus()" style="cursor:pointer;font-size:1rem;margin-right:-28px;z-index:1;filter:grayscale(1);transition:filter .3s" title="OpenAI API Key">🤖</span>
    <input type="password" id="aiKeyInput" placeholder="OpenAI API Key..." oninput="onAiKeyChange()" style="padding:7px 12px 7px 30px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:var(--bg-input);color:var(--text-primary);font-size:.75rem;width:180px;outline:none;transition:border-color .3s">
    <span id="aiKeyStatus" style="font-size:.65rem;color:var(--text-muted);white-space:nowrap"></span>
  </div>
  <input type="text" id="searchInput" placeholder="Cerca contatto..." oninput="onSearch()" style="min-width:180px">
  <select id="filterMatch" onchange="onFilterChange()" style="min-width:100px">
    <option value="all">Tutti</option>
    <option value="found">In WCA</option>
    <option value="partial">Parziale</option>
    <option value="not-found">Non trovati</option>
  </select>
  <div class="stats">
    <span>Contatti: <strong id="statTotal">0</strong></span>
    <span>In WCA: <strong id="statMatched">0</strong></span>
    <span>Parziali: <strong id="statPartial">0</strong></span>
  </div>
</div>

<div class="main-wrap">
  <div class="filter-sidebar" id="filterSidebar">
    <h3>Eventi</h3>
  </div>

  <div class="page-area" id="pageArea">
    <div class="page-header" id="pageHeader">
      <span class="page-icon">💼</span>
      <div>
        <div class="page-title" id="pageTitle">Business Cards</div>
        <div class="page-subtitle" id="pageSubtitle">Importa contatti e confronta con i partner WCA</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:6px">
        <label class="btn btn-accent" style="cursor:pointer" id="btnImportLabel">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4m4-5 5-5 5 5m-5-5v12"/></svg>
          Importa File <input type="file" accept=".csv,.xlsx,.xls,.tsv" id="fileInput" onchange="onFileSelected(this.files[0])" style="display:none">
        </label>
        <button class="btn btn-danger" onclick="clearAll()" id="btnClear" style="display:none">Cancella tutto</button>
      </div>
    </div>

    <!-- EVENT TABS (horizontal) -->
    <div class="event-tabs" id="eventTabs" style="display:none"></div>

    <!-- IMPORT FORM (shown after file selected) -->
    <div class="import-form" id="importForm">
      <label>
        Nome Evento
        <div style="display:flex;gap:6px">
          <select id="selEvent" onchange="onEventSelect()" style="min-width:180px">
            <option value="">-- Nuovo evento --</option>
          </select>
          <input type="text" id="txtEventName" placeholder="es. Transport Logistic 2025" style="min-width:200px">
        </div>
      </label>
      <label>
        Data Contatto
        <input type="date" id="txtContactDate" value="">
      </label>
      <label>
        File selezionato
        <span id="importFileName" style="font-size:.8rem;color:var(--text-primary);padding:7px 0">—</span>
      </label>
      <button class="btn btn-accent" onclick="confirmImport()" style="align-self:end">Importa</button>
      <button class="btn btn-back" onclick="cancelImport()" style="align-self:end">Annulla</button>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar" id="statsBar" style="display:none">
      <span class="stat-chip total" id="chipTotal">0 contatti</span>
      <span class="stat-chip matched" id="chipMatched">0 in WCA</span>
      <span class="stat-chip partial-stat" id="chipPartial">0 parziali</span>
      <span class="stat-chip unmatched" id="chipUnmatched">0 non trovati</span>
    </div>

    <!-- SORT BAR -->
    <div class="sort-bar" id="sortBar" style="display:none">
      <label>Ordina:</label>
      <button class="sort-btn active" onclick="setSort('company')" id="sortCompany">Azienda A→Z</button>
      <button class="sort-btn" onclick="setSort('name')" id="sortName">Nome</button>
      <button class="sort-btn" onclick="setSort('country')" id="sortCountry">Paese</button>
      <button class="sort-btn" onclick="setSort('match')" id="sortMatch">Match WCA</button>
      <button class="sort-btn" onclick="setSort('date')" id="sortDate">Data</button>
    </div>

    <!-- DROPZONE -->
    <div class="dropzone" id="dropzone"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="handleDrop(event)"
         onclick="document.getElementById('fileInput').click()">
      <div style="font-size:3rem;margin-bottom:8px">📂</div>
      <div style="font-size:1rem;font-weight:600;margin-bottom:4px">Trascina qui un file CSV o Excel</div>
      <div style="font-size:.78rem">oppure clicca per sfogliare</div>
    </div>

    <div class="card-lines" id="cardLines"></div>
  </div>

  <div class="letter-index" id="letterIndex"></div>
</div>

<script>
const SUPABASE_URL = "https://dlldkrzoxvjxpgkkttxu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsbGRrcnpveHZqeHBna2t0dHh1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc1ODcyMDU4NCwiZXhwIjoyMDc0Mjk2NTg0fQ.py_d96kA6Mqvi0ugBm4gmIlJSoOC_KbwUM7cgDR-O_E";
const SB_HEADERS = {"Content-Type":"application/json","apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY};
let OPENAI_KEY = "";
let aiKeyTestTimer=null;
function onAiKeyChange(){
  const inp=document.getElementById("aiKeyInput");
  const icon=document.getElementById("aiKeyIcon");
  const status=document.getElementById("aiKeyStatus");
  OPENAI_KEY=inp.value.trim();
  if(!OPENAI_KEY||!OPENAI_KEY.startsWith("sk-")){
    icon.style.filter="grayscale(1)";
    inp.style.borderColor="rgba(255,255,255,0.08)";
    status.textContent="";
    return;
  }
  // Debounce: test after 500ms of no typing
  status.textContent="⏳ Test...";
  status.style.color="var(--text-muted)";
  clearTimeout(aiKeyTestTimer);
  aiKeyTestTimer=setTimeout(()=>testOpenAIKey(),500);
}
async function testOpenAIKey(){
  const inp=document.getElementById("aiKeyInput");
  const icon=document.getElementById("aiKeyIcon");
  const status=document.getElementById("aiKeyStatus");
  try{
    const r=await fetch("https://api.openai.com/v1/models",{
      headers:{"Authorization":"Bearer "+OPENAI_KEY}
    });
    if(r.ok){
      icon.style.filter="none";
      inp.style.borderColor="rgba(16,185,129,0.6)";
      status.textContent="✅ Connesso";
      status.style.color="#10b981";
    } else {
      const err=await r.json().catch(()=>({}));
      icon.style.filter="grayscale(1)";
      inp.style.borderColor="rgba(239,68,68,0.5)";
      status.textContent="❌ "+(err.error?.message||"Chiave non valida");
      status.style.color="#ef4444";
      OPENAI_KEY="";
    }
  }catch(e){
    icon.style.filter="grayscale(1)";
    inp.style.borderColor="rgba(239,68,68,0.5)";
    status.textContent="❌ Errore connessione";
    status.style.color="#ef4444";
    OPENAI_KEY="";
  }
}

let allCards = [];
let allPartners = [];
let allEvents = [];
let currentFilter = "all";
let currentEvent = "all";
let pendingFile = null;
let pendingRows = [];

function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}
function ccFlag(cc){
  if(!cc||cc.length!==2) return "🏳️";
  return String.fromCodePoint(...[...cc.toUpperCase()].map(c=>0x1F1E6+c.charCodeAt(0)-65));
}
const COUNTRY_CODES={"afghanistan":"AF","albania":"AL","algeria":"DZ","argentina":"AR","armenia":"AM","australia":"AU","austria":"AT","azerbaijan":"AZ","bahrain":"BH","bangladesh":"BD","belarus":"BY","belgium":"BE","bolivia":"BO","bosnia":"BA","brazil":"BR","brasile":"BR","brunei":"BN","bulgaria":"BG","cambodia":"KH","cameroon":"CM","canada":"CA","chile":"CL","china":"CN","cina":"CN","colombia":"CO","costa rica":"CR","croatia":"HR","cuba":"CU","cyprus":"CY","czech republic":"CZ","czechia":"CZ","denmark":"DK","danimarca":"DK","dominican republic":"DO","ecuador":"EC","egypt":"EG","egitto":"EG","el salvador":"SV","estonia":"EE","ethiopia":"ET","finland":"FI","finlandia":"FI","france":"FR","francia":"FR","georgia":"GE","germany":"DE","germania":"DE","ghana":"GH","greece":"GR","grecia":"GR","guatemala":"GT","honduras":"HN","hong kong":"HK","hungary":"HU","ungheria":"HU","iceland":"IS","india":"IN","indonesia":"ID","iran":"IR","iraq":"IQ","ireland":"IE","irlanda":"IE","israel":"IL","israele":"IL","italy":"IT","italia":"IT","ivory coast":"CI","jamaica":"JM","japan":"JP","giappone":"JP","jordan":"JO","giordania":"JO","kazakhstan":"KZ","kenya":"KE","korea":"KR","south korea":"KR","corea":"KR","corea del sud":"KR","kuwait":"KW","laos":"LA","latvia":"LV","lebanon":"LB","libano":"LB","libya":"LY","libia":"LY","lithuania":"LT","luxembourg":"LU","lussemburgo":"LU","malaysia":"MY","malesia":"MY","maldives":"MV","malta":"MT","mauritius":"MU","mexico":"MX","messico":"MX","mongolia":"MN","montenegro":"ME","morocco":"MA","marocco":"MA","mozambique":"MZ","myanmar":"MM","nepal":"NP","netherlands":"NL","paesi bassi":"NL","olanda":"NL","new zealand":"NZ","nuova zelanda":"NZ","nicaragua":"NI","nigeria":"NG","norway":"NO","norvegia":"NO","oman":"OM","pakistan":"PK","panama":"PA","panamá":"PA","paraguay":"PY","peru":"PE","perù":"PE","philippines":"PH","filippine":"PH","poland":"PL","polonia":"PL","portugal":"PT","portogallo":"PT","qatar":"QA","romania":"RO","russia":"RU","saudi arabia":"SA","arabia saudita":"SA","senegal":"SN","serbia":"RS","singapore":"SG","slovakia":"SK","slovenia":"SI","south africa":"ZA","sudafrica":"ZA","spain":"ES","spagna":"ES","sri lanka":"LK","sudan":"SD","sweden":"SE","svezia":"SE","switzerland":"CH","svizzera":"CH","syria":"SY","siria":"SY","taiwan":"TW","tanzania":"TZ","thailand":"TH","tailandia":"TH","tunisia":"TN","turkey":"TR","turchia":"TR","turkiye":"TR","uae":"AE","uganda":"UG","ukraine":"UA","ucraina":"UA","united arab emirates":"AE","emirati arabi":"AE","emirati arabi uniti":"AE","united kingdom":"GB","uk":"GB","gran bretagna":"GB","regno unito":"GB","united states":"US","usa":"US","stati uniti":"US","uruguay":"UY","uzbekistan":"UZ","venezuela":"VE","vietnam":"VN","yemen":"YE","zambia":"ZM","zimbabwe":"ZW"};
function resolveCountryCode(name){
  if(!name) return "";
  const n=name.toLowerCase().trim();
  return COUNTRY_CODES[n]||"";
}
function fmtDate(d){ if(!d) return ""; try{ return new Date(d).toLocaleDateString("it-IT",{day:"2-digit",month:"short",year:"numeric"}); }catch(e){ return d; }}

// ==================== SMART MATCHING ====================
function normalize(s){
  return (s||"").toLowerCase().trim()
    .replace(/[.,\-_/\\()'"!@#$%^&*+=\[\]{}|<>:;`~]/g," ")
    .replace(/\b(ltd|llc|inc|corp|gmbh|srl|s\.r\.l|s\.p\.a|spa|sa|ag|bv|nv|co|pvt|private|limited|international|intl|logistics|log|freight|forwarding|fwd|shipping|transport|trading|group|holding)\b/gi,"")
    .replace(/\s+/g," ").trim();
}
function extractDomain(email){
  if(!email) return "";
  const parts = email.split("@");
  return parts.length===2 ? parts[1].toLowerCase().replace(/^www\./,"") : "";
}
function normalizeWebsite(url){
  return (url||"").toLowerCase().replace(/^https?:\/\//,"").replace(/^www\./,"").replace(/\/$/,"").trim();
}
function tokenize(s){ return normalize(s).split(/\s+/).filter(t=>t.length>=2); }
function tokenOverlap(a,b){
  const tokA=tokenize(a), tokB=tokenize(b);
  if(!tokA.length||!tokB.length) return 0;
  let m=0;
  for(const t of tokA){ if(tokB.some(tb=>tb.includes(t)||t.includes(tb))) m++; }
  return m/Math.max(tokA.length,tokB.length);
}

function matchCard(card, partners){
  let bestMatch=null, bestScore=0, bestReason="";
  const cc=normalize(card.company_name), ce=(card.email||"").toLowerCase().trim(),
    cd=extractDomain(ce), cp=(card.phone||"").replace(/\D/g,""),
    cCity=normalize(card.city), cContact=normalize(card.contact_name),
    cWeb=normalizeWebsite(card.website);

  for(const p of partners){
    let score=0, reasons=[];
    const pc=normalize(p.company_name), pe=(p.email||"").toLowerCase().trim(),
      pd=extractDomain(pe), pp=(p.phone||"").replace(/\D/g,""),
      pw=normalizeWebsite(p.website),
      pCity=normalize((p.address||"").split(",").slice(-2,-1).join(""));

    if(cc&&pc&&cc===pc){ score+=50; reasons.push("azienda esatta"); }
    else if(cc&&pc){
      const ov=tokenOverlap(card.company_name,p.company_name);
      if(ov>=0.6){ score+=35; reasons.push("azienda ~"+Math.round(ov*100)+"%"); }
      else if(ov>=0.3){ score+=15; reasons.push("azienda parziale"); }
      if(pc.includes(cc)||cc.includes(pc)){ score+=20; if(!reasons.some(r=>r.includes("azienda"))) reasons.push("nome contenuto"); }
    }
    if(ce&&pe&&ce===pe){ score+=40; reasons.push("email"); }
    else if(cd&&pd&&cd===pd){ score+=25; reasons.push("dominio email"); }
    if(ce&&p.contacts){
      for(const c of p.contacts){
        if(c.email&&c.email.toLowerCase().trim()===ce){ score+=40; reasons.push("email contatto"); break; }
      }
      if(cd&&!reasons.includes("dominio email")){
        for(const c of p.contacts){ if(c.email&&extractDomain(c.email)===cd){ score+=20; reasons.push("dominio contatto"); break; }}
      }
    }
    if(cWeb&&pw&&(cWeb===pw||cWeb.includes(pw)||pw.includes(cWeb))){ score+=25; reasons.push("website"); }
    if(cd&&pw&&(pw.includes(cd)||cd.includes(pw.replace(/\..*/,"")))){ score+=15; if(!reasons.some(r=>r.includes("dominio"))) reasons.push("dominio/web"); }
    if(cp.length>=6&&pp.length>=6){
      if(cp===pp){ score+=30; reasons.push("telefono"); }
      else if(cp.slice(-8)===pp.slice(-8)){ score+=20; reasons.push("tel parziale"); }
    }
    if(cContact&&p.contacts){
      for(const c of p.contacts){
        const pn=normalize(c.name);
        if(pn&&cContact===pn){ score+=25; reasons.push("contatto trovato"); break; }
        else if(pn&&tokenOverlap(cContact,pn)>=0.5){ score+=12; reasons.push("contatto simile"); break; }
      }
    }
    if(cCity&&pCity&&(cCity.includes(pCity)||pCity.includes(cCity))){ score+=5; }

    if(score>bestScore){ bestScore=score; bestMatch=p; bestReason=reasons.join(" + "); }
  }

  let matchType="not-found";
  if(bestScore>=40) matchType="found";
  else if(bestScore>=15) matchType="partial";
  else { bestMatch=null; bestReason=""; }
  return { partner:bestMatch, score:bestScore, reason:bestReason, type:matchType };
}

async function loadPartners(){

    const r=await fetch(`${SUPABASE_URL}/rest/v1/wca_partners?select=wca_id,company_name,country_code,contacts,email,phone,website,address,logo_url&limit=10000`,{headers:SB_HEADERS});

  }catch(e){}
}
async function loadCards(){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/wca_business_cards?select=*&order=created_at.desc&limit=2000`,{headers:SB_HEADERS});
    if(r.ok) allCards=await r.json();
  }catch(e){}
}
async function loadEvents(){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/wca_bc_events?select=*&order=event_date.desc&limit=100`,{headers:SB_HEADERS});
    if(r.ok) allEvents=await r.json();
  }catch(e){ allEvents=[]; }

async function init(){
  await Promise.all([loadPartners(), loadCards(), loadEvents()]);
  console.log("Loaded:",allCards.length,"cards,",allPartners.length,"partners");
  // Fix corrupted records (entire CSV row in company_name)
  try{ cleanCorruptedCards(); }catch(e){ console.error("cleanCorruptedCards error:",e); }
  // Ensure contacts is always an array
  for(const p of allPartners){
    if(p.contacts&&typeof p.contacts==="string"){ try{p.contacts=JSON.parse(p.contacts);}catch(e){p.contacts=[];} }
    if(!Array.isArray(p.contacts)) p.contacts=[];
  }
  for(const card of allCards){
    if(!card.country_code&&card.country) card.country_code=resolveCountryCode(card.country);
    try{ card._match=matchCard(card,allPartners); }catch(e){ card._match={type:"not-found",score:0,reason:"",partner:null}; }
  }
  // Extract events from cards if events table empty
  buildEventsFromCards();
  renderAll();
  console.log("Init complete, rendered",allCards.length,"cards");
}

function buildEventsFromCards(){
  // Ensure events from cards are registered
  const eventNames=new Set(allEvents.map(e=>e.event_name));
  for(const c of allCards){
    if(c.event_name && !eventNames.has(c.event_name)){
      allEvents.push({event_name:c.event_name, event_date:c.contact_date||c.created_at, created_at:c.created_at});
      eventNames.add(c.event_name);
    }
  }
}

let currentSort="company";
function setSort(key){
  currentSort=key;
  document.querySelectorAll(".sort-btn").forEach(b=>b.classList.remove("active"));
  const btn=document.getElementById("sort"+key.charAt(0).toUpperCase()+key.slice(1));
  if(btn) btn.classList.add("active");

function sortCards(cards){
  switch(currentSort){
    case "company": return cards.sort((a,b)=>(a.company_name||"").localeCompare(b.company_name||""));
    case "name": return cards.sort((a,b)=>(a.contact_name||"").localeCompare(b.contact_name||""));
    case "country": return cards.sort((a,b)=>(a.country||a.country_code||"").localeCompare(b.country||b.country_code||""));
    case "match": return cards.sort((a,b)=>{
      const order={"found":0,"partial":1,"not-found":2};
      return (order[a._match?.type]??2)-(order[b._match?.type]??2);
    });
    case "date": return cards.sort((a,b)=>(b.contact_date||b.created_at||"").localeCompare(a.contact_date||a.created_at||""));
    default: return cards;
  }
}
function getFilteredCards(){
  let cards=[...allCards];
  if(currentEvent!=="all") cards=cards.filter(c=>(c.event_name||"Senza evento")===currentEvent);
  const q=(document.getElementById("searchInput").value||"").toLowerCase();
  if(q) cards=cards.filter(c=>
    (c.company_name||"").toLowerCase().includes(q)||
    (c.contact_name||"").toLowerCase().includes(q)||
    (c.email||"").toLowerCase().includes(q)||
    (c.city||"").toLowerCase().includes(q)||
    (c.event_name||"").toLowerCase().includes(q)||
    (c._match?.partner?.company_name||"").toLowerCase().includes(q)
  );
  if(currentFilter!=="all") cards=cards.filter(c=>c._match?.type===currentFilter);
  cards=sortCards(cards);
  return cards;
}

function buildLetterIndex(){

  for(const c of cards){ const f=(c.company_name||"")[0]?.toUpperCase()||"#"; used.add(/[A-Z]/.test(f)?f:"#"); }
  idx.innerHTML="ABCDEFGHIJKLMNOPQRSTUVWXYZ#".split("").map(l=>{
    const cls=used.has(l)?"has-entries":"";
    return `<a href="#" class="${cls}" onclick="event.preventDefault();scrollToLetter('${l}')">${l}</a>`;
  }).join("");
}
function scrollToLetter(letter){
  const cards=getFilteredCards();
  const idx=cards.findIndex(c=>{const f=(c.company_name||"")[0]?.toUpperCase()||"#";return(/[A-Z]/.test(f)?f:"#")===letter;});
  if(idx<0) return;
  const els=document.querySelectorAll(".bc-card");
  if(els[idx]) els[idx].scrollIntoView({behavior:"smooth",block:"center"});
}

  });
  // Also skip if already in DB
  const dbKeys=new Set(allCards.map(c=>(c.company_name||"").toLowerCase().trim()+"||"+(c.contact_name||"").toLowerCase().trim()+"||"+(c.email||"").toLowerCase().trim()));
  cards=cards.filter(c=>{
    const key=(c.company_name||"").toLowerCase().trim()+"||"+(c.contact_name||"").toLowerCase().trim()+"||"+(c.email||"").toLowerCase().trim();
    return !dbKeys.has(key);
  });
  if(!cards.length){ alert("Tutti i contatti sono già presenti nel database."); cancelImport(); return; }
  // Add event info
  for(const c of cards){
    c.event_name=eventName||null;
    c.contact_date=contactDate;
    c.upload_date=uploadDate;
  }

  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/wca_business_cards`,{
      method:"POST", headers:{...SB_HEADERS,"Prefer":"return=representation"},
      body:JSON.stringify(cards)
    });
    if(r.ok){
      const saved=await r.json();
      for(const card of saved){ card._match=matchCard(card,allPartners); allCards.unshift(card); }
      // Save event if new
      if(eventName && !allEvents.some(e=>e.event_name===eventName)){
        const ev={event_name:eventName, event_date:contactDate, created_at:uploadDate};
        await fetch(`${SUPABASE_URL}/rest/v1/wca_bc_events`,{
          method:"POST", headers:{...SB_HEADERS,"Prefer":"return=minimal"},
          body:JSON.stringify(ev)
        }).catch(()=>{});
        allEvents.push(ev);
      }
      cancelImport();
      renderAll();
    } else {
      const err=await r.text(); alert("Errore: "+err);
    }
  }catch(e){ alert("Errore: "+e.message); }
}

// ==================== FALLBACK CSV PARSER (no AI) ====================
function parseCSVFallback(text){
  text=text.replace(/\uFEFF/g,"");
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return [];
  const headers=lines[0].split(";").map(h=>h.trim().replace(/^"|"$/g,""));
  const results=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i];
    // Smart split: respect quoted fields containing semicolons
    const fields=[];
    let current="", inQuote=false;
    for(let j=0;j<line.length;j++){
      const ch=line[j];
      if(ch==='"'){ inQuote=!inQuote; continue; }
      if(ch===";"&&!inQuote){ fields.push(current.trim()); current=""; continue; }
      current+=ch;
    }
    fields.push(current.trim());
    // Build row object from headers
    const row={};
    for(let h=0;h<headers.length;h++) row[headers[h]]=fields[h]||"";
    // Skip garbage OCR rows
    const allVals=Object.values(row).join("");
    const special=(allVals.match(/[=|{}\\<>_~^#\[\]]/g)||[]).length;
    if(special/Math.max(allVals.length,1)>0.12) continue;
    // Skip empty rows
    if(!row["Nome"]&&!row["Azienda"]&&!row["Email"]) continue;
    results.push(row);
  }
  return results;
}

// ==================== AI-POWERED CSV PARSER ====================
async function parseWithAI(text, fileName){
  text=text.replace(/\uFEFF/g,"");
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return [];
  const header=lines[0];
  const dataLines=lines.slice(1);

  // Process in batches of 5 rows to stay within token limits
  const BATCH=5;
  const allResults=[];
  const statusEl=document.getElementById("importFileName");

  for(let i=0;i<dataLines.length;i+=BATCH){
    const batch=dataLines.slice(i,i+BATCH);
    if(statusEl) statusEl.textContent=`AI parsing... ${i}/${dataLines.length} righe`;

    const prompt=`Sei un parser CSV esperto. Ti do l'header e alcune righe di un file CSV di biglietti da visita.
Il separatore è il punto e virgola (;).
ATTENZIONE: alcune righe hanno un campo "Note" che contiene punti e virgola interni, spesso racchiuso tra virgolette. NON splittare su quei punti e virgola.
Alcune righe contengono spazzatura OCR illeggibile (caratteri come =, |, {}, \\, >, <, simboli casuali). SCARTA completamente quelle righe — non includerle nell'output.
Per i numeri di telefono che iniziano con - (es: -18917527447) aggiungi il prefisso + se riconoscibile.

HEADER:
${header}

RIGHE:
${batch.join("\n")}

Rispondi SOLO con un JSON array di oggetti. Ogni oggetto deve avere ESATTAMENTE questi campi:
{"Nome":"","Azienda":"","Ruolo":"","Email":"","Cellulare":"","Tel_Fisso":"","Fax":"","Web":"","LinkedIn":"","Indirizzo":"","Citta":"","Paese":"","Note":"","Data":""}

NON includere campi Logo, P.IVA, C.F. — ignorali.
Le Note devono essere SOLO testo leggibile e utile (info aggiuntive sull'azienda, indirizzi secondari, WCA ID). Rimuovi tutta la spazzatura OCR dalle note.
Se una riga intera è spazzatura illeggibile, NON includerla.
Rispondi SOLO con il JSON array, nient'altro.`;

    try{
      const r=await fetch("https://api.openai.com/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+OPENAI_KEY},
        body:JSON.stringify({
          model:"gpt-4o-mini",
          temperature:0,
          messages:[{role:"user",content:prompt}],
          response_format:{type:"json_object"}
        })
      });
      if(!r.ok){ console.error("OpenAI error:",await r.text()); continue; }
      const data=await r.json();
      const content=data.choices?.[0]?.message?.content||"";
      try{
        let parsed=JSON.parse(content);
        // Handle both {rows:[...]} and [...] formats
        if(parsed&&!Array.isArray(parsed)){
          const key=Object.keys(parsed).find(k=>Array.isArray(parsed[k]));
          if(key) parsed=parsed[key]; else parsed=[];
        }
        allResults.push(...parsed);
      }catch(e){ console.error("JSON parse error:",content); }
    }catch(e){ console.error("Fetch error:",e); }
  }

  if(statusEl) statusEl.textContent=fileName+" — "+allResults.length+" contatti parsed by AI";

  // Map AI output to our standard format
  return allResults.map(r=>({
    Nome:r.Nome||"",
    Azienda:r.Azienda||"",
    Ruolo:r.Ruolo||"",
    Email:(r.Email||"").split(",")[0].trim(),
    Cellulare:r.Cellulare||"",
    "Tel. Fisso":r.Tel_Fisso||r["Tel. Fisso"]||"",
    Fax:r.Fax||"",
    Web:r.Web||"",
    LinkedIn:r.LinkedIn||"",
    Indirizzo:r.Indirizzo||"",
    "Città":r.Citta||r["Città"]||"",
    Paese:r.Paese||"",
    Note:r.Note||"",
    Data:r.Data||""
  }));
}
async function parseExcel(file){
  if(!window.XLSX){
    await new Promise((resolve,reject)=>{
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
      s.onload=resolve;s.onerror=reject;document.head.appendChild(s);
    });
  }
  const wb=XLSX.read(await file.arrayBuffer(),{type:"array"});
  return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
}
function mapRows(rows, fileName){
  const keys=Object.keys(rows[0]||{});
  const find=(patterns)=>keys.find(k=>patterns.some(p=>k.toLowerCase().includes(p)))||"";
  const colCompany=find(["azienda","company","società","societa","organization","organisation","firm","ditta","agency"]);
  const colName=find(["nome","name","contact","contatto","person","persona","full name","fullname"]);
  const colFirstName=find(["first name","given"]);
  const colLastName=find(["last name","cognome","family","surname"]);
  const colEmail=find(["email","e-mail","mail"]);
  const colPhone=find(["cellulare","phone","telefono","tel","mobile","cell"]);
  const colPhone2=find(["tel. fisso","fisso","landline","office phone"]);
  const colFax=find(["fax"]);
  const colCountry=find(["paese","country","nazione"]);
  const colCity=find(["città","city","citta","town"]);
  const colPosition=find(["ruolo","position","posizione","title","titolo","role","job"]);
  const colWebsite=find(["web","website","sito","url","site"]);
  const colNotes=find(["note","notes","appunti","comment"]);
  const colAddress=find(["indirizzo","address","via"]);
  const colProvince=find(["provincia","province","state","stato"]);
  const colZip=find(["cap","zip","postal","postcode"]);
  const colLinkedIn=find(["linkedin"]);
  const colLogo=find(["logo"]);
  const colDate=find(["data","date"]);

  // Helper: detect garbage OCR text (too many special chars, no real words)
  function isGarbage(s){
    if(!s||s.length<3) return false;
    const special=(s.match(/[=|{}\\<>_~^#\[\]]/g)||[]).length;
    return special/s.length>0.15;
  }
  return rows.map(r=>{
    let cn=colName?r[colName]:"";
    if(!cn&&colFirstName) cn=((r[colFirstName]||"")+" "+(r[colLastName]||"")).trim();
    const company=colCompany?r[colCompany]:"";
    const email=colEmail?r[colEmail]:"";
    // Skip rows where name or company is OCR garbage
    if(isGarbage(cn)&&isGarbage(company)) return null;
    // Clean phone: take first number only if field has OCR junk
    let phone=colPhone?r[colPhone]:"";
    if(phone&&isGarbage(phone)){ const m=phone.match(/[\d\s()+-]+/); phone=m?m[0].trim():""; }
    let phone2=colPhone2?r[colPhone2]:"";
    if(phone2&&isGarbage(phone2)){ const m=phone2.match(/[\d\s()+-]+/); phone2=m?m[0].trim():""; }
    // Use first email if multiple separated by comma
    const cleanEmail=(email.split(",")[0]||"").trim();
    // Clean website
    let web=colWebsite?r[colWebsite]:"";
    if(web&&isGarbage(web)) web="";
    // Build notes without OCR garbage; include address/province/zip in notes
    let notes=colNotes?r[colNotes]:"";
    if(isGarbage(notes)) notes="";
    const addr=colAddress?r[colAddress]:"";
    const prov=colProvince?r[colProvince]:"";
    const zipVal=colZip?r[colZip]:"";
    const addrParts=[addr,prov,zipVal].filter(Boolean).join(", ");
    if(addrParts&&!isGarbage(addrParts)) notes=(notes?notes+"\n":"")+addrParts;
    return {
      company_name:company, contact_name:cn,
      email:cleanEmail, phone:phone||(phone2||""),
      country:colCountry?r[colCountry]:"", country_code:resolveCountryCode(colCountry?r[colCountry]:""),
      city:colCity?r[colCity]:"", position:colPosition?r[colPosition]:"",
      website:web, notes:notes,
      source_file:fileName,
    };
  }).filter(c=>c&&(c.company_name||c.contact_name||c.email));
}

// ==================== CLEAR ====================
async function clearAll(){
  if(!confirm("Cancellare tutti i biglietti da visita?")) return;
  // Delete all rows — works with UUID ids
  await fetch(`${SUPABASE_URL}/rest/v1/wca_business_cards?id=not.is.null`,{method:"DELETE",headers:SB_HEADERS}).catch(()=>{});
  allCards=[]; renderAll();
}

// ==================== AUTO-CLEANUP CORRUPTED DATA ====================
function cleanCorruptedCards(){
  // Detect and fix cards where entire CSV row was stored in company_name
  let fixed=0;
  for(const card of allCards){
    const cn=card.company_name||"";
    // If company_name contains semicolons, it's a corrupted raw CSV row
    if(cn.includes(";") && cn.split(";").length>=3){
      const parts=cn.split(";");
      // Try to re-parse: Nome;Azienda;Ruolo;Email;Tel;...
      // Detect which part looks like an email
      let emailIdx=parts.findIndex(p=>/\S+@\S+\.\S+/.test(p.trim()));
      if(emailIdx>=2){
        // Pattern: name;company;role;email;phone;...
        card.contact_name=parts[0]?.trim()||card.contact_name;
        card.company_name=parts[1]?.trim()||"";
        card.position=parts[2]?.trim()||card.position;
        card.email=(parts[emailIdx]?.trim().split(",")[0])||card.email;
        if(parts[emailIdx+1]) card.phone=parts[emailIdx+1]?.trim()||card.phone;
      } else if(parts.length>=2){
        // At minimum: name;company
        card.contact_name=parts[0]?.trim()||card.contact_name;
        card.company_name=parts[1]?.trim()||"";
        if(parts[2]) card.position=parts[2]?.trim()||"";
      }
      // Clean garbage from all fields
      cleanCardField(card,"contact_name");
      cleanCardField(card,"company_name");
      cleanCardField(card,"position");
      cleanCardField(card,"phone");
      cleanCardField(card,"email");
      cleanCardField(card,"city");
      cleanCardField(card,"notes");
      // Resolve country code if country present
      if(card.country && !card.country_code) card.country_code=resolveCountryCode(card.country);
      fixed++;
    }
    // Also clean phone numbers that start with -
    if(card.phone && card.phone.startsWith("-")){
      card.phone=card.phone.replace(/^-+/,"");
    }
  }
  if(fixed) console.log("Auto-cleaned "+fixed+" corrupted cards");
  // Remove completely garbage cards (name AND company are unreadable)
  allCards=allCards.filter(c=>{
    const cn=c.company_name||"";
    const nm=c.contact_name||"";
    return !isGarbageText(cn)||!isGarbageText(nm);
  });
}
function isGarbageText(s){
  if(!s||s.length<3) return false;
  const special=(s.match(/[=|{}\\<>_~^#\[\]]/g)||[]).length;
  return special/s.length>0.12;
}
function cleanCardField(card,field){
  let v=card[field]||"";
  if(isGarbageText(v)){ card[field]=""; return; }
  // Remove leading/trailing quotes and junk
  v=v.replace(/^["']+|["']+$/g,"").trim();
  card[field]=v;
}

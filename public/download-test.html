<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WCA Download Test</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg-page:#0e0e18;--bg-card:#1a1a2e;--bg-input:#12121e;--bg-header:rgba(26,26,46,0.92);--text-primary:#e2e8f0;--text-secondary:#a0aec0;--text-muted:#64748b;--border-color:rgba(99,102,241,0.15);--accent:#6366f1;--accent-soft:rgba(99,102,241,0.15);--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--gradient:linear-gradient(135deg,#6366f1,#818cf8,#a5b4fc)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"SF Pro Display","Geist",'Inter',system-ui,sans-serif;background:var(--bg-page);color:var(--text-primary);min-height:100vh}
.header{background:var(--bg-header);backdrop-filter:blur(20px);padding:14px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:0;z-index:100}
.header h1{font-size:1.15rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;color:var(--text-primary)}
.btn-back{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);text-decoration:none;color:var(--text-secondary)}
.btn-go{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;font-size:.9rem;padding:12px 28px}
.btn-go:hover{filter:brightness(1.1)}
.btn-go:disabled{opacity:.4;cursor:not-allowed}
.btn-stop{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.2)}

.container{max-width:900px;margin:0 auto;padding:20px}
.card{background:var(--bg-card);border-radius:12px;border:1px solid rgba(255,255,255,0.06);padding:20px;margin-bottom:16px}
.card h2{font-size:.85rem;color:var(--text-secondary);margin-bottom:14px;font-weight:600}

.input-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.field input{background:var(--bg-input);border:1px solid var(--border-color);color:var(--text-primary);padding:10px 14px;border-radius:8px;font-size:.9rem;outline:none;width:100%}
.field input:focus{border-color:var(--accent)}
.field-wide{flex:2;min-width:200px}
.field-short{width:100px}

.network-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.net-chip{padding:6px 12px;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--text-muted);transition:all .2s;user-select:none}
.net-chip:hover{border-color:rgba(99,102,241,0.3);color:var(--text-secondary)}
.net-chip.selected{background:var(--accent-soft);color:#a5b4fc;border-color:rgba(99,102,241,0.4)}
.net-chip.all{background:rgba(16,185,129,0.1);color:#6ee7b7;border-color:rgba(16,185,129,0.2)}
.net-chip.all.selected{background:rgba(16,185,129,0.2);border-color:rgba(16,185,129,0.4)}

.progress{margin:12px 0;padding:12px 16px;border-radius:8px;font-size:.82rem;display:none;align-items:center;gap:10px}
.progress.active{display:flex;background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.15);color:#a5b4fc}
.progress.done{display:flex;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.15);color:#6ee7b7}
.progress.error{display:flex;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);color:#fca5a5}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(99,102,241,0.2);border-top-color:#818cf8;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.log{background:var(--bg-input);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px;margin-top:12px;max-height:600px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:.76rem;line-height:1.7;white-space:pre-wrap}
.log .i{color:#a5b4fc}.log .ok{color:#6ee7b7}.log .er{color:#fca5a5}.log .w{color:#fbbf24}.log .d{color:#64748b}

.result{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px;margin-top:10px}
.result h3{font-size:.85rem;font-weight:600;margin-bottom:6px}
.result .meta{font-size:.73rem;color:var(--text-muted);margin-bottom:3px}
.result .contact{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:.78rem}
.result .contact:last-child{border:none}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.66rem;font-weight:700}
.badge.ok{background:rgba(16,185,129,0.12);color:#6ee7b7}
.badge.fail{background:rgba(239,68,68,0.12);color:#fca5a5}
.badge.warn{background:rgba(245,158,11,0.12);color:#fbbf24}
.chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.chip{padding:1px 6px;border-radius:3px;font-size:.65rem;background:rgba(99,102,241,0.1);color:#a5b4fc}
.delay-bar{height:3px;background:rgba(99,102,241,0.1);border-radius:2px;margin:4px 0;overflow:hidden}
.delay-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
</style>
</head>
<body>

<div class="header">
  <a href="/" class="btn btn-back">← Scraper</a>
  <h1>Download Test</h1>
</div>

<div class="container">
  <div class="card">
    <h2>COSA VUOI SCARICARE?</h2>
    <div class="input-row">
      <div class="field field-wide">
        <label>WCA ID oppure Nome Paese</label>
        <input type="text" id="inputQuery" placeholder="es. 24995, 65706  oppure  Angola, Italy, Singapore">
      </div>
      <button class="btn btn-go" id="btnGo" onclick="startTest()">▶ TESTA</button>
      <button class="btn btn-stop" id="btnStop" onclick="stopTest()" style="display:none">■ STOP</button>
    </div>

    <h2>NETWORK (opzionale — se vuoto testa il globale)</h2>
    <div class="network-grid" id="netGrid"></div>
  </div>

  <div class="progress" id="progress"><div class="spinner"></div><span id="progressText"></span></div>
  <div class="delay-bar" id="delayBar" style="display:none"><div class="delay-fill" id="delayFill"></div></div>

  <div id="results"></div>
  <div class="log" id="log"></div>
</div>

<script>
const API = window.location.origin;
let running = false;
let aborted = false;

// ═══ DELAY PATTERN (identico a config.js) ═══
const DELAY_PATTERN = [3,3,2,3,8,3,5,3,12,3,4,3,6,3,9,3,3,3,10];
let delayIndex = 0;

function getDelay() {
  const d = DELAY_PATTERN[delayIndex % DELAY_PATTERN.length];
  delayIndex++;
  if (delayIndex % DELAY_PATTERN.length === 0) return 15000; // pausa lunga ogni ciclo
  return d * 1000;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function delayWithBar(ms) {
  const bar = document.getElementById("delayBar");
  const fill = document.getElementById("delayFill");
  bar.style.display = "block";
  fill.style.width = "0%";
  const start = Date.now();
  const tick = () => {
    const elapsed = Date.now() - start;
    const pct = Math.min(100, (elapsed / ms) * 100);
    fill.style.width = pct + "%";
    if (elapsed < ms && !aborted) requestAnimationFrame(tick);
    else bar.style.display = "none";
  };
  requestAnimationFrame(tick);
  await sleep(ms);
}

// ═══ COUNTRY NAME → ISO2 ═══
const COUNTRIES = {"afghanistan":"AF","albania":"AL","algeria":"DZ","angola":"AO","argentina":"AR","australia":"AU","austria":"AT","bahrain":"BH","bangladesh":"BD","belgium":"BE","benin":"BJ","bolivia":"BO","brazil":"BR","brunei":"BN","bulgaria":"BG","burkina faso":"BF","cambodia":"KH","cameroon":"CM","canada":"CA","chile":"CL","china":"CN","colombia":"CO","congo":"CG","costa rica":"CR","croatia":"HR","cuba":"CU","cyprus":"CY","czech republic":"CZ","denmark":"DK","dominican republic":"DO","ecuador":"EC","egypt":"EG","el salvador":"SV","estonia":"EE","ethiopia":"ET","fiji":"FJ","finland":"FI","france":"FR","gabon":"GA","germany":"DE","ghana":"GH","greece":"GR","guatemala":"GT","guinea":"GN","haiti":"HT","honduras":"HN","hong kong":"HK","hungary":"HU","iceland":"IS","india":"IN","indonesia":"ID","iran":"IR","iraq":"IQ","ireland":"IE","israel":"IL","italy":"IT","ivory coast":"CI","jamaica":"JM","japan":"JP","jordan":"JO","kazakhstan":"KZ","kenya":"KE","korea":"KR","south korea":"KR","kuwait":"KW","laos":"LA","latvia":"LV","lebanon":"LB","libya":"LY","lithuania":"LT","luxembourg":"LU","macau":"MO","madagascar":"MG","malaysia":"MY","maldives":"MV","mali":"ML","malta":"MT","mauritius":"MU","mexico":"MX","mongolia":"MN","morocco":"MA","mozambique":"MZ","myanmar":"MM","namibia":"NA","nepal":"NP","netherlands":"NL","new zealand":"NZ","nicaragua":"NI","niger":"NE","nigeria":"NG","norway":"NO","oman":"OM","pakistan":"PK","panama":"PA","paraguay":"PY","peru":"PE","philippines":"PH","poland":"PL","portugal":"PT","qatar":"QA","romania":"RO","russia":"RU","rwanda":"RW","saudi arabia":"SA","senegal":"SN","serbia":"RS","singapore":"SG","slovakia":"SK","slovenia":"SI","south africa":"ZA","spain":"ES","sri lanka":"LK","sudan":"SD","sweden":"SE","switzerland":"CH","syria":"SY","taiwan":"TW","tanzania":"TZ","thailand":"TH","togo":"TG","trinidad":"TT","tunisia":"TN","turkey":"TR","uae":"AE","uganda":"UG","ukraine":"UA","united arab emirates":"AE","united kingdom":"GB","uk":"GB","united states":"US","usa":"US","uruguay":"UY","uzbekistan":"UZ","venezuela":"VE","vietnam":"VN","zambia":"ZM","zimbabwe":"ZW"};

// ═══ NETWORKS ═══
const NETWORKS = [
  {domain:"wcaworld.com", name:"WCA World (globale)", siteId:24},
  {domain:"wcaprojects.com", name:"WCA Projects", siteId:5},
  {domain:"lognetglobal.com", name:"Lognet Global", siteId:61},
  {domain:"globalaffinityalliance.com", name:"Global Affinity", siteId:98},
  {domain:"elitegln.com", name:"Elite GLN", siteId:108},
  {domain:"ifc8.network", name:"IFC8", siteId:118},
  {domain:"wcadangerousgoods.com", name:"WCA Dangerous Goods", siteId:13},
  {domain:"wcaperishables.com", name:"WCA Perishables", siteId:15},
  {domain:"wcatimecritical.com", name:"WCA Time Critical", siteId:16},
  {domain:"wcapharma.com", name:"WCA Pharma", siteId:18},
  {domain:"wcarelocations.com", name:"WCA Relocations", siteId:22},
  {domain:"wcaecommercesolutions.com", name:"WCA eCommerce", siteId:38},
  {domain:"wcaexpo.com", name:"WCA Expo", siteId:107},
];

let selectedNets = new Set();

function initNetworks() {
  const grid = document.getElementById("netGrid");
  // "Tutti" chip
  const allChip = document.createElement("div");
  allChip.className = "net-chip all";
  allChip.textContent = "TUTTI";
  allChip.onclick = () => {
    if (selectedNets.size === NETWORKS.length) { selectedNets.clear(); }
    else { NETWORKS.forEach(n => selectedNets.add(n.domain)); }
    renderNetChips();
  };
  grid.appendChild(allChip);

  for (const n of NETWORKS) {
    const chip = document.createElement("div");
    chip.className = "net-chip";
    chip.textContent = n.name;
    chip.dataset.domain = n.domain;
    chip.onclick = () => {
      if (selectedNets.has(n.domain)) selectedNets.delete(n.domain);
      else selectedNets.add(n.domain);
      renderNetChips();
    };
    grid.appendChild(chip);
  }
}

function renderNetChips() {
  document.querySelectorAll(".net-chip").forEach(c => {
    if (c.classList.contains("all")) {
      c.classList.toggle("selected", selectedNets.size === NETWORKS.length);
    } else {
      c.classList.toggle("selected", selectedNets.has(c.dataset.domain));
    }
  });
}

// ═══ LOGGING ═══
function lg(msg, cls="") {
  const el = document.getElementById("log");
  const d = document.createElement("div");
  d.className = cls;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function setProgress(msg, state="active") {
  const p = document.getElementById("progress");
  p.className = "progress " + state;
  p.querySelector(".spinner").style.display = state === "active" ? "" : "none";
  document.getElementById("progressText").textContent = msg;
}

// ═══ RENDER RESULT ═══
function renderResult(p, networkLabel) {
  const div = document.createElement("div");
  div.className = "result";
  const st = p.state === "ok" ? "ok" : p.state === "login_redirect" ? "fail" : "warn";
  const stLabel = p.state === "ok" ? "OK" : p.state === "login_redirect" ? "LOGIN REDIRECT" : p.state === "not_found" ? "NON TROVATO" : p.state;
  let h = `<h3>${p.company_name || "ID "+p.wca_id} <span class="badge ${st}">${stLabel}</span> <span style="font-size:.7rem;color:var(--text-muted)">${networkLabel}</span></h3>`;
  if (p.email) h += `<div class="meta">Email: ${p.email}</div>`;
  if (p.phone) h += `<div class="meta">Tel: ${p.phone}</div>`;
  if (p.address) h += `<div class="meta">Addr: ${p.address}</div>`;
  if (p.access_limited) h += `<div class="meta" style="color:#fbbf24">⚠ Accesso limitato (members_only: ${p.members_only_count||0})</div>`;
  if (p.auto_retried) h += `<div class="meta" style="color:#a5b4fc">↻ Auto-retry via ${p.source_network}</div>`;
  if (p.networks?.length) { h += `<div class="chips">`; p.networks.forEach(n => h += `<span class="chip">${n}</span>`); h += `</div>`; }
  if (p.contacts?.length) {
    p.contacts.forEach(c => {
      h += `<div class="contact"><b>${c.name||"?"}</b>`;
      if (c.title) h += ` — ${c.title}`;
      if (c.email) h += ` | <span style="color:#a5b4fc">${c.email}</span>`;
      if (c.phone||c.direct_line||c.mobile) h += ` | ${c.direct_line||c.phone||c.mobile}`;
      h += `</div>`;
    });
  } else if (p.state==="ok") h += `<div class="meta" style="color:#fbbf24">⚠ Nessun contatto</div>`;
  div.innerHTML = h;
  document.getElementById("results").appendChild(div);
}

// ═══ PARSE INPUT ═══
function parseInput(raw) {
  raw = raw.trim();
  if (!raw) return null;

  // Check se sono numeri (WCA IDs)
  const nums = raw.split(/[,;\s]+/).map(s => parseInt(s.trim())).filter(n => n > 0);
  if (nums.length > 0 && nums.every(n => !isNaN(n))) {
    return { type: "ids", ids: nums };
  }

  // Check se è un codice ISO2
  if (raw.length === 2) return { type: "country", code: raw.toUpperCase() };

  // Check se è un nome paese
  const code = COUNTRIES[raw.toLowerCase()];
  if (code) return { type: "country", code };

  return null;
}

// ═══ MAIN TEST ═══
async function startTest() {
  const input = parseInput(document.getElementById("inputQuery").value);
  if (!input) { lg("Input non valido. Usa WCA ID (numeri) o nome paese.", "er"); return; }

  running = true; aborted = false; delayIndex = 0;
  document.getElementById("btnGo").style.display = "none";
  document.getElementById("btnStop").style.display = "";
  document.getElementById("results").innerHTML = "";
  document.getElementById("log").innerHTML = "";

  const nets = [...selectedNets];

  if (input.type === "ids") {
    await testByIds(input.ids, nets);
  } else {
    await testByCountry(input.code, nets);
  }

  running = false;
  document.getElementById("btnGo").style.display = "";
  document.getElementById("btnStop").style.display = "none";
}

function stopTest() {
  aborted = true; running = false;
  setProgress("Fermato", "error");
  document.getElementById("btnGo").style.display = "";
  document.getElementById("btnStop").style.display = "none";
}

// ═══ TEST PER ID ═══
async function testByIds(ids, nets) {
  // Se nessun network selezionato → testa solo globale (wcaworld.com)
  const domains = nets.length > 0 ? nets : [""];
  const total = ids.length * domains.length;
  let done = 0, ok = 0, fail = 0;

  lg(`Test ${ids.length} ID × ${domains.length || 1} network = ${total} richieste`, "i");
  lg(`Delay pattern: [${DELAY_PATTERN.join(",")}]s + 15s ogni ${DELAY_PATTERN.length} profili`, "d");

  for (const domain of domains) {
    const netLabel = domain ? (NETWORKS.find(n=>n.domain===domain)?.name||domain) : "wcaworld.com (globale)";
    lg(`\n═══ Network: ${netLabel} ═══`, "i");

    for (let i = 0; i < ids.length; i++) {
      if (aborted) return;
      const wcaId = ids[i];
      done++;
      setProgress(`${done}/${total} — ID ${wcaId} su ${netLabel}...`);
      lg(`→ Scaricando ID ${wcaId}...`, "d");

      try {
        const body = { wcaIds: [wcaId] };
        if (domain) body.networkDomain = domain;
        const r = await fetch(API + "/api/scrape", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify(body)
        });
        const d = await r.json();
        if (d.success && d.results?.length) {
          const p = d.results[0];
          renderResult(p, netLabel);
          if (p.state === "ok") { ok++; lg(`✓ ${p.company_name||wcaId} — ${p.contacts?.length||0} contatti`, "ok"); }
          else { fail++; lg(`✗ ${wcaId} — ${p.state}`, "er"); }
        } else { fail++; lg(`✗ ${wcaId} — ${d.error||"errore"}`, "er"); }
      } catch(e) { fail++; lg(`✗ ${wcaId} — ${e.message}`, "er"); }

      // Pausa WCA standard
      if (done < total && !aborted) {
        const delay = getDelay();
        lg(`⏳ Pausa ${(delay/1000).toFixed(0)}s...`, "d");
        await delayWithBar(delay);
      }
    }
  }

  setProgress(`Completato: ${ok} OK, ${fail} falliti su ${total}`, ok > 0 ? "done" : "error");
  lg(`\n═══ RISULTATO: ${ok} OK, ${fail} falliti su ${total} ═══`, ok > 0 ? "ok" : "er");
}

// ═══ TEST PER PAESE ═══
async function testByCountry(countryCode, nets) {
  lg(`Discovery paese: ${countryCode}`, "i");

  // Step 1: Discover (globale)
  setProgress(`Discovering ${countryCode}...`);
  let members = [];
  try {
    const r = await fetch(API + "/api/discover-global", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ country: countryCode })
    });
    const d = await r.json();
    members = d.members || d.data || [];
    lg(`Discovery: ${members.length} membri trovati`, members.length ? "ok" : "w");
    members.forEach(m => lg(`  • ID ${m.id||m.wca_id} — ${m.company||m.company_name||"?"}`, "d"));
  } catch(e) { lg(`Discovery fallita: ${e.message}`, "er"); setProgress("Discovery fallita", "error"); return; }

  if (!members.length) { setProgress("Nessun membro trovato", "error"); return; }

  // Step 2: Scrape ciascun membro
  const domains = nets.length > 0 ? nets : [""];
  const ids = members.map(m => m.id || m.wca_id);
  await testByIds(ids, domains);
}

// ═══ INIT ═══
initNetworks();
document.getElementById("inputQuery").addEventListener("keydown", e => { if (e.key === "Enter") startTest(); });
</script>
</body>
</html>

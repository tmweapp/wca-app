<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WCA Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-page: #0e0e18;
  --bg-card: #1a1a2e;
  --bg-input: #12121e;
  --bg-header: rgba(26,26,46,0.92);
  --text-primary: #e2e8f0;
  --text-secondary: #a0aec0;
  --text-muted: #64748b;
  --border-color: rgba(99,102,241,0.15);
  --border-subtle: rgba(99,102,241,0.08);
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-soft: rgba(99,102,241,0.15);
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --sky: #0ea5e9;
  --card-radius: 12px;
  --gradient: linear-gradient(135deg, #6366f1, #818cf8, #a5b4fc);
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"SF Pro Display","Geist",'Inter',system-ui,sans-serif;background:var(--bg-page);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:var(--bg-header);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.07);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;flex-wrap:wrap}
.topbar h1{font-size:1.1rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.topbar select,.topbar input{padding:7px 12px;border-radius:8px;border:1px solid var(--border-color);background:var(--bg-input);color:var(--text-primary);font-size:.8rem;outline:none;transition:border-color .2s}
.topbar input:focus{border-color:var(--accent)}
.topbar .stats{margin-left:auto;font-size:.72rem;color:var(--text-muted);display:flex;gap:12px}
.topbar .stats strong{color:var(--text-primary)}
.btn{padding:6px 14px;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--text-primary);text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-back{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)}
.btn-back:hover{background:rgba(255,255,255,0.08)}
.btn-accent{background:var(--accent-soft);color:#a5b4fc;border:1px solid rgba(99,102,241,0.25)}
.btn-accent:hover{background:rgba(99,102,241,0.25)}

/* SORT CONTROLS */
.sort-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sort-btn{padding:4px 10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);border-radius:6px;cursor:pointer;font-size:.72rem;color:var(--text-muted);transition:all .15s;font-family:inherit}
.sort-btn:hover{background:rgba(99,102,241,0.1);color:#a5b4fc}
.sort-btn.active{background:rgba(99,102,241,0.15);color:#a5b4fc;border-color:rgba(99,102,241,0.3);font-weight:600}

/* NETWORK FILTER */
.net-filter{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.net-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);border-radius:6px;cursor:pointer;font-size:.68rem;color:var(--text-muted);transition:all .15s}
.net-chip:hover{background:rgba(99,102,241,0.1);color:#a5b4fc}
.net-chip.active{background:rgba(99,102,241,0.18);color:#a5b4fc;border-color:rgba(99,102,241,0.3)}
.net-chip img{width:14px;height:14px;border-radius:2px;object-fit:contain}

/* LAYOUT */
.agenda-wrap{display:flex;flex:1;overflow:hidden}

/* COUNTRY SIDEBAR */
.country-sidebar{width:220px;background:var(--bg-card);overflow-y:auto;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.07)}
.country-sidebar h3{padding:12px 14px 8px;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:#6366f1;border-bottom:1px solid var(--border-subtle);font-weight:700}
.country-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:.8rem;border-bottom:1px solid rgba(255,255,255,0.03);transition:all .15s;color:var(--text-secondary)}
.country-item:hover{background:rgba(99,102,241,0.08);color:var(--text-primary)}
.country-item.active{background:rgba(99,102,241,0.15);color:#fff;font-weight:600;border-left:3px solid var(--accent)}
.country-item.empty{opacity:.3;cursor:default}
.country-flag{font-size:1.1rem}
.country-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.country-count{font-size:.65rem;padding:2px 8px;border-radius:10px;min-width:24px;text-align:center;background:rgba(255,255,255,0.05);color:var(--text-muted)}
.country-count.has{background:rgba(99,102,241,0.2);color:#a5b4fc;font-weight:600}

/* AGENDA PAGE */
.agenda-page{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-page);position:relative}
.page-header{background:rgba(26,26,46,0.6);backdrop-filter:blur(12px);padding:14px 24px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.page-header .page-flag{font-size:2rem}
.page-header .page-title{font-size:1.15rem;font-weight:700;color:var(--text-primary)}
.page-header .page-subtitle{font-size:.75rem;color:var(--text-muted)}
.page-header .page-nav{margin-left:auto;display:flex;gap:6px;align-items:center}
.page-nav button{padding:5px 14px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);border-radius:6px;cursor:pointer;font-size:.78rem;color:var(--text-secondary);transition:all .15s;font-family:inherit}
.page-nav button:hover:not(:disabled){background:rgba(99,102,241,0.12);color:#a5b4fc;border-color:rgba(99,102,241,0.25)}
.page-nav button:disabled{opacity:.25;cursor:default}

/* AGENDA LINES */
.agenda-lines{flex:1;overflow-y:auto;padding:0}
.agenda-line{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:9px 24px 9px 20px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:all .15s;min-height:44px;position:relative}
.agenda-line:hover{background:rgba(99,102,241,0.06)}
.agenda-line:nth-child(even){background:rgba(255,255,255,0.015)}
.agenda-line:nth-child(even):hover{background:rgba(99,102,241,0.06)}
.agenda-line .line-num{width:28px;font-size:.68rem;color:var(--text-muted);text-align:right;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.agenda-line .line-main{flex:1;overflow:hidden;min-width:0}
.agenda-line .line-company{font-size:.84rem;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agenda-line .line-detail{font-size:.72rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.agenda-line .line-detail .city{color:var(--text-secondary)}
.agenda-line .line-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.net-logo{width:36px;height:36px;border-radius:4px;object-fit:contain;opacity:.85;transition:opacity .15s}
.net-logo:hover{opacity:1}
.net-count-badge{font-size:.65rem;background:rgba(99,102,241,0.18);color:#a5b4fc;padding:2px 7px;border-radius:6px;font-weight:600;white-space:nowrap}
.net-row{display:flex;align-items:center;gap:5px;width:100%;padding:2px 0 0 38px}

/* LETTER INDEX */
.letter-index{width:28px;background:var(--bg-card);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4px 0;overflow-y:auto;flex-shrink:0;border-left:1px solid rgba(255,255,255,0.06)}
.letter-index a{color:var(--text-muted);font-size:.62rem;font-weight:600;padding:2px 0;text-decoration:none;display:block;width:100%;text-align:center;line-height:1.4;transition:all .15s}
.letter-index a:hover{color:#a5b4fc;background:rgba(99,102,241,0.1)}
.letter-index a.has-entries{color:#a5b4fc;font-size:.68rem}

/* LOADING */
.loading-overlay{display:none;position:absolute;inset:0;background:rgba(14,14,24,0.85);z-index:50;justify-content:center;align-items:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid rgba(99,102,241,0.2);border-top-color:#6366f1;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-page{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text-muted);font-size:.9rem;gap:8px}

/* SECOND BAR */
.filter-bar{background:rgba(26,26,46,0.5);border-bottom:1px solid rgba(255,255,255,0.05);padding:8px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-bar label{font-size:.68rem;color:var(--text-muted);text-transform:uppercase;font-weight:600;letter-spacing:.5px}


@media(max-width:768px){
  .country-sidebar{width:60px}
  .country-name,.country-count{display:none}
  .net-logo{width:28px;height:28px}
  .filter-bar{display:none}
  .countries-summary{display:none}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="btn btn-back">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
    Scraper
  </a>
  <a href="agenda.html" class="btn btn-back">📖 Agenda</a>
  <h1>WCA Directory</h1>
  <input type="text" id="searchInput" placeholder="Cerca partner..." oninput="onSearch()" style="min-width:180px">
  <button onclick="openNetPopup()" class="btn btn-back" id="btnNetFilter" style="display:inline-flex;align-items:center;gap:4px">🌐 Network <span id="netFilterCount" style="font-size:.65rem;background:rgba(99,102,241,0.3);padding:1px 6px;border-radius:4px"></span></button>
  <div class="stats">
    <span>Partner: <strong id="statTotal">0</strong></span>
    <span>Paesi: <strong id="statCountries">0</strong></span>
    <span>Visualizzati: <strong id="statFiltered">0</strong></span>
  </div>
</div>


<div class="filter-bar">
  <label>Ordina:</label>
  <div class="sort-bar" id="sortBar">
    <button class="sort-btn active" data-sort="name" onclick="setSort('name')">Nome ↕</button>
    <button class="sort-btn" data-sort="country" onclick="setSort('country')">Paese ↕</button>
    <button class="sort-btn" data-sort="networks" onclick="setSort('networks')">N° Networks ↓</button>
  </div>
  <span style="width:1px;height:18px;background:rgba(255,255,255,0.08);margin:0 4px"></span>
  <label>Filtra Network:</label>
  <div class="net-filter" id="netFilter"></div>
</div>

<div class="agenda-wrap">
  <!-- SIDEBAR PAESI -->
  <div class="country-sidebar" id="countrySidebar">
    <h3>Paesi</h3>
  </div>

  <!-- PAGINA -->
  <div class="agenda-page" id="agendaPage">
    <div class="page-header" id="pageHeader">
      <span class="page-flag" id="pageFlag" style="font-size:2rem">🌍</span>
      <div>
        <div class="page-title" id="pageTitle">Tutti i Partner</div>
        <div class="page-subtitle" id="pageSubtitle">Caricamento...</div>
      </div>
      <div class="page-nav">
        <button onclick="prevPage()" id="btnPrev" disabled>&laquo; Prec</button>
        <span id="pageNum" style="font-size:.72rem;color:var(--text-muted);padding:4px 8px">—</span>
        <button onclick="nextPage()" id="btnNext" disabled>Succ &raquo;</button>
      </div>
    </div>
    <div class="agenda-lines" id="agendaLines">
      <div class="empty-page">
        <div class="spinner"></div>
        <div>Caricamento directory da Supabase...</div>
      </div>
    </div>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div style="font-size:.82rem;color:var(--text-secondary)">Caricamento...</div>
    </div>
  </div>

  <!-- INDICE LETTERE -->
  <div class="letter-index" id="letterIndex"></div>
</div>

<script>
const API = window.location.origin;

// ══════ ALL NETWORKS (logos) ══════
const ALL_NETWORKS = [
  { domain: "wcaprojects.com",           siteId: 5,   name: "WCA Projects",              logo: "logos/WCAProjects.png" },
  { domain: "wcadangerousgoods.com",     siteId: 22,  name: "WCA Dangerous Goods",       logo: "logos/WCADangerousGoods.png" },
  { domain: "wcaperishables.com",        siteId: 13,  name: "WCA Perishables",            logo: "logos/WCAPerishables.png" },
  { domain: "wcatimecritical.com",       siteId: 18,  name: "WCA Time Critical",          logo: "logos/WCATimeCritical.png" },
  { domain: "wcapharma.com",             siteId: 16,  name: "WCA Pharma",                 logo: "logos/WCAPharma.png" },
  { domain: "wcarelocations.com",        siteId: 15,  name: "WCA Relocations",            logo: "logos/WCARelocations.png" },
  { domain: "wcaecommercesolutions.com", siteId: 107, name: "WCA eCommerce",              logo: "logos/WCAeCommerceSolutions.png" },
  { domain: "wcaexpo.com",              siteId: 124, name: "WCA Expo",                   logo: "logos/WCAExpo.png" },
  { domain: "lognetglobal.com",           siteId: 61,  name: "Lognet Global",              logo: "logos/Lognet_logo.png" },
  { domain: "globalaffinityalliance.com", siteId: 98,  name: "GAA",                        logo: "logos/GAA_logo.png" },
  { domain: "elitegln.com",              siteId: 108, name: "EGLN",                       logo: "logos/EGLN_logo.png" },
  { domain: "ifc8.network",             siteId: 118, name: "IFC8",                       logo: "logos/IFC8_logo.png" },
  { domain: "wca-first",                siteId: 1,   name: "WCA First",                  logo: "logos/WCAFirst.png" },
  { domain: "wca-advanced",             siteId: 2,   name: "WCA Advanced",               logo: "logos/WCAAdvancedProfessionals.png" },
  { domain: "wca-chinaglobal",          siteId: 3,   name: "WCA China Global",            logo: "logos/WCAChinaGlobal.png" },
  { domain: "wca-interglobal",          siteId: 4,   name: "WCA Inter Global",            logo: "logos/WCAInterGlobal.png" },
  { domain: "wca-vendors",              siteId: 38,  name: "WCA Vendors",                 logo: "logos/WCAESN_With_Tagline.png" },
  // Badge extra (non-network ma visibili nella directory)
  { domain: "allworldshipping",          siteId: 0,   name: "All World Shipping",          logo: "logos/AllWorldShipping.png" },
  { domain: "cass",                      siteId: 0,   name: "CASS",                        logo: "logos/CASS.png" },
  { domain: "qs",                        siteId: 0,   name: "Quality Standards",           logo: "logos/QS.png" },
  { domain: "iata",                      siteId: 0,   name: "IATA",                        logo: "logos/IATA.png" },
];

const NET_BY_DOMAIN = {};
for (const n of ALL_NETWORKS) {
  if (!NET_BY_DOMAIN[n.domain]) NET_BY_DOMAIN[n.domain] = n;
}

const COUNTRY_NAMES={IT:"Italia",US:"Stati Uniti",GB:"Regno Unito",DE:"Germania",FR:"Francia",ES:"Spagna",CN:"Cina",IN:"India",BR:"Brasile",AE:"Emirati Arabi",TR:"Turchia",NL:"Paesi Bassi",AU:"Australia",JP:"Giappone",KR:"Corea del Sud",SG:"Singapore",HK:"Hong Kong",TH:"Thailandia",MX:"Messico",CA:"Canada",RU:"Russia",PL:"Polonia",SE:"Svezia",NO:"Norvegia",DK:"Danimarca",FI:"Finlandia",CH:"Svizzera",AT:"Austria",BE:"Belgio",PT:"Portogallo",GR:"Grecia",CZ:"Rep. Ceca",RO:"Romania",HU:"Ungheria",IE:"Irlanda",IL:"Israele",SA:"Arabia Saudita",EG:"Egitto",ZA:"Sudafrica",NG:"Nigeria",KE:"Kenya",AR:"Argentina",CO:"Colombia",CL:"Cile",PE:"Perù",VE:"Venezuela",EC:"Ecuador",PK:"Pakistan",BD:"Bangladesh",ID:"Indonesia",MY:"Malesia",PH:"Filippine",VN:"Vietnam",TW:"Taiwan",NZ:"Nuova Zelanda",UA:"Ucraina",HR:"Croazia",RS:"Serbia",BG:"Bulgaria",SK:"Slovacchia",SI:"Slovenia",LT:"Lituania",LV:"Lettonia",EE:"Estonia",MT:"Malta",CY:"Cipro",LU:"Lussemburgo",IS:"Islanda",GE:"Georgia",AM:"Armenia",AZ:"Azerbaigian",KZ:"Kazakistan",UZ:"Uzbekistan",QA:"Qatar",KW:"Kuwait",OM:"Oman",JO:"Giordania",LB:"Libano",IQ:"Iraq",IR:"Iran",MA:"Marocco",TN:"Tunisia",DZ:"Algeria",GH:"Ghana",TZ:"Tanzania",UG:"Uganda",ET:"Etiopia",CM:"Camerun",SN:"Senegal",CI:"Costa d'Avorio",MZ:"Mozambico",AO:"Angola",CD:"RD Congo",LY:"Libia",CR:"Costa Rica",PA:"Panama",GT:"Guatemala",DO:"Rep. Dominicana",JM:"Giamaica",TT:"Trinidad e Tobago",LK:"Sri Lanka",NP:"Nepal",MM:"Myanmar",KH:"Cambogia",AF:"Afghanistan"};

// ══════ STATE ══════
let allMembers = [];       // {id, name, networks:[], countryCode}
let countriesMap = {};     // cc → {name, flag, members:[]}
let currentCountry = null; // null = tutti
let currentPage = 0;
const PER_PAGE = 40;
let sortMode = "name";     // name | country | networks
let sortDir = 1;           // 1 = asc, -1 = desc
let activeNetworkFilters = new Set();

// ══════ HELPERS ══════
function countryFlag(code){
  if(!code||code.length!==2) return "🌍";
  return String.fromCodePoint(...[...code.toUpperCase()].map(c=>0x1F1E6+c.charCodeAt(0)-65));
}
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}

// ══════ LOAD DATA FROM SUPABASE ══════
async function loadData(){
  try {
    document.getElementById("pageSubtitle").textContent = "Caricamento tutti i partner da Supabase...";

    // Carica TUTTI i partner in un'unica chiamata (senza filtro country)
    const resp = await fetch(API+"/api/load-directory?country=");
    // Se l'endpoint non supporta country vuoto, usiamo il fallback per paese
    let data;
    if(resp.ok){
      data = await resp.json();
    }

    if(data && data.success && data.members){
      allMembers = data.members;
    } else {
      // Fallback: carica per paese
      const statsResp = await fetch(API+"/api/load-directory?mode=stats");
      const statsData = await statsResp.json();
      if(!statsData.success) throw new Error(statsData.error||"stats failed");

      const countryCodes = Object.keys(statsData.byCountry).sort((a,b) => statsData.byCountry[b] - statsData.byCountry[a]);
      allMembers = [];
      for(let i = 0; i < countryCodes.length; i += 5){
        const batch = countryCodes.slice(i, i+5);
        const results = await Promise.all(batch.map(async cc => {
          try {
            const r = await fetch(API+"/api/load-directory?country="+cc);
            const d = await r.json();
            if(d.success && d.members) return d.members;
          } catch(e){}
          return [];
        }));
        for(const r of results) allMembers.push(...r);
        document.getElementById("pageSubtitle").textContent = `Caricamento ${Math.min(i+5, countryCodes.length)}/${countryCodes.length} paesi...`;
      }
    }

    const uniqueCountries = new Set(allMembers.map(m => m.countryCode).filter(Boolean));
    document.getElementById("statTotal").textContent = allMembers.length;
    document.getElementById("statCountries").textContent = uniqueCountries.size;

    buildCountriesMap();
    renderSidebar();
    renderNetworkFilter();
    buildLetterIndex();
    selectCountry(null); // mostra tutti
  } catch(e) {
    document.getElementById("agendaLines").innerHTML = `<div class="empty-page"><div style="font-size:3rem;opacity:.5">⚠️</div><div>Errore: ${esc(e.message)}</div><div style="font-size:.75rem;color:var(--text-muted);margin-top:8px">Assicurati che i dati directory siano stati scaricati dallo scraper</div></div>`;
  }
}

function buildCountriesMap(){
  countriesMap = {};
  for(const m of allMembers){
    const cc = (m.countryCode||"").toUpperCase();
    if(!cc) continue;
    if(!countriesMap[cc]) countriesMap[cc]={name:COUNTRY_NAMES[cc]||cc,flag:countryFlag(cc),members:[]};
    countriesMap[cc].members.push(m);
  }
}


function renderSidebar(){
  const sb = document.getElementById("countrySidebar");
  const codes = Object.keys(countriesMap).sort((a,b)=>{
    return countriesMap[b].members.length - countriesMap[a].members.length;
  });
  let html = '<h3>Paesi</h3>';
  // "Tutti" item
  html += `<div class="country-item ${currentCountry===null?'active':''}" onclick="selectCountry(null)" data-code="ALL" id="cs-ALL">
    <span class="country-flag">🌍</span>
    <span class="country-name">Tutti</span>
    <span class="country-count has">${allMembers.length}</span>
  </div>`;
  for(const code of codes){
    const c = countriesMap[code];
    const n = c.members.length;
    html += `<div class="country-item" onclick="selectCountry('${code}')" data-code="${code}" id="cs-${code}">
      <span class="country-flag">${c.flag}</span>
      <span class="country-name">${esc(c.name)}</span>
      <span class="country-count has">${n}</span>
    </div>`;
  }
  sb.innerHTML = html;
}

function renderNetworkFilter(){
  const container = document.getElementById("netFilter");
  // Count networks across all members
  const netCounts = {};
  for(const m of allMembers){
    if(m.networks) for(const n of m.networks){ netCounts[n] = (netCounts[n]||0)+1; }
  }
  const sorted = Object.entries(netCounts).sort((a,b)=>b[1]-a[1]);
  let html = '';
  for(const [domain, count] of sorted){
    const net = NET_BY_DOMAIN[domain];
    const name = net ? net.name : domain;
    const logo = net ? `<img src="${net.logo}" alt="${name}" onerror="this.style.display='none'">` : '';
    html += `<span class="net-chip" data-domain="${domain}" onclick="toggleNetFilter('${domain}')">${logo} ${esc(name)} <span style="opacity:.5">${count}</span></span>`;
  }
  container.innerHTML = html;
}

function toggleNetFilter(domain){
  if(activeNetworkFilters.has(domain)) activeNetworkFilters.delete(domain);
  else activeNetworkFilters.add(domain);
  // Update chip UI
  document.querySelectorAll(".net-chip").forEach(el => {
    el.classList.toggle("active", activeNetworkFilters.has(el.dataset.domain));
  });
  currentPage = 0;
  renderPage();
}

// ══════ SORTING ══════
function setSort(mode){
  if(sortMode === mode){
    sortDir *= -1;
  } else {
    sortMode = mode;
    sortDir = mode === "networks" ? -1 : 1; // networks default desc
  }
  document.querySelectorAll(".sort-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.sort === mode);
    if(b.dataset.sort === mode){
      const arrow = sortDir === 1 ? "↑" : "↓";
      b.textContent = b.textContent.replace(/[↕↑↓]/, arrow);
    } else {
      b.textContent = b.textContent.replace(/[↕↑↓]/, "↕");
    }
  });
  currentPage = 0;
  renderPage();
}

function getFilteredSorted(){
  let list = currentCountry ? (countriesMap[currentCountry]?.members||[]) : allMembers;

  // Search filter
  const q = (document.getElementById("searchInput").value||"").toLowerCase();
  if(q) list = list.filter(m => (m.name||"").toLowerCase().includes(q) || (m.id+"").includes(q));

  // Network filter
  if(activeNetworkFilters.size > 0){
    list = list.filter(m => {
      if(!m.networks || m.networks.length === 0) return false;
      return m.networks.some(n => activeNetworkFilters.has(n));
    });
  }

  // Sort
  list = [...list];
  list.sort((a,b) => {
    let cmp = 0;
    if(sortMode === "name"){
      cmp = (a.name||"").localeCompare(b.name||"");
    } else if(sortMode === "country"){
      const ca = COUNTRY_NAMES[a.countryCode]||a.countryCode||"";
      const cb = COUNTRY_NAMES[b.countryCode]||b.countryCode||"";
      cmp = ca.localeCompare(cb);
      if(cmp === 0) cmp = (a.name||"").localeCompare(b.name||"");
    } else if(sortMode === "networks"){
      cmp = (a.networks?.length||0) - (b.networks?.length||0);
      if(cmp === 0) cmp = (a.name||"").localeCompare(b.name||"");
    }
    return cmp * sortDir;
  });

  return list;
}

// ══════ SELECTION & RENDER ══════
function selectCountry(code){
  currentCountry = code;
  currentPage = 0;
  document.querySelectorAll(".country-item").forEach(el=>{
    if(code === null) el.classList.toggle("active", el.dataset.code==="ALL");
    else el.classList.toggle("active", el.dataset.code===code);
  });
  renderPage();
}

function renderPage(){
  const list = getFilteredSorted();
  const totalPages = Math.max(1, Math.ceil(list.length/PER_PAGE));
  if(currentPage >= totalPages) currentPage = totalPages-1;
  if(currentPage < 0) currentPage = 0;

  // Header
  const q = (document.getElementById("searchInput").value||"").toLowerCase();
  if(currentCountry && countriesMap[currentCountry]){
    const c = countriesMap[currentCountry];
    document.getElementById("pageFlag").textContent = c.flag;
    document.getElementById("pageTitle").textContent = c.name;
  } else {
    document.getElementById("pageFlag").textContent = "🌍";
    document.getElementById("pageTitle").textContent = "Tutti i Partner";
  }
  const filterInfo = [];
  if(q) filterInfo.push("filtro: \""+q+"\"");
  if(activeNetworkFilters.size) filterInfo.push(activeNetworkFilters.size+" network selezionati");
  document.getElementById("pageSubtitle").textContent = list.length + " partner" + (filterInfo.length ? " ("+filterInfo.join(", ")+")" : "");
  document.getElementById("statFiltered").textContent = list.length;

  document.getElementById("pageNum").textContent = `${currentPage+1}/${totalPages}`;
  document.getElementById("btnPrev").disabled = currentPage===0;
  document.getElementById("btnNext").disabled = currentPage>=totalPages-1;

  const start = currentPage * PER_PAGE;
  const pageItems = list.slice(start, start+PER_PAGE);
  const lines = document.getElementById("agendaLines");

  if(pageItems.length===0){
    lines.innerHTML = '<div class="empty-page"><div style="font-size:3rem;opacity:.5">📭</div><div>Nessun partner'+(q?' per "'+esc(q)+'"':'')+'</div></div>';
    buildLetterIndexForPage([]);
    return;
  }

  let html = "";
  for(let i=0;i<pageItems.length;i++){
    const m = pageItems[i];
    const num = start+i+1;
    const cc = m.countryCode||"";
    const flag = countryFlag(cc);
    const countryLabel = COUNTRY_NAMES[cc]||cc;

    // Network logos — mostra TUTTI in orizzontale
    let netHtml = "";
    const nets = m.networks||[];
    for(const nd of nets){
      const net = NET_BY_DOMAIN[nd];
      if(net){
        netHtml += `<img class="net-logo" src="${net.logo}" alt="${net.name}" title="${net.name}" onerror="this.style.display='none'">`;
      }
    }

    html += `<div class="agenda-line" onclick="openWcaProfile('${m.id}')">
      <span class="line-num">${num}</span>
      <span style="font-size:1.1rem;flex-shrink:0" title="${esc(countryLabel)}">${flag}</span>
      <div class="line-main">
        <div class="line-company">${esc(m.name)}</div>
        <div class="line-detail"><span class="city">${esc(countryLabel)}</span> · ID: ${esc(m.id+"")}</div>
      </div>
      ${netHtml ? `<div class="net-row">${netHtml}</div>` : ''}
    </div>`;
  }
  lines.innerHTML = html;
  lines.scrollTop = 0;
  buildLetterIndexForPage(list);
}

function openWcaProfile(wcaId){
  window.open(`https://www.wcaworld.com/directory/members/${wcaId}`, '_blank');
}

// ══════ LETTER INDEX ══════
function buildLetterIndex(){
  const idx = document.getElementById("letterIndex");
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ#".split("");
  idx.innerHTML = letters.map(l=>`<a href="#" onclick="event.preventDefault();scrollToLetter('${l}')">${l}</a>`).join("");
}

function buildLetterIndexForPage(list){
  const idx = document.getElementById("letterIndex");
  const usedLetters = new Set();
  for(const m of list){
    const first = (m.name||"")[0]?.toUpperCase()||"#";
    usedLetters.add(/[A-Z]/.test(first)?first:"#");
  }
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ#".split("");
  idx.innerHTML = letters.map(l=>{
    const cls = usedLetters.has(l)?"has-entries":"";
    return `<a href="#" class="${cls}" onclick="event.preventDefault();scrollToLetter('${l}')">${l}</a>`;
  }).join("");
}

function scrollToLetter(letter){
  const list = getFilteredSorted();
  const idx = list.findIndex(m=>{
    const first = (m.name||"")[0]?.toUpperCase()||"#";
    return (/[A-Z]/.test(first)?first:"#")===letter;
  });
  if(idx<0) return;
  currentPage = Math.floor(idx/PER_PAGE);
  renderPage();
  setTimeout(()=>{
    const lineIdx = idx % PER_PAGE;
    const lines = document.querySelectorAll(".agenda-line");
    if(lines[lineIdx]) lines[lineIdx].scrollIntoView({behavior:"smooth",block:"center"});
  },50);
}

// ══════ PAGINATION & SEARCH ══════
function prevPage(){if(currentPage>0){currentPage--;renderPage();}}
function nextPage(){currentPage++;renderPage();}
function onSearch(){ currentPage=0; renderPage(); }

// ══════ KEYBOARD ══════
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT") return;
  if(e.key==="ArrowLeft") prevPage();
  if(e.key==="ArrowRight") nextPage();
});

// ══════ NETWORK POPUP ══════
function openNetPopup(){
  const ov = document.getElementById("netPopupOverlay");
  const grid = document.getElementById("netPopupGrid");
  // Conta network presenti nei dati
  const netCounts = {};
  for(const m of allMembers){
    if(m.networks) for(const n of m.networks){ netCounts[n] = (netCounts[n]||0)+1; }
  }
  const sorted = Object.entries(netCounts).sort((a,b)=>b[1]-a[1]);
  grid.innerHTML = sorted.map(([domain, count]) => {
    const net = NET_BY_DOMAIN[domain];
    const name = net ? net.name : domain;
    const logo = net ? net.logo : '';
    const checked = activeNetworkFilters.has(domain) ? 'checked' : '';
    return `<label class="net-popup-item" data-domain="${domain}">
      <input type="checkbox" ${checked} onchange="toggleNetPopupItem('${domain}',this.checked)">
      ${logo ? `<img src="${logo}" style="width:28px;height:28px;object-fit:contain;border-radius:3px" onerror="this.style.display='none'">` : ''}
      <span>${esc(name)}</span>
      <span style="opacity:.4;font-size:.7rem;margin-left:auto">${count}</span>
    </label>`;
  }).join("");
  ov.classList.add("open");
}
function closeNetPopup(){ document.getElementById("netPopupOverlay").classList.remove("open"); }
function toggleNetPopupItem(domain, checked){
  if(checked) activeNetworkFilters.add(domain);
  else activeNetworkFilters.delete(domain);
}
function confirmNetPopup(){
  closeNetPopup();
  updateNetFilterCount();
  currentPage = 0;
  renderPage();
  // Sync chip nella filter-bar
  document.querySelectorAll(".net-chip").forEach(el => {
    el.classList.toggle("active", activeNetworkFilters.has(el.dataset.domain));
  });
}
function clearNetPopup(){
  activeNetworkFilters.clear();
  document.querySelectorAll("#netPopupGrid input[type=checkbox]").forEach(c=>c.checked=false);
}
function selectAllNetPopup(){
  document.querySelectorAll("#netPopupGrid input[type=checkbox]").forEach(c=>{c.checked=true; activeNetworkFilters.add(c.parentElement.dataset.domain);});
}
function updateNetFilterCount(){
  const el = document.getElementById("netFilterCount");
  el.textContent = activeNetworkFilters.size > 0 ? activeNetworkFilters.size : '';
}

// ══════ START ══════
loadData();
</script>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WCA Network Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08081a;--bg2:#0e0e24;--card:#12122a;--border:rgba(99,102,241,0.12);
  --text:#e2e8f0;--muted:#64748b;--accent:#6366f1;--cyan:#0ea5e9;--green:#10b981;--purple:#8b5cf6;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}

/* ═══ TOP BAR ═══ */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;height:48px;
  background:rgba(8,8,26,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;
}
.topbar-logo{width:32px;height:32px;filter:drop-shadow(0 2px 8px rgba(139,92,246,0.5))}
.topbar-title{font-size:.85rem;font-weight:700;background:linear-gradient(135deg,#a5b4fc,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-nav{margin-left:auto;display:flex;gap:4px}
.topbar-btn{
  padding:5px 14px;border-radius:8px;font-size:.68rem;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;
}
.topbar-btn:hover{background:rgba(99,102,241,0.08);color:var(--text)}
.topbar-btn.active{background:rgba(99,102,241,0.15);color:#a5b4fc;border-color:rgba(99,102,241,0.3)}
.topbar-stats{display:flex;gap:8px;align-items:center;margin-right:12px}
.stat-chip{
  font-size:.62rem;font-weight:700;padding:3px 10px;border-radius:6px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--muted);
  font-family:'JetBrains Mono',monospace;
}
.stat-chip b{color:var(--text);font-size:.72rem}

/* ═══ MAIN LAYOUT — 3 COLUMNS ═══ */
.main{
  position:fixed;top:48px;bottom:56px;left:0;right:0;
  display:grid;grid-template-columns:280px 1fr 280px;gap:0;
}

/* ═══ LEFT PANEL — DIRECTORY ═══ */
.panel-left,.panel-right{
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.panel-right{border-right:none;border-left:1px solid var(--border)}
.panel-header{
  padding:16px 18px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.panel-icon{font-size:2rem;filter:drop-shadow(0 2px 8px rgba(99,102,241,0.3))}
.panel-title{font-size:.82rem;font-weight:800;letter-spacing:-.02em}
.panel-subtitle{font-size:.6rem;color:var(--muted);margin-top:1px}
.panel-body{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:rgba(99,102,241,0.2) transparent}
.panel-footer{
  padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}

/* Big action button */
.big-btn{
  flex:1;padding:10px;border-radius:10px;border:none;font-size:.75rem;font-weight:700;
  cursor:pointer;transition:all .25s;letter-spacing:.02em;
}
.big-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,0.3)}
.big-btn.dir{background:linear-gradient(135deg,#0ea5e9,#06b6d4);color:#fff}
.big-btn.prof{background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:#fff}
.big-btn.stop{background:linear-gradient(135deg,#ef4444,#f87171);color:#fff}
.big-btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}

/* Country list items */
.country-item{
  display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;
  transition:background .15s;cursor:default;
}
.country-item:hover{background:rgba(99,102,241,0.06)}
.country-flag{font-size:1.4rem}
.country-name{font-size:.72rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.country-count{
  font-size:.6rem;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:4px;
  background:rgba(14,165,233,0.1);color:#7dd3fc;font-weight:600;
}
.country-count.profiles{background:rgba(139,92,246,0.1);color:#c4b5fd}
.country-bar{
  height:3px;border-radius:2px;background:rgba(255,255,255,0.04);overflow:hidden;
  width:100%;margin-top:2px;
}
.country-bar-fill{height:100%;border-radius:2px;transition:width .6s ease-out}

/* Partner items */
.partner-item{
  padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);
  margin-bottom:4px;transition:all .3s;animation:partnerIn .4s ease-out;
}
.partner-item:hover{background:rgba(139,92,246,0.06);border-color:rgba(139,92,246,0.15)}
.partner-name{font-size:.72rem;font-weight:700;margin-bottom:2px}
.partner-meta{font-size:.58rem;color:var(--muted);display:flex;gap:6px;align-items:center}
.partner-nets{display:flex;gap:3px;margin-top:3px}
.partner-nets img{height:14px;opacity:.7;transition:opacity .2s}
.partner-nets img:hover{opacity:1}
@keyframes partnerIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ═══ CENTER — MATRIX CANVAS ═══ */
.center{position:relative;overflow:hidden;background:var(--bg)}
#matrixCanvas{position:absolute;inset:0;width:100%;height:100%}

/* Center overlay cockpit */
.cockpit{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:16px;z-index:10;
  pointer-events:none;
}
.cockpit-logo{width:80px;height:80px;filter:drop-shadow(0 4px 24px rgba(139,92,246,0.5));animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);filter:drop-shadow(0 4px 24px rgba(139,92,246,0.5))}50%{transform:scale(1.05);filter:drop-shadow(0 4px 32px rgba(139,92,246,0.7))}}
.cockpit-title{font-size:1.6rem;font-weight:900;letter-spacing:-.04em;text-align:center;line-height:1.1}
.cockpit-title span{background:linear-gradient(135deg,#a5b4fc,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cockpit-subtitle{font-size:.7rem;color:var(--muted);text-align:center;max-width:280px;line-height:1.5}

/* Cockpit stats ring */
.cockpit-stats{
  display:flex;gap:20px;margin-top:8px;
}
.cockpit-stat{
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.cockpit-stat-value{
  font-size:1.8rem;font-weight:900;font-family:'JetBrains Mono',monospace;
  background:linear-gradient(135deg,#6366f1,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.cockpit-stat-label{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700}

/* Active download overlay */
.active-dl{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;
  background:rgba(14,14,36,0.85);backdrop-filter:blur(16px);border:1px solid var(--border);
  border-radius:14px;padding:12px 24px;display:none;align-items:center;gap:14px;
  box-shadow:0 12px 40px rgba(0,0,0,0.4);pointer-events:auto;min-width:400px;
}
.active-dl-flag{font-size:2.4rem;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4))}
.active-dl-info{flex:1}
.active-dl-status{font-size:.72rem;font-weight:700;margin-bottom:2px}
.active-dl-detail{font-size:.6rem;color:var(--muted)}
.active-dl-progress{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-top:6px}
.active-dl-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan),var(--green));transition:width .3s}

/* Network logo parade */
.net-parade{
  position:absolute;bottom:80px;left:0;right:0;z-index:5;
  display:flex;gap:24px;align-items:center;justify-content:center;
  animation:netScroll 20s linear infinite;
}
.net-parade img{
  height:36px;opacity:.15;filter:grayscale(1) brightness(1.5);transition:all .4s;
}
.net-parade img.active{opacity:.9;filter:grayscale(0);transform:scale(1.3)}
@keyframes netScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Status toast */
.toast{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:20;
  background:rgba(14,14,36,0.9);backdrop-filter:blur(16px);border:1px solid var(--border);
  border-radius:10px;padding:8px 20px;font-size:.7rem;font-weight:600;
  display:none;animation:toastIn .3s ease-out;box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.2);border-radius:2px}

/* ═══ RESPONSIVE ═══ */
/* ═══ BOTTOM FLAGS BAR ═══ */
.flags-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;height:56px;
  background:rgba(8,8,26,0.92);backdrop-filter:blur(16px);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:0;
}
.flags-bar-label{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:0 14px 0 6px;border-right:1px solid var(--border);margin-right:10px;
}
.flags-bar-label-big{font-size:1.1rem;font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--cyan)}
.flags-bar-label-sm{font-size:.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.flags-scroll{
  flex:1;display:flex;gap:4px;overflow-x:auto;overflow-y:hidden;align-items:center;
  scrollbar-width:thin;scrollbar-color:rgba(99,102,241,0.15) transparent;padding:4px 0;
}
.flag-chip{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:4px 6px;border-radius:8px;border:1px solid transparent;
  transition:all .25s;cursor:default;min-width:48px;
}
.flag-chip:hover{background:rgba(99,102,241,0.08);border-color:var(--border)}
.flag-chip.active{background:rgba(14,165,233,0.12);border-color:rgba(14,165,233,0.3);animation:flagPop .3s ease-out}
.flag-chip-emoji{font-size:1.2rem;line-height:1}
.flag-chip-count{font-size:.55rem;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--cyan)}
.flag-chip-prof{font-size:.48rem;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--purple)}
@keyframes flagPop{0%{transform:scale(1.2)}100%{transform:scale(1)}}

@media(max-width:900px){
  .main{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}
  .panel-left,.panel-right{max-height:30vh}
  .center{min-height:40vh}
  .flags-bar{height:48px}
}
</style>
</head>
<body>

<!-- ═══ TOP BAR ═══ -->
<div class="topbar">
  <img src="logos/dragon.png" class="topbar-logo" alt="Logo" onerror="this.src='https://dlldkrzoxvjxpgkkttxu.supabase.co/storage/v1/object/public/icons/dragon.png'">
  <span class="topbar-title">WCA Network Navigator</span>
  <div class="topbar-stats">
    <span class="stat-chip">📂 <b id="statDir">—</b> directory</span>
    <span class="stat-chip">👤 <b id="statProfiles">—</b> profili</span>

  </div>
  <div class="topbar-nav">
    <button class="topbar-btn active">Dashboard</button>
    <button class="topbar-btn" onclick="window.location='admin.html'">Management</button>

<!-- ═══ MAIN 3-COLUMN LAYOUT ═══ -->
<div class="main">

      <div>
        <div class="panel-title">Directory</div>

    </div>

  <!-- CENTER: MATRIX CANVAS -->
  <div class="center">
    <canvas id="matrixCanvas"></canvas>
    <div class="cockpit">
      <img src="logos/dragon.png" class="cockpit-logo" alt="" onerror="this.src='https://dlldkrzoxvjxpgkkttxu.supabase.co/storage/v1/object/public/icons/dragon.png'">
      <div class="cockpit-title"><span>WCA Network</span><br>Navigator</div>
      <div class="cockpit-subtitle">Scarica la directory dei partner o avvia il download dei profili dettagliati</div>
      <div class="cockpit-stats">
        <div class="cockpit-stat"><span class="cockpit-stat-value" id="ckDir">0</span><span class="cockpit-stat-label">Directory</span></div>
        <div class="cockpit-stat"><span class="cockpit-stat-value" id="ckProf">0</span><span class="cockpit-stat-label">Profili</span></div>
        <div class="cockpit-stat"><span class="cockpit-stat-value" id="ckCountries">0</span><span class="cockpit-stat-label">Paesi</span></div>

        <div class="active-dl-detail" id="dlDetail"></div>
        <div class="active-dl-progress"><div class="active-dl-fill" id="dlFill" style="width:0%"></div></div>
      </div>

    <!-- Network logo parade -->
    <div class="net-parade" id="netParade"></div>
    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <!-- RIGHT: PARTNERS -->
  <div class="panel-right">
    <div class="panel-header">
      <span class="panel-icon">👤</span>
      <div>
        <div class="panel-title">Partner</div>
        <div class="panel-subtitle">Profili scaricati in tempo reale</div>
      </div>
      <span id="profTotal" style="margin-left:auto;font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--purple);font-weight:700">0</span>
    </div>
    <div class="panel-body" id="partnerList"></div>
    <div class="panel-footer">
      <button class="big-btn prof" id="btnProfStart" onclick="startProfileDownload()">👤 Scarica Profili</button>
      <button class="big-btn stop" id="btnProfStop" onclick="stopDownload()" style="display:none;flex:0 0 auto;padding:10px 16px">■</button>
    </div>
  </div>

</div>

<!-- BOTTOM FLAGS BAR -->
<div class="flags-bar">
  <div class="flags-bar-label">
    <span class="flags-bar-label-big" id="flagsBarTotal">0</span>
    <span class="flags-bar-label-sm">paesi</span>
  </div>
  <div class="flags-scroll" id="flagsScroll"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const API = window.location.origin;
const SUPABASE_URL = "https://dlldkrzoxvjxpgkkttxu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsbGRrcnpveHZqeHBna2t0dHh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMxODIxNjgsImV4cCI6MjA1ODc1ODE2OH0.LCxqLNlOvMbyMRucc9gkMbqDdOMC25v9rMqMKMKIiDI";

const ALL_NETWORKS = [
  { domain:"wcaprojects.com", name:"WCA Projects", logo:"logos/WCAProjects.png" },
  { domain:"wcadangerousgoods.com", name:"WCA Dangerous Goods", logo:"logos/WCADangerousGoods.png" },
  { domain:"wcaperishables.com", name:"WCA Perishables", logo:"logos/WCAPerishables.png" },
  { domain:"wcatimecritical.com", name:"WCA Time Critical", logo:"logos/WCATimeCritical.png" },
  { domain:"wcapharma.com", name:"WCA Pharma", logo:"logos/WCAPharma.png" },
  { domain:"wcarelocations.com", name:"WCA Relocations", logo:"logos/WCARelocations.png" },
  { domain:"wcaecommercesolutions.com", name:"WCA eCommerce", logo:"logos/WCAeCommerceSolutions.png" },
  { domain:"wcaexpo.com", name:"WCA Expo", logo:"logos/WCAExpo.png" },
  { domain:"lognetglobal.com", name:"Lognet Global", logo:"logos/Lognet_logo.png" },
  { domain:"globalaffinityalliance.com", name:"GAA", logo:"logos/GAA_logo.png" },
  { domain:"elitegln.com", name:"EGLN", logo:"logos/EGLN_logo.png" },
  { domain:"ifc8.network", name:"IFC8", logo:"logos/IFC8_logo.png" },
  { domain:"wca-first", name:"WCA First", logo:"logos/WCAFirst.png" },
  { domain:"wca-advanced", name:"WCA Advanced", logo:"logos/WCAAdvancedProfessionals.png" },
  { domain:"wca-chinaglobal", name:"WCA China Global", logo:"logos/WCAChinaGlobal.png" },
  { domain:"wca-interglobal", name:"WCA Inter Global", logo:"logos/WCAInterGlobal.png" },
  { domain:"wca-vendors", name:"WCA Vendors", logo:"logos/WCAESN_With_Tagline.png" },
];

function flag(code){ if(!code||code.length!==2) return ""; return String.fromCodePoint(...[...code.toUpperCase()].map(c=>0x1F1E6+c.charCodeAt(0)-65)); }

// ═══════════════════════════════════════════════════
// MATRIX RAIN CANVAS
// ═══════════════════════════════════════════════════
const canvas = document.getElementById("matrixCanvas");
const ctx = canvas.getContext("2d");
let columns, drops;
const chars = "WCANETWORKPARTNERDIRECTORYGLOBALLOGISTICSFREIGHTSHIPPINGCARGOTRADEアウカエオ01";

function initMatrix(){
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
  const fontSize = 13;
  columns = Math.floor(canvas.width / fontSize);
  drops = Array(columns).fill(1);
}

function drawMatrix(){
  ctx.fillStyle = "rgba(8,8,26,0.06)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.font = "12px 'JetBrains Mono'";

  for(let i = 0; i < drops.length; i++){
    const char = chars[Math.floor(Math.random()*chars.length)];
    const x = i * 13;
    const y = drops[i] * 13;

    // Colore variabile — mix cyan/purple/green
    const hue = 200 + Math.random()*80; // 200-280 range (cyan to purple)
    const alpha = 0.15 + Math.random()*0.15;
    ctx.fillStyle = `hsla(${hue},70%,60%,${alpha})`;
    ctx.fillText(char, x, y);

    // Testa più luminosa
    if(Math.random() > 0.97){
      ctx.fillStyle = `hsla(${hue},90%,80%,0.7)`;
      ctx.fillText(char, x, y);
    }

    if(y > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
  requestAnimationFrame(drawMatrix);
}

window.addEventListener("resize", initMatrix);
initMatrix();
drawMatrix();

// ═══════════════════════════════════════════════════
// NETWORK LOGO PARADE
// ═══════════════════════════════════════════════════
const paradeEl = document.getElementById("netParade");
let paradeIdx = 0;

function initParade(){
  // Double the logos for seamless scroll
  const html = [...ALL_NETWORKS,...ALL_NETWORKS].map((n,i) =>
    `<img src="${n.logo}" alt="${n.name}" data-idx="${i % ALL_NETWORKS.length}" onerror="this.style.display='none'">`
  ).join("");
  paradeEl.innerHTML = html;
}

function highlightParadeLogo(){
  const imgs = paradeEl.querySelectorAll("img");
  imgs.forEach(img => img.classList.remove("active"));
  const targets = paradeEl.querySelectorAll(`img[data-idx="${paradeIdx}"]`);
  targets.forEach(t => t.classList.add("active"));
  paradeIdx = (paradeIdx + 1) % ALL_NETWORKS.length;
}

initParade();
setInterval(highlightParadeLogo, 1500);

// ═══════════════════════════════════════════════════
// LOAD STATS FROM SUPABASE
// ═══════════════════════════════════════════════════
let dirStats = {}; // { countryCode: count }
let profStats = {}; // { countryCode: count }
let allCountries = [];

async function loadStats(){
  try {
    // Directory stats
    const dirResp = await fetch(API+"/api/load-directory?mode=stats");
    const dirData = await dirResp.json();
    if(dirData.success){
      dirStats = dirData.byCountry || {};
      document.getElementById("statDir").textContent = (dirData.totalPartners||0).toLocaleString();
      document.getElementById("ckDir").textContent = (dirData.totalPartners||0).toLocaleString();
      document.getElementById("statCountries").textContent = dirData.totalCountries||0;
      document.getElementById("ckCountries").textContent = dirData.totalCountries||0;
      document.getElementById("dirTotal").textContent = (dirData.totalPartners||0).toLocaleString();
    }

    // Profile stats
    const profResp = await fetch(API+"/api/partners?mode=country_counts");
    const profData = await profResp.json();
    if(profData.success){
      let total = 0;
      for(const [code, count] of Object.entries(profData.counts||{})){
        profStats[code] = count;
        total += count;
      }
      document.getElementById("statProfiles").textContent = total.toLocaleString();
      document.getElementById("ckProf").textContent = total.toLocaleString();
      document.getElementById("profTotal").textContent = total.toLocaleString();
    }
  } catch(e){ console.warn("loadStats:", e.message); }
}

// Build country list from dir stats
function renderCountryList(){
  const dirList = document.getElementById("dirList");
  const entries = Object.entries(dirStats).sort((a,b) => b[1]-a[1]);
  allCountries = entries.map(([code]) => code);

  dirList.innerHTML = entries.map(([code, count]) => {
    const prof = profStats[code] || 0;
    const pct = count > 0 ? Math.round((prof/count)*100) : 0;
    const barColor = pct >= 100 ? "var(--green)" : pct > 50 ? "var(--cyan)" : "var(--accent)";
    return `<div class="country-item" data-code="${code}">
      <span class="country-flag">${flag(code)}</span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="country-name">${code}</span>
          <span class="country-count">${count}</span>
          ${prof > 0 ? `<span class="country-count profiles">${prof}</span>` : ""}
        </div>
        <div class="country-bar"><div class="country-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      </div>
    </div>`;
  }).join("");
}

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
let toastTimer;
function showToast(msg, color){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  t.style.borderColor = color || "var(--border)";
  t.style.color = color || "var(--text)";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = "none"; }, 4000);
}

// ═══════════════════════════════════════════════════
// DIRECTORY DOWNLOAD
// ═══════════════════════════════════════════════════
let downloading = false;
let downloadType = null;

async function startDirectoryDownload(){
  if(downloading){ showToast("Download già in corso","var(--warning)"); return; }
  downloading = true;
  downloadType = "directory";
  document.getElementById("btnDirStart").style.display = "none";
  document.getElementById("btnDirStop").style.display = "block";
  document.getElementById("activeDl").style.display = "flex";

  showToast("📂 Download directory avviato","var(--cyan)");

  // Get all countries from Supabase or use a master list
  const countriesToScan = allCountries.length > 0 ? [...allCountries] : ["IT","US","GB","DE","FR","ES","CN","IN"];
  const total = countriesToScan.length;

  for(let i = 0; i < countriesToScan.length && downloading; i++){
    const code = countriesToScan[i];
    updateActiveDl(code, `📂 Directory ${i+1}/${total}`, `Scaricando ${code}...`, ((i+1)/total)*100);

    // Fetch directory via API
    let page = 1, hasMore = true, members = [];
    while(hasMore && downloading){
      try {
        const resp = await fetch(API+"/api/discover-global",{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({ country: code, page })
        });
        const data = await resp.json();
        if(data.success && data.members && data.members.length > 0){
          members.push(...data.members);
          hasMore = data.hasNext;
          page++;
          updateActiveDl(code, `📂 Directory ${i+1}/${total}: ${code}`, `${members.length} partner (p.${page})...`, ((i+1)/total)*100);
        } else { hasMore = false; }
      } catch(e){ hasMore = false; }
    }

    // Save to Supabase
    if(members.length > 0 && downloading){
      try {
        await fetch(API+"/api/save-directory",{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({ countryCode: code, members })
        });
        // Update local stats
        dirStats[code] = members.length;
        addMatrixFlash(code, members.length);
        highlightFlagChip(code);
      } catch(e){}
    }

    // Re-render
    renderCountryList();
    renderFlagsBar();
    updateTopStats();
  }

  stopDownload();
  showToast("📂 Directory completata!","var(--green)");
  loadStats();
}

// ═══════════════════════════════════════════════════
// PROFILE DOWNLOAD (simplified — delegates to management)
// ═══════════════════════════════════════════════════
async function startProfileDownload(){
  showToast("👤 Per scaricare i profili serve il login WCA — vai in Management","var(--purple)");
  // Flash the management button
  const btn = document.querySelector(".topbar-btn:not(.active)");
  if(btn){
    btn.style.animation = "pulse .5s ease-in-out 3";
    setTimeout(() => btn.style.animation = "", 1600);
  }
}

// ═══════════════════════════════════════════════════
// ACTIVE DOWNLOAD UI
// ═══════════════════════════════════════════════════
function updateActiveDl(code, status, detail, pct){
  document.getElementById("dlFlag").textContent = flag(code);
  document.getElementById("dlStatus").textContent = status;
  document.getElementById("dlDetail").textContent = detail;
  document.getElementById("dlFill").style.width = pct+"%";
}

function stopDownload(){
  downloading = false;
  downloadType = null;
  document.getElementById("activeDl").style.display = "none";
  document.getElementById("btnDirStart").style.display = "block";
  document.getElementById("btnDirStop").style.display = "none";
}

// ═══════════════════════════════════════════════════
// MATRIX FLASH — inject bright chars when data arrives
// ═══════════════════════════════════════════════════
let flashQueue = [];
function addMatrixFlash(code, count){
  flashQueue.push({ code, count, ts: Date.now() });
  // Also add partner items to the right panel as a visual feed
  addPartnerFeedItem(code, count);
}

function addPartnerFeedItem(code, count){
  const list = document.getElementById("partnerList");
  const item = document.createElement("div");
  item.className = "partner-item";
  item.innerHTML = `
    <div class="partner-name">${flag(code)} ${code} — ${count} partner</div>
    <div class="partner-meta">
      <span>📂 Directory salvata</span>
      <span style="margin-left:auto;font-size:.5rem;color:var(--muted)">${new Date().toLocaleTimeString()}</span>
    </div>
  `;
  list.insertBefore(item, list.firstChild);
  // Keep max 50 items
  while(list.children.length > 50) list.removeChild(list.lastChild);
}

function updateTopStats(){
  let total = 0;
  for(const v of Object.values(dirStats)) total += v;
  document.getElementById("statDir").textContent = total.toLocaleString();
  document.getElementById("ckDir").textContent = total.toLocaleString();
  document.getElementById("dirTotal").textContent = total.toLocaleString();
  document.getElementById("statCountries").textContent = Object.keys(dirStats).length;
  document.getElementById("ckCountries").textContent = Object.keys(dirStats).length;
}

// ═══════════════════════════════════════════════════
// BOTTOM FLAGS BAR
// ═══════════════════════════════════════════════════
function renderFlagsBar(){
  const scroll = document.getElementById("flagsScroll");
  const entries = Object.entries(dirStats).sort((a,b) => b[1]-a[1]);
  document.getElementById("flagsBarTotal").textContent = entries.length;

  scroll.innerHTML = entries.map(([code, count]) => {
    const prof = profStats[code] || 0;
    return `<div class="flag-chip" id="fc_${code}">
      <span class="flag-chip-emoji">${flag(code)}</span>
      <span class="flag-chip-count">${count}</span>
      ${prof > 0 ? `<span class="flag-chip-prof">👤${prof}</span>` : ""}
    </div>`;
  }).join("");
}

function highlightFlagChip(code){
  const chip = document.getElementById("fc_"+code);
  if(!chip) return;
  chip.classList.add("active");
  chip.scrollIntoView({ behavior:"smooth", block:"nearest", inline:"center" });
  setTimeout(() => chip.classList.remove("active"), 2000);
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
loadStats().then(() => { renderCountryList(); renderFlagsBar(); });
</script>

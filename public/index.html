<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WCA Network Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:hsl(240 6% 3%);--bg2:hsl(240 5% 6%);--card:hsl(240 5% 6%);--card-fg:hsl(0 0% 93%);
  --border:hsl(240 4% 10%);--border-glow:rgba(99,102,241,0.12);
  --text:#e2e8f0;--muted:hsl(0 0% 40%);--accent:#6366f1;--cyan:#0ea5e9;--green:#10b981;--purple:#8b5cf6;
  --text-primary:#e2e8f0;--text-muted:#64748b;--danger:#ef4444;--warning:#f59e0b;
  --radius:1rem;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;height:52px;
  background:hsl(240 5% 4%/.85);backdrop-filter:blur(40px) saturate(1.2);-webkit-backdrop-filter:blur(40px) saturate(1.2);
  border-bottom:1px solid hsl(0 0% 100%/.04);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  box-shadow:0 1px 40px hsl(0 0% 0%/.3);
}
.topbar-logo{width:32px;height:32px;filter:drop-shadow(0 3px 12px rgba(139,92,246,0.5));animation:logoBreathe 4s ease-in-out infinite}
@keyframes logoBreathe{0%,100%{filter:drop-shadow(0 3px 12px rgba(139,92,246,0.5))}50%{filter:drop-shadow(0 3px 20px rgba(139,92,246,0.7))}}
.topbar-title{font-size:.85rem;font-weight:300;letter-spacing:-0.02em;background:linear-gradient(180deg,hsl(0 0% 95%),hsl(0 0% 55%));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-nav{margin-left:auto;display:flex;gap:4px}
.topbar-btn{padding:5px 14px;border-radius:2rem;font-size:.68rem;font-weight:500;cursor:pointer;border:1px solid hsl(0 0% 100%/.04);background:hsl(0 0% 100%/.02);color:hsl(0 0% 55%);transition:all .4s cubic-bezier(.2,.8,.2,1);backdrop-filter:blur(10px)}
.topbar-btn:hover{background:hsl(0 0% 100%/.05);color:var(--text);transform:translateY(-1px);border-color:hsl(0 0% 100%/.08)}
.topbar-btn.active{background:hsl(210 100% 66%/.08);color:hsl(210 100% 80%);border-color:hsl(210 100% 66%/.15)}
.topbar-stats{display:flex;gap:8px;align-items:center;margin-right:12px}
.stat-chip{font-size:.62rem;font-weight:500;padding:4px 12px;border-radius:2rem;background:hsl(0 0% 100%/.02);backdrop-filter:blur(10px);border:1px solid hsl(0 0% 100%/.04);color:hsl(0 0% 55%);font-family:'JetBrains Mono',monospace;transition:all .3s}
.stat-chip:hover{background:hsl(0 0% 100%/.04);border-color:hsl(0 0% 100%/.08)}
.stat-chip b{color:hsl(0 0% 90%);font-size:.72rem;font-weight:500}

#matrixCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

.main{position:fixed;top:52px;bottom:56px;left:0;right:0;display:grid;grid-template-columns:280px 1fr 280px;gap:0;z-index:1}

.panel-left,.panel-right{
  background:hsl(240 5% 4%/.75);backdrop-filter:blur(40px) saturate(1.1);-webkit-backdrop-filter:blur(40px) saturate(1.1);
  border-right:1px solid hsl(0 0% 100%/.04);display:flex;flex-direction:column;overflow:hidden;
  box-shadow:inset 0 0 60px hsl(210 100% 66%/.02);
}
.panel-right{border-right:none;border-left:1px solid hsl(0 0% 100%/.04)}
.panel-header{padding:18px 18px 14px;border-bottom:1px solid hsl(0 0% 100%/.04);display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative}
.panel-header::after{content:'';position:absolute;bottom:0;left:18px;right:18px;height:1px;background:linear-gradient(90deg,transparent,hsl(210 100% 66%/.15),transparent)}
.panel-icon{font-size:2rem;filter:drop-shadow(0 3px 12px rgba(99,102,241,0.3))}
.panel-title{font-size:.82rem;font-weight:400;letter-spacing:-.02em}
.panel-subtitle{font-size:.6rem;color:hsl(0 0% 40%);margin-top:2px;font-weight:300}
.panel-body{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:rgba(99,102,241,0.15) transparent}
.panel-footer{padding:12px 14px;border-top:1px solid hsl(0 0% 100%/.04);flex-shrink:0;display:flex;align-items:center;gap:8px;position:relative}
.panel-footer::before{content:'';position:absolute;top:0;left:14px;right:14px;height:1px;background:linear-gradient(90deg,transparent,hsl(210 100% 66%/.1),transparent)}

.big-btn{flex:1;padding:11px;border-radius:var(--radius);border:none;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .5s cubic-bezier(.2,.8,.2,1);letter-spacing:.01em;position:relative;overflow:hidden}
.big-btn::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,hsl(0 0% 100%/.1),transparent);opacity:0;transition:opacity .3s}
.big-btn:hover::before{opacity:1}
.big-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px -10px hsl(0 0% 0%/.5)}
.big-btn.dir{background:linear-gradient(135deg,hsl(195 100% 48%),hsl(185 80% 45%));color:#fff;box-shadow:0 0 20px hsl(195 100% 48%/.15)}
.big-btn.prof{background:linear-gradient(135deg,hsl(258 70% 58%),hsl(270 70% 68%));color:#fff;box-shadow:0 0 20px hsl(258 70% 58%/.15)}
.big-btn.stop{background:linear-gradient(135deg,hsl(0 72% 51%),hsl(0 70% 62%));color:#fff;box-shadow:0 0 20px hsl(0 72% 51%/.15)}
.big-btn:disabled{opacity:.3;cursor:default;transform:none;box-shadow:none}
.big-btn:disabled::before{display:none}

.country-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:.75rem;transition:all .4s cubic-bezier(.2,.8,.2,1);cursor:default;border:1px solid transparent}
.country-item:hover{background:hsl(0 0% 100%/.03);border-color:hsl(0 0% 100%/.04);transform:translateX(3px)}
.country-name{font-size:.72rem;font-weight:400;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-0.01em}
.country-count{font-size:.58rem;font-family:'JetBrains Mono',monospace;padding:3px 8px;border-radius:2rem;background:hsl(195 100% 48%/.08);border:1px solid hsl(195 100% 48%/.12);color:hsl(195 80% 70%);font-weight:500}
.country-count.profiles{background:hsl(258 70% 58%/.08);border:1px solid hsl(258 70% 58%/.12);color:hsl(270 60% 75%)}
.country-bar{height:2px;border-radius:1px;background:hsl(0 0% 100%/.03);overflow:hidden;width:100%;margin-top:3px}
.country-bar-fill{height:100%;border-radius:1px;transition:width .8s cubic-bezier(.2,.8,.2,1);background:linear-gradient(90deg,hsl(210 100% 66%),hsl(270 60% 62%))!important}

.partner-item{padding:10px 12px;border-radius:.75rem;border:1px solid hsl(0 0% 100%/.03);margin-bottom:4px;transition:all .4s cubic-bezier(.2,.8,.2,1);animation:partnerIn .5s cubic-bezier(.2,.8,.2,1);background:hsl(0 0% 100%/.01)}
.partner-item:hover{background:hsl(0 0% 100%/.03);border-color:hsl(0 0% 100%/.06);transform:translateX(-3px);box-shadow:0 4px 16px hsl(0 0% 0%/.2)}
.partner-name{font-size:.72rem;font-weight:400;margin-bottom:3px;letter-spacing:-0.01em}
.partner-meta{font-size:.58rem;color:hsl(0 0% 40%);display:flex;gap:6px;align-items:center;font-weight:300}
@keyframes partnerIn{from{opacity:0;transform:translateX(20px) scale(.98)}to{opacity:1;transform:translateX(0) scale(1)}}

/* ═══ CENTER — CINEMATIC COCKPIT ═══ */
.center{position:relative;overflow:hidden;background:transparent}
.center::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,hsl(210 100% 66%/.06),transparent 70%);filter:blur(80px);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:1;animation:ambientPulse 8s ease-in-out infinite}
@keyframes ambientPulse{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}}
#cineCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2}

/* Cockpit overlay — floats on top of cinema canvas */
.cockpit{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:14px;z-index:10;
  pointer-events:none;transition:all .8s cubic-bezier(.2,.8,.2,1);
}
.cockpit.downloading{top:14%;transform:translate(-50%,0)}
.cockpit-logo{width:72px;height:72px;filter:drop-shadow(0 4px 24px rgba(139,92,246,0.5));animation:breathe 4s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1);filter:drop-shadow(0 4px 24px rgba(139,92,246,0.4));opacity:.9}50%{transform:scale(1.06);filter:drop-shadow(0 4px 32px rgba(139,92,246,0.7));opacity:1}}
.cockpit-title{font-size:1.6rem;font-weight:200;letter-spacing:-.04em;text-align:center;line-height:1.1}
.cockpit-title span{background:linear-gradient(180deg,hsl(0 0% 95%),hsl(0 0% 50%));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cockpit-subtitle{font-size:.7rem;color:hsl(0 0% 40%);text-align:center;max-width:320px;line-height:1.5;font-weight:300}
.cockpit-stats{display:flex;gap:28px;margin-top:8px}
.cockpit-stat{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 16px;border-radius:var(--radius);background:hsl(240 5% 6%/.5);backdrop-filter:blur(20px);border:1px solid hsl(0 0% 100%/.03)}
.cockpit-stat-value{font-size:1.5rem;font-weight:200;font-family:'JetBrains Mono',monospace;color:hsl(0 0% 80%)}
.cockpit-stat-label{font-size:.5rem;color:hsl(0 0% 40%);text-transform:uppercase;letter-spacing:.15em;font-weight:500;font-family:'JetBrains Mono',monospace}

/* Live event feed — bottom center, shows during download */
.live-feed{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;
  display:none;flex-direction:column;align-items:center;gap:6px;
  pointer-events:none;min-width:420px;max-width:620px;
}
.live-feed-item{
  padding:8px 18px;border-radius:var(--radius);font-size:.72rem;font-weight:300;
  background:hsl(240 5% 6%/.85);backdrop-filter:blur(40px) saturate(1.1);border:1px solid hsl(0 0% 100%/.04);
  box-shadow:0 8px 32px hsl(0 0% 0%/.4),0 0 60px hsl(210 100% 66%/.04);animation:feedIn .5s cubic-bezier(.2,.8,.2,1);
  display:flex;align-items:center;gap:10px;width:100%;
}
.live-feed-item .feed-flag{font-size:1.4rem}
.live-feed-item .feed-text{flex:1;color:hsl(0 0% 85%);font-weight:300}
.live-feed-item .feed-net{height:18px;opacity:.7;filter:brightness(1.2)}
.live-feed-item .feed-count{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:hsl(195 80% 70%);font-weight:500;padding:2px 8px;border-radius:2rem;background:hsl(195 100% 48%/.08);border:1px solid hsl(195 100% 48%/.12)}
@keyframes feedIn{from{opacity:0;transform:translateX(-50%) translateY(12px) scale(.96)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

/* Status toast */
.toast{
  position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:20;
  background:hsl(240 5% 6%/.9);backdrop-filter:blur(40px) saturate(1.2);border:1px solid hsl(0 0% 100%/.06);
  border-radius:var(--radius);padding:10px 24px;font-size:.72rem;font-weight:400;
  display:none;animation:toastIn .4s cubic-bezier(.2,.8,.2,1);box-shadow:0 12px 40px hsl(0 0% 0%/.4),0 0 60px hsl(210 100% 66%/.06);letter-spacing:-0.01em;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px) scale(.96)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.2);border-radius:2px}

/* ═══ BOTTOM FLAGS BAR ═══ */
.flags-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;height:56px;
  background:hsl(240 5% 4%/.85);backdrop-filter:blur(40px) saturate(1.2);-webkit-backdrop-filter:blur(40px) saturate(1.2);
  border-top:1px solid hsl(0 0% 100%/.04);
  display:flex;align-items:center;padding:0 12px;gap:0;
  box-shadow:0 -1px 40px hsl(0 0% 0%/.2);
}
.flags-bar-label{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 16px 0 6px;border-right:1px solid hsl(0 0% 100%/.04);margin-right:12px}
.flags-bar-label-big{font-size:1rem;font-weight:200;font-family:'JetBrains Mono',monospace;color:hsl(0 0% 80%)}
.flags-bar-label-sm{font-size:.48rem;color:hsl(0 0% 40%);text-transform:uppercase;letter-spacing:.15em;font-weight:500;font-family:'JetBrains Mono',monospace}
.flags-scroll{flex:1;display:flex;gap:4px;overflow-x:auto;overflow-y:hidden;align-items:center;scrollbar-width:thin;scrollbar-color:rgba(99,102,241,0.1) transparent;padding:4px 0}
.flag-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 7px;border-radius:.5rem;border:1px solid transparent;transition:all .4s cubic-bezier(.2,.8,.2,1);cursor:default;min-width:48px}
.flag-chip:hover{background:hsl(0 0% 100%/.03);border-color:hsl(0 0% 100%/.06)}
.flag-chip.active{background:hsl(195 100% 48%/.08);border-color:hsl(195 100% 48%/.15);animation:flagPop .4s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 20px hsl(195 100% 48%/.1)}
.flag-chip-emoji{font-size:1.2rem;line-height:1}
.flag-chip-count{font-size:.55rem;font-family:'JetBrains Mono',monospace;font-weight:500;color:hsl(195 80% 70%)}
.flag-chip-prof{font-size:.48rem;font-family:'JetBrains Mono',monospace;font-weight:400;color:hsl(270 60% 75%)}
@keyframes flagPop{0%{transform:scale(1.15)}100%{transform:scale(1)}}

/* ═══ COCKPIT PROGRESS BAR ═══ */
.cockpit-progress{width:280px;display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:4px}
.cockpit-progress-bar{width:100%;height:4px;border-radius:2px;background:hsl(0 0% 100%/.04);overflow:hidden;position:relative}
.cockpit-progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,hsl(210 100% 66%),hsl(270 60% 62%));transition:width .6s cubic-bezier(.2,.8,.2,1);position:relative;width:0%}
.cockpit-progress-fill::after{content:'';position:absolute;right:0;top:-4px;bottom:-4px;width:20px;background:hsl(210 100% 80%/.5);filter:blur(8px);border-radius:50%;animation:progressGlow 1.5s ease-in-out infinite}
@keyframes progressGlow{0%,100%{opacity:.4}50%{opacity:1}}
.cockpit-progress-text{font-size:.6rem;font-family:'JetBrains Mono',monospace;color:hsl(210 100% 75%);font-weight:500;letter-spacing:.1em}

/* ═══ EXECUTION STEPS (download detail) ═══ */
.exec-steps{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;display:none;flex-direction:column;gap:8px;pointer-events:none;width:320px;margin-top:60px}
.exec-step{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:.75rem;background:hsl(240 5% 6%/.5);backdrop-filter:blur(20px);border:1px solid hsl(0 0% 100%/.03);font-size:.72rem;font-weight:300;animation:fadeUp .5s cubic-bezier(.2,.8,.2,1)}
.exec-step .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.exec-step .dot.done{background:hsl(152 60% 45%);box-shadow:0 0 8px hsl(152 60% 45%/.4)}
.exec-step .dot.running{background:hsl(38 90% 50%);animation:breathe 1.5s ease-in-out infinite;box-shadow:0 0 8px hsl(38 90% 50%/.4)}
.exec-step .dot.pending{background:hsl(0 0% 20%);opacity:.5}
.exec-step .step-detail{margin-left:auto;font-size:.58rem;color:hsl(0 0% 40%);font-family:'JetBrains Mono',monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ═══ DOWNLOADING STATE ENHANCEMENTS ═══ */
body.downloading-active .panel-left,body.downloading-active .panel-right{border-color:hsl(210 100% 66%/.06)}
body.downloading-active .topbar{border-bottom-color:hsl(210 100% 66%/.08);box-shadow:0 1px 40px hsl(210 100% 66%/.05)}
body.downloading-active .flags-bar{border-top-color:hsl(210 100% 66%/.08)}

/* ═══ SCROLLBAR REFINEMENT ═══ */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:hsl(0 0% 15%);border-radius:4px}
::selection{background:hsl(210 100% 66%/.15)}

@media(max-width:900px){
  .main{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}
  .panel-left,.panel-right{max-height:30vh}
  .center{min-height:40vh}
  .flags-bar{height:48px}
}
</style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>

<div class="topbar">
  <img src="logos/dragon.png" class="topbar-logo" alt="Logo" onerror="this.src='https://dlldkrzoxvjxpgkkttxu.supabase.co/storage/v1/object/public/icons/dragon.png'">
  <span class="topbar-title">WCA Network Navigator</span>
  <div class="topbar-stats">
    <span class="stat-chip">📂 <b id="statDir">—</b> directory</span>
    <span class="stat-chip">👤 <b id="statProfiles">—</b> profili</span>
    <span class="stat-chip">🌍 <b id="statCountries">—</b> paesi</span>
  </div>
  <div class="topbar-nav">
    <button class="topbar-btn active">Dashboard</button>
    <button class="topbar-btn" onclick="window.location='admin.html'">Management</button>
    <button class="topbar-btn" onclick="window.open('directory.html','_blank')">Directory</button>
    <button class="topbar-btn" onclick="window.open('business-cards.html','_blank')">Business Cards</button>
  </div>
</div>

<div class="main">
  <!-- LEFT: DIRECTORY -->
  <div class="panel-left">
    <div class="panel-header">
      <span class="panel-icon">📂</span>
      <div><div class="panel-title">Directory</div><div class="panel-subtitle">Elenco partner per paese</div></div>
      <span id="dirTotal" style="margin-left:auto;font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--cyan);font-weight:700">0</span>
    </div>
    <div class="panel-body" id="dirList"></div>
    <div class="panel-footer">
      <button class="big-btn dir" id="btnDirStart" onclick="startDirectoryDownload()">📂 Scarica Directory</button>
      <button class="big-btn stop" id="btnDirStop" onclick="stopDownload()" style="display:none;flex:0 0 auto;padding:10px 16px">■</button>
    </div>
  </div>

  <!-- CENTER: CINEMATIC COCKPIT -->
  <div class="center">
    <canvas id="cineCanvas"></canvas>
    <div class="cockpit" id="cockpit">
      <img src="logos/dragon.png" class="cockpit-logo" alt="" onerror="this.src='https://dlldkrzoxvjxpgkkttxu.supabase.co/storage/v1/object/public/icons/dragon.png'">
      <div class="cockpit-title"><span>WCA Network</span><br>Navigator</div>
      <div class="cockpit-subtitle">Scarica la directory dei partner o avvia il download dei profili dettagliati</div>
      <div class="cockpit-progress" id="cockpitProgress" style="display:none">
        <div class="cockpit-progress-bar"><div class="cockpit-progress-fill" id="cockpitProgressFill"></div></div>
        <div class="cockpit-progress-text" id="cockpitProgressText">0%</div>
      </div>
      <div class="cockpit-stats">
        <div class="cockpit-stat"><span class="cockpit-stat-value" id="ckDir">0</span><span class="cockpit-stat-label">Directory</span></div>
        <div class="cockpit-stat"><span class="cockpit-stat-value" id="ckProf">0</span><span class="cockpit-stat-label">Profili</span></div>
        <div class="cockpit-stat"><span class="cockpit-stat-value" id="ckCountries">0</span><span class="cockpit-stat-label">Paesi</span></div>
      </div>
    </div>
    <div class="live-feed" id="liveFeed"></div>
    <div class="toast" id="toast"></div>
  </div>

  <!-- RIGHT: PARTNERS -->
  <div class="panel-right">
    <div class="panel-header">
      <span class="panel-icon">👤</span>
      <div><div class="panel-title">Partner</div><div class="panel-subtitle">Profili scaricati in tempo reale</div></div>
      <span id="profTotal" style="margin-left:auto;font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--purple);font-weight:700">0</span>
    </div>
    <div class="panel-body" id="partnerList"></div>
    <div class="panel-footer">
      <button class="big-btn prof" id="btnProfStart" onclick="startProfileDownload()">👤 Scarica Profili</button>
      <button class="big-btn stop" id="btnProfStop" onclick="stopProfileDownload()" style="display:none;flex:0 0 auto;padding:10px 16px">■</button>
    </div>
  </div>
</div>

<div class="flags-bar">
  <div class="flags-bar-label">
    <span class="flags-bar-label-big" id="flagsBarTotal">0</span>
    <span class="flags-bar-label-sm">paesi</span>
  </div>
  <div class="flags-scroll" id="flagsScroll"></div>
</div>

<!-- HIDDEN MANAGEMENT ELEMENTS -->
<div id="mgmtCompat" style="display:none">
  <button id="btnLogin"></button><span id="loginBadge"></span>
  <button id="btnStart"></button><button id="btnStop"></button><button id="btnResume"></button><button id="btnSyncDir"></button>
  <input type="checkbox" id="chkUpdateAddress">

// ═══════════════════════════════════════════════════
// MATRIX RAIN — fullscreen background
// ═══════════════════════════════════════════════════
const canvas = document.getElementById("matrixCanvas");
const ctx = canvas.getContext("2d");
let columns, drops, dropSpeeds;
const chars="WCANETWORKPARTNERDIRECTORYGLOBALLOGISTICSFREIGHTSHIPPINGCARGOTRADEアウカエオ01";
const FONT_SIZE=14;
let matrixFrame=0, matrixHueBase=200, matrixHueTarget=200, matrixHueRange=80, matrixSat=70, matrixAlphaBase=0.10, matrixFadeAlpha=0.04;

function initMatrix(){
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  columns=Math.floor(canvas.width/FONT_SIZE);
  drops=Array(columns).fill(0).map(()=>Math.random()*(canvas.height/FONT_SIZE));
  dropSpeeds=Array(columns).fill(0).map(()=>0.3+Math.random()*0.5);
}
function drawMatrix(){
  matrixFrame++;
  matrixHueBase+=(matrixHueTarget-matrixHueBase)*0.02;
  ctx.fillStyle=`rgba(8,8,26,${matrixFadeAlpha})`;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.font=`${FONT_SIZE}px 'JetBrains Mono'`;
  for(let i=0;i<drops.length;i++){
    if(matrixFrame%3!==i%3){drops[i]+=dropSpeeds[i];continue;}
    const char=chars[Math.floor(Math.random()*chars.length)];
    const x=i*FONT_SIZE, y=Math.floor(drops[i])*FONT_SIZE;
    const hue=matrixHueBase+Math.random()*matrixHueRange;
    const alpha=matrixAlphaBase+Math.random()*0.12;
    ctx.fillStyle=`hsla(${hue},${matrixSat}%,55%,${alpha})`;
    ctx.fillText(char,x,y);
    if(Math.random()>0.985){ctx.fillStyle=`hsla(${hue},90%,80%,0.6)`;ctx.fillText(char,x,y);}
    drops[i]+=dropSpeeds[i];
    if(y>canvas.height&&Math.random()>0.99){drops[i]=0;dropSpeeds[i]=0.3+Math.random()*0.5;}
  }
  requestAnimationFrame(drawMatrix);
}
function setMatrixIdle(){matrixHueTarget=200;matrixHueRange=80;matrixSat=70;matrixAlphaBase=0.10;matrixFadeAlpha=0.04;}
function setMatrixDownloading(){matrixHueTarget=0;matrixHueRange=30;matrixSat=80;matrixAlphaBase=0.14;matrixFadeAlpha=0.035;}
function setMatrixCountryFlash(){

  setTimeout(()=>{matrixHueTarget=p;matrixHueRange=30;matrixSat=80;matrixAlphaBase=0.14;},800);
}
function setMatrixDone(){matrixHueTarget=140;matrixHueRange=20;matrixSat=75;matrixAlphaBase=0.12;matrixFadeAlpha=0.03;}

// ═══════════════════════════════════════════════════
// CINEMATIC CENTER CANVAS — particles, logos, flags, data bursts
// ═══════════════════════════════════════════════════
const cine = document.getElementById("cineCanvas");
const cctx = cine.getContext("2d");
let cineW, cineH;
const cineParticles = [];   // floating particles
const cineLogos = [];       // network logo objects
const cineFlags = [];       // flag burst animations
const cineTexts = [];       // partner name fly-throughs
let cineActive = false;     // only animate during downloads
let cineLogoImages = {};    // preloaded logo images

function initCine(){
  const rect = cine.parentElement.getBoundingClientRect();
  cine.width = cineW = rect.width;
  cine.height = cineH = rect.height;
}

// Preload network logo images
function preloadLogos(){
  const nets = (typeof ALL_NETWORKS !== 'undefined') ? ALL_NETWORKS : [];
  nets.forEach(n => {
    const img = new Image();
    img.src = n.logo;
    img.onload = () => { cineLogoImages[n.domain] = img; };
  });
}

// ═══ PARTICLE SYSTEM ═══
function spawnParticle(x, y, hue, size, life){
  cineParticles.push({
    x: x || Math.random()*cineW, y: y || Math.random()*cineH,
    vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2,
    hue: hue || 200, size: size || 2+Math.random()*3,
    life: life || 60+Math.random()*120, maxLife: life || 120, alpha: 1
  });
}

// ═══ NETWORK LOGO ORBIT — spinning logos during download ═══
function spawnNetworkLogo(domain){
  const img = cineLogoImages[domain];
  if(!img) return;
  const angle = Math.random()*Math.PI*2;
  const radius = Math.min(cineW, cineH) * 0.3;
  cineLogos.push({
    img, cx: cineW/2, cy: cineH/2, angle, radius,
    speed: 0.005 + Math.random()*0.008, size: 36+Math.random()*20,
    alpha: 0, fadeIn: true, life: 200+Math.random()*200, maxLife: 300,
    glow: 0, glowTarget: 0.6+Math.random()*0.4
  });
}

// ═══ FLAG BURST — country flag explodes into view ═══
function spawnFlagBurst(code){
  const emoji = flag(code);
  if(!emoji) return;
  cineFlags.push({
    emoji, x: cineW/2, y: cineH*0.55,
    scale: 0.1, targetScale: 4+Math.random()*2,
    alpha: 1, life: 90, maxLife: 90,
    ring: 0, ringMax: Math.min(cineW, cineH)*0.3
  });
  // Spawn particles around the flag
  for(let i=0; i<30; i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 2+Math.random()*4;
    cineParticles.push({
      x: cineW/2, y: cineH*0.55,
      vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      hue: 45+Math.random()*20, size: 2+Math.random()*4,
      life: 40+Math.random()*40, maxLife: 60, alpha: 1
    });
  }
}

// ═══ PARTNER NAME FLY-THROUGH ═══
function spawnPartnerText(name, networkDomain){
  const netName = (typeof ALL_NETWORKS !== 'undefined') ? (ALL_NETWORKS.find(n=>n.domain===networkDomain)?.name || '') : '';
  cineTexts.push({
    text: name, network: netName,
    x: -200, y: cineH*0.4 + (Math.random()-0.5)*cineH*0.3,
    speed: 1.5+Math.random()*2, alpha: 0, phase: 'in',
    hue: networkDomain ? 270 : 200
  });
}

// ═══ DRAW CINEMATIC FRAME ═══
function drawCine(){
  if(!cineActive && cineParticles.length===0 && cineLogos.length===0 && cineFlags.length===0 && cineTexts.length===0){
    requestAnimationFrame(drawCine);
    return;
  }
  cctx.clearRect(0,0,cineW,cineH);

  // Background ambient glow when downloading
  if(cineActive){
    const grad = cctx.createRadialGradient(cineW/2,cineH/2,0,cineW/2,cineH/2,cineW*0.5);
    const hue = matrixHueBase;
    grad.addColorStop(0, `hsla(${hue},60%,20%,0.08)`);
    grad.addColorStop(1, `hsla(${hue},60%,10%,0)`);
    cctx.fillStyle = grad;
    cctx.fillRect(0,0,cineW,cineH);
    // Spawn ambient particles
    if(Math.random() > 0.92) spawnParticle(null,null,matrixHueBase);
  }

  // Draw particles
  for(let i=cineParticles.length-1; i>=0; i--){
    const p = cineParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    p.alpha = Math.min(1, p.life / (p.maxLife * 0.3));
    if(p.life <= 0){ cineParticles.splice(i,1); continue; }
    cctx.beginPath();
    cctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    cctx.fillStyle = `hsla(${p.hue},80%,65%,${p.alpha*0.6})`;
    cctx.fill();
    // Glow
    cctx.beginPath();
    cctx.arc(p.x, p.y, p.size*2.5, 0, Math.PI*2);
    cctx.fillStyle = `hsla(${p.hue},80%,55%,${p.alpha*0.1})`;
    cctx.fill();
  }

  // Draw orbiting network logos
  for(let i=cineLogos.length-1; i>=0; i--){
    const l = cineLogos[i];
    l.angle += l.speed;
    l.life--;
    if(l.fadeIn && l.alpha < 1){ l.alpha = Math.min(1, l.alpha + 0.02); if(l.alpha >= 1) l.fadeIn = false; }
    if(l.life < 40) l.alpha = l.life / 40;
    if(l.life <= 0){ cineLogos.splice(i,1); continue; }
    l.glow += (l.glowTarget - l.glow) * 0.05;
    const x = l.cx + Math.cos(l.angle) * l.radius;
    const y = l.cy + Math.sin(l.angle) * l.radius * 0.4; // elliptical orbit
    cctx.save();
    cctx.globalAlpha = l.alpha * 0.85;
    // Glow behind logo
    cctx.shadowColor = `hsla(260,80%,70%,${l.glow})`;
    cctx.shadowBlur = 20;
    cctx.drawImage(l.img, x - l.size/2, y - l.size/2, l.size, l.size);
    cctx.restore();
  }

  // Draw flag bursts
  for(let i=cineFlags.length-1; i>=0; i--){
    const f = cineFlags[i];
    f.life--;
    const t = 1 - f.life/f.maxLife;
    f.scale += (f.targetScale - f.scale) * 0.08;
    if(f.life < 30) f.alpha = f.life / 30;
    if(f.life <= 0){ cineFlags.splice(i,1); continue; }
    // Expanding ring
    f.ring = t * f.ringMax;
    cctx.beginPath();
    cctx.arc(f.x, f.y, f.ring, 0, Math.PI*2);
    cctx.strokeStyle = `hsla(45,90%,70%,${f.alpha*0.3*(1-t)})`;
    cctx.lineWidth = 2;
    cctx.stroke();
    // Flag emoji
    cctx.save();
    cctx.globalAlpha = f.alpha;
    cctx.font = `${Math.round(f.scale * 14)}px sans-serif`;
    cctx.textAlign = 'center';
    cctx.textBaseline = 'middle';
    cctx.fillText(f.emoji, f.x, f.y);
    cctx.restore();
  }

  // Draw partner name fly-throughs
  for(let i=cineTexts.length-1; i>=0; i--){
    const t = cineTexts[i];
    t.x += t.speed;
    if(t.phase === 'in'){ t.alpha = Math.min(1, t.alpha + 0.03); if(t.x > cineW*0.2) t.phase = 'mid'; }
    if(t.x > cineW*0.7) t.phase = 'out';
    if(t.phase === 'out') t.alpha = Math.max(0, t.alpha - 0.03);
    if(t.alpha <= 0 && t.phase === 'out'){ cineTexts.splice(i,1); continue; }
    cctx.save();
    cctx.globalAlpha = t.alpha * 0.7;
    cctx.font = '600 13px Inter';
    cctx.fillStyle = `hsla(${t.hue},70%,75%,1)`;
    cctx.textBaseline = 'middle';
    cctx.fillText(t.text, t.x, t.y);
    if(t.network){
      cctx.font = '500 9px Inter';
      cctx.fillStyle = `hsla(${t.hue},50%,55%,0.7)`;
      cctx.fillText(t.network, t.x, t.y + 16);
    }
    // Trail
    cctx.beginPath();
    cctx.moveTo(t.x - 10, t.y);
    cctx.lineTo(t.x - 60, t.y);
    cctx.strokeStyle = `hsla(${t.hue},70%,65%,${t.alpha*0.15})`;
    cctx.lineWidth = 1;
    cctx.stroke();
    cctx.restore();
  }

  requestAnimationFrame(drawCine);
}

async function loadDashStats(){
  try {
    const dirResp=await fetch(API+"/api/load-directory?mode=stats");
    const dirData=await dirResp.json();
    if(dirData.success){
      dirStats=dirData.byCountry||{};
      const dt=dirData.totalPartners||0, dc=dirData.totalCountries||0;
      document.getElementById("statDir").textContent=dt.toLocaleString();
      document.getElementById("ckDir").textContent=dt.toLocaleString();
      document.getElementById("statCountries").textContent=dc;
      document.getElementById("ckCountries").textContent=dc;
      document.getElementById("dirTotal").textContent=dt.toLocaleString();
    }
    const profResp=await fetch(API+"/api/partners?action=country_counts");
    const profData=await profResp.json();
    if(profData.success){
      let total=0; profStats={};
      for(const [code,count] of Object.entries(profData.counts||{})){ profStats[code]=count; total+=count; }
      document.getElementById("statProfiles").textContent=total.toLocaleString();
      document.getElementById("ckProf").textContent=total.toLocaleString();
      document.getElementById("profTotal").textContent=total.toLocaleString();
    }
  } catch(e){ console.warn("loadDashStats:",e.message); }
}

  dirList.innerHTML=entries.map(([code,count])=>{
    const prof=profStats[code]||0;
    const pct=count>0?Math.round((prof/count)*100):0;
    const barColor=pct>=100?"var(--green)":pct>50?"var(--cyan)":"var(--accent)";
    return `<div class="country-item" data-code="${code}">
      <span style="font-size:1.4rem">${flag(code)}</span>

          <span class="country-count">${count}</span>
          ${prof>0?`<span class="country-count profiles">${prof}</span>`:""}
        </div>
        <div class="country-bar"><div class="country-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>

async function startDirectoryDownload(){

  downloading=true; downloadType="directory";
  setMatrixDownloading(); startCinema(); startRealtimePolling();

    const code=countriesToScan[i];
    const pct = Math.round(((i)/total)*100);
    setCockpitProgress(pct, `${i+1}/${total} paesi · ${code}`);
    setMatrixCountryFlash();
    spawnFlagBurst(code);
    addLiveFeedItem(flag(code), `Scaricando directory ${code}...`, null, `${i+1}/${total}`);

    let page=1, hasMore=true, members=[];
    while(hasMore&&downloading){
      try{
        const resp=await fetch(API+"/api/discover-global",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({country:code,page})});
        const data=await resp.json();
        if(data.success&&data.members&&data.members.length>0){members.push(...data.members);hasMore=data.hasNext;page++;}
        else{hasMore=false;}
      }catch(e){hasMore=false;}
    }

    if(members.length>0&&downloading){
      try{
        await fetch(API+"/api/save-directory",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({countryCode:code,members})});
        dirStats[code]=members.length;
        addPartnerFeedItem(code,members.length,"directory");
        highlightFlagChip(code);
        addLiveFeedItem(flag(code), `${code}: ${members.length} partner salvati`, null, "✅");
      }catch(e){}
    }
    renderCountryList(); renderFlagsBar(); updateDashTopStats();
  }

  setCockpitProgress(100, "Completato!");
  setTimeout(()=>{ setMatrixDone(); stopCinema(); }, 1500);
  downloading=false; downloadType=null;
  document.getElementById("btnDirStart").style.display="block";
  document.getElementById("btnDirStop").style.display="none";
  stopRealtimePolling();
  showToast("📂 Directory completata!","var(--green)");
  loadDashStats().then(()=>{renderCountryList();renderFlagsBar();});
  setTimeout(setMatrixIdle,10000);
}

function stopDownload(){
  downloading=false; stopCinema();
  document.getElementById("btnDirStart").style.display="block";
  document.getElementById("btnDirStop").style.display="none";
  stopRealtimePolling();
  showToast("⏹ Download fermato","var(--muted)");

// ═══════════════════════════════════════════════════
// PROFILE DOWNLOAD — cinematic hooks + Management pipeline
// ═══════════════════════════════════════════════════
(function hookManagementFunctions(){
  // Hook setStatus
  if(typeof setStatus==="function"){
    const _o=setStatus;
    setStatus=function(text,s){_o(text,s);};
  }
  // Hook setProgress
  if(typeof setProgress==="function"){
    const _o=setProgress;
    setProgress=function(cur,tot){
      _o(cur,tot);
      if(scraping&&tot>0){
        const pct=Math.round((cur/tot)*100);
        setCockpitProgress(pct, `${cur}/${tot} profili · ${pct}%`);
        const sub=document.querySelector(".cockpit-subtitle");
        if(sub) sub.textContent=`Download profili in corso...`;
      }
    };
  }
  // Hook setActiveCountry — flag burst + cinema
  if(typeof setActiveCountry==="function"){
    const _o=setActiveCountry;
    setActiveCountry=function(code,name){
      _o(code,name);
      if(scraping){
        setMatrixCountryFlash();
        spawnFlagBurst(code);
        highlightFlagChip(code);
        addLiveFeedItem(flag(code), `${name||code}: scaricando profili...`, null, null);
      }
    };
  }
  // Hook setActiveNetwork — spawn orbiting logo
  if(typeof setActiveNetwork==="function"){
    const _o=setActiveNetwork;
    setActiveNetwork=function(domain,name){
      _o(domain,name);
      if(scraping){
        spawnNetworkLogo(domain);
        const net=(typeof ALL_NETWORKS!=='undefined')?ALL_NETWORKS.find(n=>n.domain===domain):null;
        if(net) addLiveFeedItem("🔗", name, net.logo, null);
      }
    };
  }
  // Hook log — detect saved profiles, show partner fly-through
  if(typeof log==="function"){
    const _o=log;
    log=function(msg,type){
      _o(msg,type);
      if(type==="ok"&&msg.startsWith("✓")){
        // Extract company name from "✓ CompanyName (id) contatti:N"
        const m=msg.match(/✓\s+(.+?)\s+\(/);
        const net=msg.match(/\[([^\]]+)\]$/);
        if(m){
          spawnPartnerText(m[1], net ? net[1] : "");
          // Get current country for feed
          const cc = typeof currentScrapingCountry!=='undefined' ? currentScrapingCountry : "";
          addPartnerFeedItem(cc, 1, "profiles");
        }
      }
    };
  }
})();
